    // NWRUP Card Component
    const NWRUPCard = () => {
      const [selectedSite, setSelectedSite] = useState('');
      const data = selectedSite ? NWRUP_DATA[selectedSite] : null;
      const site = SITES.find(s => s.id === selectedSite);

      const IPLink = ({ label, ip }) => (

              <IPLink label="TX 8-Port Switch" ip={data.txSwitch} />
              <IPLink label="TX Decoder" ip={data.txDecoder} />

            </div>

            className="flex items-center justify-center gap-2 mt-4 p-2 bg-slate-700/50 hover:bg-slate-700 rounded-lg text-xs text-slate-300 hover:text-white transition-colors">

    // Parts on Order Tracker
    const PartsTracker = () => {
      const [parts, setParts] = useState([]);
      const [showAdd, setShowAdd] = useState(false);
      const [newPart, setNewPart] = useState({ name: '', partNum: '', qty: '', site: '', vendor: '', orderDate: '', status: 'ordered' });

      useEffect(() => {
        const saved = localStorage.getItem('nwr-parts-tracker');
        if (saved) setParts(JSON.parse(saved));
      }, []);

      const saveParts = (updated) => {
        setParts(updated);
        localStorage.setItem('nwr-parts-tracker', JSON.stringify(updated));
        const ts = new Date().toISOString(); localStorage.setItem('nwr-last-updated', ts); window.dispatchEvent(new CustomEvent('nwr-last-updated', { detail: ts }));
      };

      const addPart = () => {
        if (!newPart.name || !newPart.partNum) return;
        const part = { ...newPart, id: Date.now(), addedDate: new Date().toISOString() };
        saveParts([...parts, part]);
        setNewPart({ name: '', partNum: '', qty: '', site: '', vendor: '', orderDate: '', status: 'ordered' });
        setShowAdd(false);
      };

      const removePart = (id) => saveParts(parts.filter(p => p.id !== id));

      const updateStatus = (id, status) => {
        saveParts(parts.map(p => p.id === id ? { ...p, status } : p));
      };

      const statusColor = (status) => {
        switch(status) {
          case 'ordered': return 'bg-blue-500/20 text-blue-400 border-blue-500/30';
          case 'shipped': return 'bg-amber-500/20 text-amber-400 border-amber-500/30';
          case 'received': return 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30';
          default: return 'bg-slate-500/20 text-slate-400 border-slate-500/30';
        }
      };

      return (
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">

              <h3 className="font-bold text-white text-sm">Parts on Order</h3>
            </div>
            <button onClick={() => setShowAdd(!showAdd)}
              className="p-1 hover:bg-slate-700 rounded text-noaa-sky transition-colors">
              <Icon name={showAdd ? "X" : "Plus"} className="w-4 h-4" />
            </button>
          </div>

          {showAdd && (
            <div className="mb-3 p-3 bg-slate-900/50 rounded-lg border border-slate-700/50 space-y-2 animate-in">

                className="w-full bg-slate-900 border border-slate-700 text-white text-xs rounded p-2 outline-none focus:border-noaa-sky" />
              <input type="text" placeholder="Part Number" value={newPart.partNum} onChange={e => setNewPart({...newPart, partNum: e.target.value})}
                className="w-full bg-slate-900 border border-slate-700 text-white text-xs rounded p-2 outline-none focus:border-noaa-sky" />
              <div className="grid grid-cols-2 gap-2">
                <input type="text" placeholder="Qty" value={newPart.qty} onChange={e => setNewPart({...newPart, qty: e.target.value})}
                  className="w-full bg-slate-900 border border-slate-700 text-white text-xs rounded p-2 outline-none focus:border-noaa-sky" />
                <input type="text" placeholder="Site" value={newPart.site} onChange={e => setNewPart({...newPart, site: e.target.value})}
                  className="w-full bg-slate-900 border border-slate-700 text-white text-xs rounded p-2 outline-none focus:border-noaa-sky" />
              </div>
              <input type="text" placeholder="Vendor" value={newPart.vendor} onChange={e => setNewPart({...newPart, vendor: e.target.value})}
                className="w-full bg-slate-900 border border-slate-700 text-white text-xs rounded p-2 outline-none focus:border-noaa-sky" />
              <DatePicker value={newPart.orderDate || ''} onChange={(d) => setNewPart({...newPart, orderDate: d})} />
              <button onClick={addPart}
                className="w-full bg-noaa-blue hover:bg-noaa-light text-white text-xs font-bold py-2 rounded transition-colors">
                Add Part
              </button>
            </div>
          )}

          {parts.length > 0 ? (
            <div className="space-y-2 max-h-64 overflow-y-auto scrollbar-thin">
              {parts.map(part => (
                <div key={part.id} className="p-2 bg-slate-900/50 rounded-lg border border-slate-700/50 animate-in">
                  <div className="flex items-start justify-between mb-1">
                    <div className="flex-1">
                      <p className="text-xs font-bold text-white">{part.name}</p>
                      <p className="text-[10px] text-slate-400 font-mono">{part.partNum}</p>
                    </div>
                    <button onClick={() => removePart(part.id)}
                      className="p-1 hover:bg-red-500/20 rounded text-slate-500 hover:text-red-400 transition-colors">
                      <Icon name="X" className="w-3 h-3" />
                    </button>
                  </div>
                  <div className="flex items-center gap-2 text-[10px] text-slate-500 mb-2">
                    {part.qty && <span>Qty: {part.qty}</span>}
                    {part.site && <span>• {part.site}</span>}
                    {part.vendor && <span>• {part.vendor}</span>}
                  </div>
                  <div className="flex items-center gap-1">
                    {['ordered', 'shipped', 'received'].map(status => (
                      <button key={status} onClick={() => updateStatus(part.id, status)}
                        className={`flex-1 text-[9px] uppercase font-bold py-1 rounded border transition-all ${
                          part.status === status ? statusColor(status) : 'bg-slate-800 text-slate-600 border-slate-700 hover:border-slate-600'
                        }`}>
                        {status}
                      </button>
                    ))}
                  </div>
                  {part.orderDate && (
                    <p className="text-[9px] text-slate-600 mt-1">Ordered: {new Date(part.orderDate).toLocaleDateString()}</p>
                  )}
                </div>
              ))}
            </div>
          ) : (
            <div className="text-center py-6 text-slate-500 text-xs">
              <Icon name="Package" className="w-8 h-8 mx-auto mb-2 opacity-30" />
              No parts on order
            </div>
          )}
        </div>
      );
    };

    // Form Components
    const Section = ({ title, num, note }) => (

    // Main Form
    // Facility Maintenance Log (FAA 6030-1 style)
    const MaintenanceLog = () => {
      const [entries, setEntries] = useState([]);
      const [showAdd, setShowAdd] = useState(false);
      const [newEntry, setNewEntry] = useState({ siteId: '', time: '', remarks: '', initials: '' });

      useEffect(() => {
        const saved = localStorage.getItem('nwr-maintenance-log');
        if (saved) setEntries(JSON.parse(saved));
      }, []);

      useEffect(() => {
        // Auto-populate current time when adding new entry
        if (showAdd && !newEntry.time) {
          const now = new Date();
          const time24 = now.toTimeString().split(' ')[0].substring(0, 5); // HH:MM
          setNewEntry(prev => ({ ...prev, time: time24 }));
        }
      }, [showAdd]);

      const saveEntries = (updated) => {
        setEntries(updated);
        localStorage.setItem('nwr-maintenance-log', JSON.stringify(updated));
        const ts = new Date().toISOString(); localStorage.setItem('nwr-last-updated', ts); window.dispatchEvent(new CustomEvent('nwr-last-updated', { detail: ts }));
      };

      const addEntry = () => {
        if (!newEntry.siteId || !newEntry.time || !newEntry.remarks || !newEntry.initials) return;
        const now = new Date();
        const site = SITES.find(s => s.id === newEntry.siteId);
        const entry = {
          id: Date.now(),
          date: now.toISOString().split('T')[0],
          time: newEntry.time,
          siteId: newEntry.siteId,
          siteName: site?.name || newEntry.siteId,
          siteCall: site?.call || '',
          remarks: newEntry.remarks,
          initials: newEntry.initials.toUpperCase(),
          timestamp: now.toISOString()
        };
        saveEntries([entry, ...entries]); // Newest first
        setNewEntry({ siteId: '', time: '', remarks: '', initials: '' });
        setShowAdd(false);
      };

      const deleteEntry = (id) => {
        if (confirm('Delete this log entry?')) {
          saveEntries(entries.filter(e => e.id !== id));
        }
      };

      return (
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-2xl overflow-hidden h-full flex flex-col">
          <div className="bg-gradient-to-r from-slate-700 to-slate-900 p-5 border-b border-slate-700/50">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-lg bg-slate-600/50 flex items-center justify-center">
                  <Icon name="FileText" className="w-5 h-5 text-slate-300" />
                </div>
                <div>
                  <h2 className="text-lg font-bold text-white">Facility Maintenance Log</h2>
                  <p className="text-xs text-slate-400">FAA Form 6030-1 Style</p>
                </div>
              </div>
              <button onClick={() => setShowAdd(!showAdd)}
                className="p-2 hover:bg-slate-600 rounded-lg text-slate-300 hover:text-white transition-colors">
                <Icon name={showAdd ? "X" : "Plus"} className="w-5 h-5" />
              </button>
            </div>
            {showAdd && (
              <div className="mt-4 p-4 bg-slate-900/50 rounded-xl border border-slate-600 space-y-3 animate-in">
                <select value={newEntry.siteId} onChange={e => setNewEntry({...newEntry, siteId: e.target.value})}
                  className="w-full bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2.5 outline-none focus:border-noaa-sky">
                  <option value="">— Select Site —</option>
                  {SITES.map(s => <option key={s.id} value={s.id}>{s.name} ({s.call})</option>)}
                </select>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-xs text-slate-400 mb-1 uppercase font-semibold">Time (24-hour)</label>
                    <input type="time" value={newEntry.time} onChange={e => setNewEntry({...newEntry, time: e.target.value})}
                      className="w-full bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2.5 outline-none focus:border-noaa-sky" />
                  </div>
                  <div>
                    <label className="block text-xs text-slate-400 mb-1 uppercase font-semibold">Initials</label>
                    <input type="text" placeholder="Initials *" value={newEntry.initials} onChange={e => setNewEntry({...newEntry, initials: e.target.value})}

                  </div>
                </div>
                <textarea placeholder="Remarks *" value={newEntry.remarks} onChange={e => setNewEntry({...newEntry, remarks: e.target.value})}
                  className="w-full bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2.5 outline-none focus:border-noaa-sky resize-none" rows="3" />
                <button onClick={addEntry}
                  className="w-full bg-noaa-blue hover:bg-noaa-light text-white text-sm font-bold py-2.5 rounded-lg transition-colors">
                  Add Entry
                </button>
              </div>
            )}
          </div>

          <div className="flex-1 overflow-hidden flex flex-col">
            {entries.length > 0 ? (
              <>
                <div className="bg-slate-900/50 border-b border-slate-700/50 p-2 grid grid-cols-12 gap-2 text-xs font-bold text-slate-400 uppercase">
                  <div className="col-span-2">Date</div>
                  <div className="col-span-1">Time</div>
                  <div className="col-span-2">Site</div>
                  <div className="col-span-6">Remarks</div>
                  <div className="col-span-1 text-center">Init</div>
                </div>
                <div className="flex-1 overflow-y-auto scrollbar-thin">
                  {entries.map(entry => (
                    <div key={entry.id} className="p-2 border-b border-slate-700/30 hover:bg-slate-900/30 transition-colors grid grid-cols-12 gap-2 text-sm group">
                      <div className="col-span-2 text-slate-400 font-mono text-xs">
                        {new Date(entry.date).toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: '2-digit' })}
                      </div>
                      <div className="col-span-1 text-slate-400 font-mono text-xs">{entry.time}</div>
                      <div className="col-span-2">
                        <div className="text-white text-xs font-semibold">{entry.siteName}</div>
                        <div className="text-slate-500 text-[10px] font-mono">{entry.siteCall}</div>
                      </div>
                      <div className="col-span-6 text-white text-xs leading-relaxed">{entry.remarks}</div>
                      <div className="col-span-1 flex items-center justify-between">
                        <span className="text-slate-300 font-bold text-xs">{entry.initials}</span>
                        <button onClick={() => deleteEntry(entry.id)}
                          className="opacity-0 group-hover:opacity-100 p-1 hover:bg-red-500/20 rounded text-slate-500 hover:text-red-400 transition-all">
                          <Icon name="X" className="w-3 h-3" />
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            ) : (
              <div className="flex-1 flex items-center justify-center text-center p-8">
                <div>
                  <Icon name="FileText" className="w-12 h-12 mx-auto mb-3 text-slate-600 opacity-30" />
                  <p className="text-slate-500 text-sm">No log entries</p>
                  <p className="text-slate-600 text-xs mt-1">Click + to add first entry</p>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const InspectionForm = ({ user }) => {
      const [step, setStep] = useState(1);
      const [txType, setTxType] = useState(null);
      const [isClassic, setIsClassic] = useState(false);
      const [is1KW, setIs1KW] = useState(false);

      const [saving, setSaving] = useState(false);
      const [data, setData] = useState({});

      const set = (f, v) => setData(p => ({ ...p, [f]: v }));
      const site = SITES.find(s => s.id === data.siteId);

        const s = SITES.find(x => x.id === id);
        set('siteId', id);
        if (s) {
          const t = s.tx.toLowerCase();
          if (t.includes('crown')) { setTxType('crown'); setIsClassic(false); setIs1KW(t.includes('1kw')); }
          else if (t.includes('nautel')) { setTxType('nautel'); setIsClassic(false); setIs1KW(true); setActiveTx('txa'); }
          else if (t.includes('armstrong')) { setTxType('armstrong'); setIsClassic(t.includes('classic')); setIs1KW(true); }
        }
      };

      const save = async () => {
        setSaving(true);
        try {
          await db.collection('artifacts').doc(appId).collection('public').doc('data')
            .collection('inspections').add({
              ...data, txType, isClassic, is1KW, siteName: site?.name, siteCall: site?.call,
              timestamp: new Date().toISOString(), techId: user?.uid
            });
          alert('✓ Saved!');
          setStep(1); setData({}); setTxType(null);
        } catch (e) { alert('Error: ' + e.message); }
        setSaving(false);

      const exportToPDF = () => {

          alert('Please complete at least Site and Date fields before exporting');
          return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pageWidth = doc.internal.pageSize.getWidth();
        let yPos = 20;

        // Header
        doc.setFontSize(18);
        doc.setTextColor(14, 165, 233); // noaa-sky color
        doc.text('NOAA Weather Radio Inspection Report', pageWidth / 2, yPos, { align: 'center' });
        yPos += 8;
        doc.setFontSize(11);
        doc.setTextColor(100, 116, 139);
        doc.text('EWX-NWR Compliance Inspection', pageWidth / 2, yPos, { align: 'center' });
        yPos += 15;

        doc.setFontSize(12);
        doc.setTextColor(14, 165, 233);
        doc.text('Site Information', 20, yPos);
        yPos += 8;
        doc.setFontSize(10);

        const siteInfo = [
          ['Site:', site?.name || 'N/A'],
          ['Call Sign:', site?.call || 'N/A'],
          ['Frequency:', site?.freq || 'N/A'],
          ['Transmitter:', site?.tx || 'N/A'],
          ['Date:', data.date || 'N/A'],
          ['Technician:', data.tech || 'N/A']
        ];
        siteInfo.forEach(([label, value]) => {
          doc.setTextColor(100, 116, 139);
          doc.text(label, 25, yPos);
          doc.setTextColor(0, 0, 0);
          doc.text(value, 60, yPos);
          yPos += 6;
        });
        yPos += 10;

        // Transmitter 1 Measurements
        doc.setFontSize(12);
        doc.setTextColor(14, 165, 233);
        doc.text('Transmitter 1 Measurements', 20, yPos);
        yPos += 8;
        doc.setFontSize(10);
        doc.setTextColor(0, 0, 0);
        
        // Frequency measurements
        const tx1FreqError = data.tx1_freq_error || 'N/A';
        const tx1Modulation = data.tx1_modulation || 'N/A';
        const tx1FwdPower = data.tx1_ext_fwd || 'N/A';
        
        doc.text(`Frequency Error: ${tx1FreqError} Hz`, 25, yPos);
        yPos += 6;
        doc.text(`Modulation: ${tx1Modulation} kHz`, 25, yPos);
        yPos += 6;
        doc.text(`Forward Power: ${tx1FwdPower} W`, 25, yPos);
        yPos += 12;

        // Transmitter 2 (if not Classic Armstrong)

          yPos += 6;
          doc.text(`Modulation: ${tx2Modulation} kHz`, 25, yPos);
          yPos += 6;
          doc.text(`Forward Power: ${tx2FwdPower} W`, 25, yPos);
          yPos += 12;
        }

        // Visual Inspection Checklist

          yPos = 20;

          doc.text(label, 25, yPos);

          const lines = doc.splitTextToSize(value.toString(), pageWidth - 80);

            <div className="p-5 max-h-[60vh] overflow-y-auto">{renderStep()}</div>
            <div className="p-5 border-t border-slate-700/50 bg-slate-900/50 flex justify-between items-center">
              {step > 1 ? <button onClick={() => setStep(step - 1)} className="px-5 py-2 rounded-xl bg-slate-700 text-white font-medium">← Back</button> : <div />}
              <div className="flex gap-3">
                {step === 8 && (
                  <button onClick={exportToPDF} className="px-5 py-2 rounded-xl bg-blue-600 text-white font-medium flex items-center gap-2">
                    <Icon name="FileDown" className="w-4 h-4" />
                    Export PDF
                  </button>
                )}
                {step < 8 ? (
                  <button onClick={() => setStep(step + 1)} disabled={!data.siteId} className="px-5 py-2 rounded-xl bg-noaa-light text-white font-medium disabled:opacity-50">Next →</button>
                ) : (
                  <button onClick={save} disabled={saving || !data.siteId} className="px-6 py-2 rounded-xl bg-emerald-500 text-white font-semibold disabled:opacity-50">
                    {saving ? 'Saving...' : '✓ Submit'}
                  </button>
                )}
              </div>
            </div>
          </div>
          <MaintenanceLog />
        </div>
      );
    };

    // Site Map Component
    const SiteMap = () => {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const [tooltip, setTooltip] = useState(null); // { site, x, y }

      useEffect(() => {
        if (mapRef.current && !mapInstanceRef.current) {
          // Center on Texas
          const map = L.map(mapRef.current).setView([29.5, -98.5], 7);

          // Add tile layer (CartoDB Voyager - medium tones, darkened via CSS)
          L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors, © CARTO',
            className: 'map-tiles-dark'
          }).addTo(map);

          // Custom marker icon
          const createMarkerIcon = (color) => {
            return L.divIcon({
              className: 'custom-marker',
              html: `<div style="background-color: ${color}; width: 24px; height: 24px; border-radius: 50%; border: 2px solid #1e293b; box-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 0 2px ${color}40; display: flex; align-items: center; justify-content: center;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2">
                  <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5M19.1 4.9c3.9 3.9 3.9 10.3 0 14.2M12 12h.01"/>
                </svg>
              </div>`,
              iconSize: [24, 24],
              iconAnchor: [12, 12],
              popupAnchor: [0, -12]
            });
          };

          // Add markers for each site
          SITES.forEach(site => {
            const color = site.tx.includes('Crown') ? '#14b8a6' :
                         site.tx.includes('Armstrong') ? '#3b82f6' : '#a855f7';

            const marker = L.marker([parseFloat(site.lat), parseFloat(site.lng)], {
              icon: createMarkerIcon(color)
            }).addTo(map);

            marker.on('mousemove', (e) => {
              setTooltip({ site, x: e.originalEvent.clientX, y: e.originalEvent.clientY });
            });
            marker.on('mouseout', () => setTooltip(null));
          });

          mapInstanceRef.current = map;
        }

        return () => {
          if (mapInstanceRef.current) {
            mapInstanceRef.current.remove();
            mapInstanceRef.current = null;
          }
        };
      }, []);

      // Position card to the right of cursor, flip left if near right edge
      const cardW = 220;
      const cardOffset = 16;
      const tooltipStyle = tooltip ? {
        position: 'fixed',
        left: (tooltip.x + cardOffset + cardW > window.innerWidth ? tooltip.x - cardW - cardOffset : tooltip.x + cardOffset),
        top: Math.max(8, tooltip.y - 20),
        zIndex: 99999,
        pointerEvents: 'none',
        width: cardW + 'px',
        fontFamily: 'system-ui, sans-serif',
        background: '#1e293b',
        color: '#e2e8f0',
        padding: '8px 10px',
        borderRadius: '8px',
        boxShadow: '0 4px 24px rgba(0,0,0,0.6)',
        border: '1px solid #334155',
        fontSize: '11px',
        lineHeight: '1.4',
      } : null;

      const s = tooltip ? tooltip.site : null;

      return (
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl overflow-hidden relative z-10">
          <div className="p-4 border-b border-slate-700/50 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <Icon name="MapPin" className="w-5 h-5 text-noaa-sky" />
              <h3 className="font-bold text-white">Site Locations</h3>
            </div>
            <div className="flex items-center gap-3 text-xs">
              <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-teal-500" /><span className="text-slate-400">Crown</span></div>
              <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-blue-500" /><span className="text-slate-400">Armstrong</span></div>
              <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-purple-500" /><span className="text-slate-400">Nautel</span></div>
            </div>
          </div>
          <div ref={mapRef} style={{ height: '440px', width: '100%', position: 'relative', zIndex: 1 }} />
          {tooltip && s && ReactDOM.createPortal(
            <div style={tooltipStyle}>
              <div style={{ fontWeight: 'bold', fontSize: '13px', marginBottom: '2px', color: 'white' }}>{s.name}</div>
              <div style={{ color: '#38bdf8', fontFamily: 'monospace', fontSize: '11px', marginBottom: '6px' }}>{s.call}</div>
              <div style={{ color: '#94a3b8', marginBottom: '1px' }}><strong style={{ color: '#cbd5e1' }}>Freq:</strong> {s.freq}</div>
              <div style={{ color: '#94a3b8', marginBottom: s.address || s.gateCode || s.lockboxCode || s.securityCode || s.notes ? '6px' : '0' }}><strong style={{ color: '#cbd5e1' }}>TX:</strong> {s.tx}</div>
              {s.address && (
                <div style={{ borderTop: '1px solid #334155', paddingTop: '5px', marginBottom: '5px' }}>
                  <div style={{ color: '#94a3b8', marginBottom: '2px' }}><strong style={{ color: '#cbd5e1' }}>Address:</strong> <span style={{ color: '#e2e8f0' }}>{s.address}</span></div>
                  {s.building && <div style={{ color: '#94a3b8', marginBottom: '1px' }}><strong style={{ color: '#cbd5e1' }}>Building:</strong> {s.building}</div>}
                  {s.poc && <div style={{ color: '#94a3b8' }}><strong style={{ color: '#cbd5e1' }}>POC:</strong> {s.poc}{s.phone ? ' ' + s.phone : ''}</div>}
                </div>
              )}
              {(s.gateCode || s.lockboxCode || s.securityCode) && (
                <div style={{ borderTop: '1px solid #334155', paddingTop: '5px', marginBottom: '5px', background: '#0f172a', padding: '4px 6px', borderRadius: '4px' }}>
                  <div style={{ fontSize: '9px', fontWeight: '600', color: '#38bdf8', marginBottom: '3px', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Access Codes</div>
                  {s.gateCode && <div style={{ color: '#94a3b8', marginBottom: '1px' }}><strong style={{ color: '#cbd5e1' }}>Gate:</strong> <span style={{ fontFamily: 'monospace', color: '#fbbf24' }}>{s.gateCode}</span></div>}
                  {s.lockboxCode && <div style={{ color: '#94a3b8', marginBottom: '1px' }}><strong style={{ color: '#cbd5e1' }}>Lockbox:</strong> <span style={{ fontFamily: 'monospace', color: '#fbbf24' }}>{s.lockboxCode}</span></div>}
                  {s.securityCode && <div style={{ color: '#94a3b8' }}><strong style={{ color: '#cbd5e1' }}>Security:</strong> <span style={{ fontFamily: 'monospace', color: '#fbbf24' }}>{s.securityCode}</span></div>}
                </div>
              )}
              {s.notes && (
                <div style={{ borderTop: '1px solid #334155', paddingTop: '5px' }}>
                  <div style={{ fontSize: '10px', color: '#f59e0b', background: '#451a03', padding: '3px 6px', borderRadius: '4px', borderLeft: '3px solid #f59e0b', wordWrap: 'break-word', overflowWrap: 'break-word' }}>
                    ⚠️ {s.notes}
                  </div>
                </div>
              )}
            </div>,
            document.body
          )}
        </div>
      );
    };

    // Date Picker Component
    const DatePicker = ({ value, onChange, disabled }) => {
      const [open, setOpen] = useState(false);
      const [viewDate, setViewDate] = useState(() => value ? new Date(value + 'T00:00:00') : new Date());
      const ref = useRef(null);

      useEffect(() => {
        const handleClickOutside = (e) => {
          if (ref.current && !ref.current.contains(e.target)) setOpen(false);
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      useEffect(() => {
        if (value) setViewDate(new Date(value + 'T00:00:00'));
      }, [value]);

      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const monthName = viewDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(i);

      const selectDate = (day) => {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        onChange(dateStr);
        setOpen(false);
      };

      const formatDisplay = (dateStr) => {
        if (!dateStr) return 'Select date...';
        const d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
      };

      const today = new Date().toISOString().split('T')[0];

      return (
        <div className="relative" ref={ref}>
          <button
            type="button"
            onClick={() => !disabled && setOpen(!open)}
            disabled={disabled}
            className={`w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 text-left flex items-center justify-between ${disabled ? 'opacity-70 cursor-not-allowed' : 'hover:border-slate-600 cursor-pointer'}`}
          >
            <div className="flex items-center gap-2">
              <Icon name="Calendar" className="w-4 h-4 text-noaa-sky" />
              <span className={value ? 'text-white' : 'text-slate-500'}>{formatDisplay(value)}</span>
            </div>
            {!disabled && <Icon name="ChevronDown" className={`w-4 h-4 text-slate-400 transition-transform ${open ? 'rotate-180' : ''}`} />}
          </button>

          {open && (
            <div className="absolute top-full left-0 mt-2 bg-slate-800 border border-slate-600 rounded-xl shadow-2xl z-50 p-3 w-72">
              <div className="flex items-center justify-between mb-3">
                <button type="button" onClick={() => setViewDate(new Date(year, month - 1, 1))} className="p-1.5 hover:bg-slate-700 rounded-lg">
                  <Icon name="ChevronLeft" className="w-4 h-4 text-slate-400" />
                </button>
                <span className="text-white font-semibold text-sm">{monthName}</span>
                <button type="button" onClick={() => setViewDate(new Date(year, month + 1, 1))} className="p-1.5 hover:bg-slate-700 rounded-lg">
                  <Icon name="ChevronRight" className="w-4 h-4 text-slate-400" />
                </button>
              </div>
              <div className="grid grid-cols-7 gap-1 mb-1">
                {['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'].map(d => (
                  <div key={d} className="text-center text-xs font-semibold text-slate-500 py-1">{d}</div>
                ))}
              </div>
              <div className="grid grid-cols-7 gap-1">
                {days.map((day, idx) => {
                  if (!day) return <div key={idx} className="h-8" />;
                  const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                  const isSelected = dateStr === value;
                  const isToday = dateStr === today;
                  return (
                    <button
                      key={idx}
                      type="button"
                      onClick={() => selectDate(day)}
                      className={`h-8 w-8 rounded-lg text-sm font-medium transition-all flex items-center justify-center mx-auto
                        ${isSelected ? 'bg-noaa-sky text-white' : isToday ? 'bg-noaa-sky/20 text-noaa-sky ring-1 ring-noaa-sky/50' : 'text-slate-300 hover:bg-slate-700'}`}
                    >
                      {day}
                    </button>
                  );
                })}
              </div>
              <div className="mt-3 pt-3 border-t border-slate-700 flex justify-between">
                <button type="button" onClick={() => { onChange(today); setOpen(false); }} className="text-xs text-noaa-sky hover:text-noaa-light font-medium">Today</button>
                <button type="button" onClick={() => setOpen(false)} className="text-xs text-slate-400 hover:text-white font-medium">Close</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    // Maintenance Calendar
    const MaintenanceCalendar = () => {
      const [currentDate, setCurrentDate] = useState(new Date());
      const [events, setEvents] = useState(() => {
        // Clear any legacy keys from older versions
        localStorage.removeItem('nwr_calendar_events');
        localStorage.removeItem('nwr_calendar_events_v3');
        const saved = localStorage.getItem('nwr_calendar_events_v3');
        return saved ? JSON.parse(saved) : [];
      });
      const [showModal, setShowModal] = useState(false);
      const [editEvent, setEditEvent] = useState(null);
      const [isEditing, setIsEditing] = useState(false);
      const [form, setForm] = useState({ date: '', siteId: '', type: 'routine', notes: '' });

      useEffect(() => {
        localStorage.setItem('nwr_calendar_events_v3', JSON.stringify(events));
        const ts = new Date().toISOString(); localStorage.setItem('nwr-last-updated', ts); window.dispatchEvent(new CustomEvent('nwr-last-updated', { detail: ts }));
      }, [events]);

      const today = new Date().toISOString().split('T')[0];
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const monthName = currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const getEventStatus = (event) => {
        if (event.completed) return 'completed';
        if (event.date < today) return 'pastdue';
        if (event.date === today) return 'duetoday';
        return 'scheduled';
      };

      const statusColors = {
        scheduled: 'bg-blue-600 hover:bg-blue-500',
        duetoday: 'bg-amber-500 hover:bg-amber-400',
        pastdue: 'bg-red-600 hover:bg-red-500',
        completed: 'bg-emerald-700 hover:bg-emerald-600'
      };

      const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
      const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));

      const openAddModal = (date) => {
        setEditEvent(null);
        setIsEditing(true);
        setForm({ date: date || today, siteId: '', type: 'routine', notes: '' });
        setShowModal(true);
      };

      const openEditModal = (event) => {
        setEditEvent(event);
        setIsEditing(false);
        setForm({ date: event.date, siteId: event.siteId, type: event.type, notes: event.notes || '' });
        setShowModal(true);
      };

      const saveEvent = () => {
        if (!form.date || !form.siteId) return alert('Please select date and site');
        if (editEvent) {
          setEvents(events.map(e => e.id === editEvent.id ? { ...e, ...form } : e));
        } else {
          setEvents([...events, { id: Date.now(), ...form, completed: false }]);
        }
        setShowModal(false);
        setIsEditing(false);
      };

      const deleteEvent = (id) => {
        if (confirm('Delete this event?')) {
          setEvents(events.filter(e => e.id !== id));
          setShowModal(false);
        }
      };

      const toggleComplete = (id) => {
        setEvents(events.map(e => e.id === id ? { ...e, completed: !e.completed } : e));
      };

      const getEventsForDate = (day) => {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        return events.filter(e => e.date === dateStr);
      };

      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(i);

      return (
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl overflow-hidden">
          <div className="p-4 border-b border-slate-700/50 flex items-center justify-between flex-wrap gap-2">
            <div className="flex items-center gap-2">
              <Icon name="Calendar" className="w-5 h-5 text-noaa-sky" />
              <h3 className="font-bold text-white text-lg">Maintenance Calendar</h3>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={prevMonth} className="p-2 hover:bg-slate-700 rounded-lg"><Icon name="ChevronLeft" className="w-5 h-5 text-slate-400" /></button>
              <span className="text-white font-semibold w-40 text-center">{monthName}</span>
              <button onClick={nextMonth} className="p-2 hover:bg-slate-700 rounded-lg"><Icon name="ChevronRight" className="w-5 h-5 text-slate-400" /></button>
              <button onClick={() => openAddModal()} className="ml-3 px-4 py-2 bg-noaa-sky text-white text-sm font-semibold rounded-lg flex items-center gap-1.5">
                <Icon name="Plus" className="w-4 h-4" /> Add Event
              </button>
            </div>
          </div>

          <div className="p-4">
            <div className="grid grid-cols-7 gap-1.5 mb-2">
              {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => (
                <div key={d} className="text-center text-sm font-semibold text-slate-400 py-2">{d}</div>
              ))}
            </div>
            <div className="grid grid-cols-7 gap-1.5">
              {days.map((day, idx) => {
                if (!day) return <div key={idx} className="min-h-28 bg-slate-900/30 rounded-lg" />;
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayEvents = getEventsForDate(day);
                const isToday = dateStr === today;
                return (
                  <div key={idx} onClick={() => openAddModal(dateStr)}
                    className={`min-h-28 p-2 rounded-lg cursor-pointer transition-all hover:ring-2 hover:ring-noaa-sky/50 ${isToday ? 'bg-noaa-sky/15 ring-2 ring-noaa-sky/40' : 'bg-slate-900/50'}`}>
                    <div className={`text-sm font-bold mb-1.5 ${isToday ? 'text-noaa-sky' : 'text-slate-300'}`}>{day}</div>
                    <div className="space-y-1">
                      {dayEvents.slice(0, 3).map(ev => {
                        const site = SITES.find(s => s.id === ev.siteId);
                        const status = getEventStatus(ev);
                        return (
                          <div key={ev.id} onClick={(e) => { e.stopPropagation(); openEditModal(ev); }}
                            className={`text-[11px] px-1.5 py-1 rounded cursor-pointer flex items-center gap-1 w-full text-white transition-colors ${statusColors[status]}`}>
                            <Icon name={ev.type === 'routine' ? 'Glasses' : 'Wrench'} className="w-3 h-3 flex-shrink-0 opacity-90" />
                            <span className="font-semibold flex-shrink-0">{site?.id || ev.siteId}</span>
                            {ev.notes && <span className="truncate opacity-80 min-w-0">&nbsp;·&nbsp;{ev.notes}</span>}
                          </div>
                        );
                      })}
                      {dayEvents.length > 3 && <div className="text-[11px] text-slate-400 pl-1 font-medium">+{dayEvents.length - 3} more</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Legend */}
          <div className="px-4 pb-4 flex flex-wrap gap-4 text-sm border-t border-slate-700/50 pt-4">
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded bg-blue-500" /><span className="text-slate-300">Scheduled</span></div>
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded bg-amber-500" /><span className="text-slate-300">Due Today</span></div>
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded bg-red-500" /><span className="text-slate-300">Past Due</span></div>
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded bg-emerald-500" /><span className="text-slate-300">Completed</span></div>
            <span className="text-slate-600">|</span>
            <div className="flex items-center gap-2"><Icon name="Glasses" className="w-4 h-4 text-slate-400" /><span className="text-slate-300">Routine</span></div>
            <div className="flex items-center gap-2"><Icon name="Wrench" className="w-4 h-4 text-slate-400" /><span className="text-slate-300">Non-Routine</span></div>
          </div>

          {/* Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onClick={() => { setShowModal(false); setIsEditing(false); }}>
              <div className="bg-slate-800 border border-slate-700 rounded-xl p-5 w-full max-w-md" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-lg font-bold text-white">
                    {editEvent ? (isEditing ? 'Edit Event' : 'Event Details') : 'Add Event'}
                  </h3>
                  <button type="button" onClick={() => { setShowModal(false); setIsEditing(false); }} className="text-slate-400 hover:text-white"><Icon name="X" className="w-5 h-5" /></button>
                </div>
                <div className="space-y-4">
                  <div>
                    <label className="block text-xs text-slate-400 uppercase font-semibold mb-1">Date</label>
                    {isEditing ? (
                      <DatePicker value={form.date} onChange={(d) => setForm({ ...form, date: d })} disabled={false} />
                    ) : (
                      <div className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 flex items-center gap-2 opacity-70">
                        <Icon name="Calendar" className="w-4 h-4 text-noaa-sky" />
                        <span>{form.date ? new Date(form.date + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }) : 'No date'}</span>
                      </div>
                    )}
                  </div>
                  <div>
                    <label className="block text-xs text-slate-400 uppercase font-semibold mb-1">Site</label>
                    {isEditing ? (
                      <select value={form.siteId} onChange={e => setForm({ ...form, siteId: e.target.value })}
                        className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 focus:border-noaa-sky outline-none">
                        <option value="">— Select Site —</option>
                        {SITES.map(s => <option key={s.id} value={s.id}>{s.name} ({s.call})</option>)}
                      </select>
                    ) : (
                      <div className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 opacity-70">
                        {SITES.find(s => s.id === form.siteId)?.name || form.siteId || 'No site selected'}
                      </div>
                    )}
                  </div>
                  <div>
                    <label className="block text-xs text-slate-400 uppercase font-semibold mb-1">Type</label>
                    {isEditing ? (
                      <div className="flex gap-4">
                        <label className="flex items-center gap-2 cursor-pointer">
                          <input type="radio" checked={form.type === 'routine'} onChange={() => setForm({ ...form, type: 'routine' })} />
                          <Icon name="Glasses" className="w-4 h-4 text-slate-400" />
                          <span className="text-white text-sm">Routine Inspection</span>
                        </label>
                        <label className="flex items-center gap-2 cursor-pointer">
                          <input type="radio" checked={form.type === 'nonroutine'} onChange={() => setForm({ ...form, type: 'nonroutine' })} />
                          <Icon name="Wrench" className="w-4 h-4 text-slate-400" />
                          <span className="text-white text-sm">Non-Routine</span>
                        </label>
                      </div>
                    ) : (
                      <div className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 opacity-70 flex items-center gap-2">
                        <Icon name={form.type === 'routine' ? 'Glasses' : 'Wrench'} className="w-4 h-4 text-slate-400" />
                        <span>{form.type === 'routine' ? 'Routine Inspection' : 'Non-Routine'}</span>
                      </div>
                    )}
                  </div>
                  <div>
                    <label className="block text-xs text-slate-400 uppercase font-semibold mb-1">Notes</label>
                    {isEditing ? (
                      <textarea value={form.notes} onChange={e => setForm({ ...form, notes: e.target.value })} rows={2}
                        className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 focus:border-noaa-sky outline-none resize-none" />
                    ) : (
                      <div className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 opacity-70 min-h-[60px]">
                        {form.notes || 'No notes'}
                      </div>
                    )}
                  </div>
                  {editEvent && (
                    <div className="flex items-center justify-between p-3 bg-slate-900/50 rounded-lg border border-slate-700/50">
                      <span className="text-sm text-slate-300">Status</span>
                      <button type="button" onClick={() => { toggleComplete(editEvent.id); setEditEvent({...editEvent, completed: !editEvent.completed}); }}
                        className={`px-3 py-1.5 rounded-lg text-sm font-medium ${events.find(e=>e.id===editEvent.id)?.completed ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-700 text-slate-300'}`}>
                        {events.find(e=>e.id===editEvent.id)?.completed ? '✓ Completed' : 'Mark Complete'}
                      </button>
                    </div>
                  )}
                </div>
                <div className="flex gap-3 mt-5">
                  {editEvent && (
                    <button type="button" onClick={() => deleteEvent(editEvent.id)}
                      className="px-4 py-2 bg-red-500/20 text-red-400 rounded-lg font-medium hover:bg-red-500/30">Delete</button>
                  )}
                  <div className="flex-1" />
                  <button type="button" onClick={() => { setShowModal(false); setIsEditing(false); }} className="px-4 py-2 bg-slate-700 text-white rounded-lg font-medium">Cancel</button>
                  {editEvent && !isEditing && (
                    <button type="button" onClick={() => setIsEditing(true)} className="px-4 py-2 bg-amber-500 text-white rounded-lg font-medium hover:bg-amber-400">Edit</button>
                  )}
                  {isEditing && (
                    <button type="button" onClick={saveEvent} className="px-4 py-2 bg-noaa-sky text-white rounded-lg font-medium">{editEvent ? 'Save' : 'Add'}</button>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // Dashboard
    // Site Status Overview
    const SiteStatusOverview = () => {
      const [statuses, setStatuses] = useState(() => {
        const saved = localStorage.getItem('nwr-site-status');
        return saved ? JSON.parse(saved) : {};
      });
      const getStatus = (id) => statuses[id] || 'ONLINE';
      const updateStatus = (id, value) => {
        const updated = { ...statuses, [id]: value };
        setStatuses(updated);
        localStorage.setItem('nwr-site-status', JSON.stringify(updated));
        const ts = new Date().toISOString(); localStorage.setItem('nwr-last-updated', ts); window.dispatchEvent(new CustomEvent('nwr-last-updated', { detail: ts }));
      };
      useEffect(() => {
        const onStorage = (e) => {
          if (e.key === 'nwr-site-status') {
            setStatuses(e.newValue ? JSON.parse(e.newValue) : {});
          }
        };
        window.addEventListener('storage', onStorage);
        return () => window.removeEventListener('storage', onStorage);
      }, []);
      const statusColor = (s) => s === 'ONLINE' ? 'text-emerald-400' : s === 'DEGRADED' ? 'text-yellow-400' : 'text-red-400';
      const statusBg = (s) => s === 'ONLINE' ? 'border-emerald-500/30 bg-emerald-500/5' : s === 'DEGRADED' ? 'border-yellow-500/30 bg-yellow-500/5' : 'border-red-500/30 bg-red-500/5';
      const faceIcon = (s) => s === 'ONLINE' ? 'Smile' : s === 'DEGRADED' ? 'Meh' : 'Frown';
      return (
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-5">
          <div className="flex items-center gap-2 mb-4">
            <Icon name="Activity" className="w-4 h-4 text-noaa-sky" />
            <h3 className="font-bold text-white">Site Status Overview</h3>
          </div>
          <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
            {SITES.map(site => {
              const s = getStatus(site.id);
              return (
                <div key={site.id} className={`rounded-xl border p-3 text-center ${statusBg(s)}`}>
                  <Icon name={faceIcon(s)} className={`w-8 h-8 mx-auto mb-1 ${statusColor(s)}`} />
                  <p className="font-bold text-white text-sm">{site.name}</p>
                  <p className="text-slate-500 text-xs">{site.call}</p>
                  <select value={s} onChange={e => updateStatus(site.id, e.target.value)}
                    className="mt-1 w-full text-xs font-bold rounded px-1 py-0.5 bg-slate-900 border border-slate-600 text-white cursor-pointer">
                    <option value="ONLINE">ONLINE</option>
                    <option value="DEGRADED">DEGRADED</option>
                    <option value="OFFLINE">OFFLINE</option>
                  </select>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    const Dashboard = ({ setTab }) => {
      const [events] = useState(() => {
        const saved = localStorage.getItem('nwr_calendar_events_v3');
        return saved ? JSON.parse(saved) : [];
      });

      const today = new Date().toISOString().split('T')[0];
      const scheduled = events.filter(e => !e.completed && e.date >= today).length;
      const pastDue = events.filter(e => !e.completed && e.date < today).length;
      const completed = events.filter(e => e.completed).length;

      const [lastUpdatedRaw, setLastUpdatedRaw] = React.useState(() => localStorage.getItem('nwr-last-updated'));
      React.useEffect(() => {
        const onStorage = (e) => { if (e.key === 'nwr-last-updated') setLastUpdatedRaw(e.newValue); };
        const onCustom = (e) => setLastUpdatedRaw(e.detail);
        window.addEventListener('storage', onStorage);
        window.addEventListener('nwr-last-updated', onCustom);
        return () => { window.removeEventListener('storage', onStorage); window.removeEventListener('nwr-last-updated', onCustom); };
      }, []);
      const lastUpdated = lastUpdatedRaw
        ? new Date(lastUpdatedRaw).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true })
        : 'No changes recorded yet';

      return (
        <div className="space-y-6 animate-in">
          <p className="text-xs text-slate-500">Last Updated: {lastUpdated}</p>
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            {[
              { t: 'Sites', v: '12', l: 'Operational', c: 'noaa-sky', i: 'Radio' },
              { t: 'Scheduled', v: String(scheduled), l: 'Upcoming', c: 'blue', i: 'Calendar' },
              { t: 'Past Due', v: String(pastDue), l: pastDue > 0 ? 'Action Needed' : 'None', c: pastDue > 0 ? 'red' : 'emerald', i: 'AlertTriangle' },
              { t: 'Completed', v: String(completed), l: 'This Period', c: 'emerald', i: 'CheckCircle' }
            ].map((s, i) => (
              <div key={i} className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
                <div className="flex justify-between">
                  <div>
                    <p className="text-slate-500 text-xs uppercase">{s.t}</p>
                    <h3 className="text-2xl font-bold text-white">{s.v}</h3>
                    <p className={`text-xs text-${s.c}-400`}>{s.l}</p>
                  </div>
                  <div className={`p-2 rounded-lg bg-${s.c}-500/10`}><Icon name={s.i} className={`w-5 h-5 text-${s.c}-400`} /></div>
                </div>
              </div>
            ))}
          </div>

          <SiteStatusOverview />

          <div className="grid lg:grid-cols-4 gap-6">
            <div className="lg:col-span-3 space-y-6">
              <SiteMap />
              <MaintenanceCalendar />
            </div>
            <div className="space-y-4">
              <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-5">
                <h3 className="font-bold text-white mb-4 flex items-center gap-2">
                  <Icon name="Zap" className="w-4 h-4 text-noaa-sky" /> Quick Actions
                </h3>
                <div className="space-y-3">
                  <button onClick={() => setTab('forms')} className="w-full p-4 bg-slate-900/50 border border-slate-700/50 rounded-xl text-left hover:border-noaa-sky/50">
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 rounded-lg bg-noaa-sky/20 flex items-center justify-center"><Icon name="ClipboardList" className="w-5 h-5 text-noaa-sky" /></div>
                      <div><p className="font-medium text-white">Start Inspection</p><p className="text-xs text-slate-500">EWX-NWR Form</p></div>
                    </div>
                  </button>
                  <button onClick={() => setTab('sites')} className="w-full p-4 bg-slate-900/50 border border-slate-700/50 rounded-xl text-left hover:border-emerald-500/50">
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center"><Icon name="MapPin" className="w-5 h-5 text-emerald-400" /></div>
                      <div><p className="font-medium text-white">View Sites</p><p className="text-xs text-slate-500">Directory</p></div>
                    </div>
                  </button>
                </div>
              </div>
              <NWRUPCard />
              <PartsTracker />
            </div>
          </div>
        </div>
      );
    };

    // Analytics & Trend Analysis
    const Analytics = () => {
      const [inspections, setInspections] = useState([]);
      const [logEntries, setLogEntries] = useState([]);
      const [loading, setLoading] = useState(true);
      const [timeRange, setTimeRange] = useState('30'); // days
      const [selectedSite, setSelectedSite] = useState('all');
      const [selectedMetric, setSelectedMetric] = useState('frequency');

      useEffect(() => {
        const fetchInspections = async () => {
          try {
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - parseInt(timeRange));
            let query = db.collection('artifacts').doc(appId).collection('public').doc('data')
              .collection('inspections').orderBy('timestamp', 'desc');
            if (selectedSite !== 'all') query = query.where('siteId', '==', selectedSite);
            const snapshot = await query.get();
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
              .filter(d => new Date(d.timestamp) >= cutoff);
            setInspections(data);
          } catch (e) {
            console.error('Error fetching:', e);
          }
          setLoading(false);
        };

        fetchInspections();
        const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data')
          .collection('inspections').onSnapshot(() => fetchInspections());
        return () => unsubscribe();
      }, [timeRange, selectedSite]);

      // Load and filter maintenance log entries
      useEffect(() => {
        const saved = localStorage.getItem('nwr-maintenance-log');
        if (saved) {
          const allLogs = JSON.parse(saved);
          const cutoff = new Date();
          cutoff.setDate(cutoff.getDate() - parseInt(timeRange));
          
          let filtered = allLogs.filter(log => new Date(log.timestamp) >= cutoff);
          
          if (selectedSite !== 'all') {
            filtered = filtered.filter(log => log.siteId === selectedSite);
          }
          
          setLogEntries(filtered);
        } else {
          setLogEntries([]);
        }
      }, [timeRange, selectedSite]);

      const exportCSV = () => {
        if (!inspections.length && !logEntries.length) return alert('No data to export');
        
        const headers = ['Type', 'Timestamp', 'Site', 'Call Sign', 'TX Type', 'TX1 Freq Error', 'TX2 Freq Error', 
          'TX1 Modulation', 'TX2 Modulation', 'TX1 Fwd Pwr', 'TX2 Fwd Pwr', 'Remarks', 'Initials', 'Tech ID'];
        
        const inspectionRows = inspections.map(i => [
          'Inspection', i.timestamp, i.siteName || i.siteId, i.siteCall, i.txType,
          i.tx1_freq_error || '', i.tx2_freq_error || '',
          i.tx1_mod_deviation || '', i.tx2_mod_deviation || '',
          i.tx1_ext_fwd || i.tx1_fwd_ext || '', i.tx2_ext_fwd || i.tx2_fwd_ext || '',
          '', '', i.techId
        ]);
        
        const logRows = logEntries.map(log => [
          'Log Entry', log.timestamp, log.siteName, log.siteCall, '', '', '', '', '', '', '',
          log.remarks, log.initials, ''
        ]);
        
        const csv = [headers, ...inspectionRows, ...logRows].map(row => row.join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `nwr-maintenance-data-${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
      };

      const getMetricData = () => {
        const metricMap = {
          frequency: { field: 'freq_error', label: 'Frequency Error (Hz)', threshold: 200 },
          modulation: { field: 'mod_deviation', label: 'Modulation (kHz)', threshold: null },
          power: { field: 'ext_fwd', label: 'Forward Power (W)', threshold: null }
        };
        
        const metric = metricMap[selectedMetric];
        const data = inspections.flatMap(i => [
          { site: i.siteName || i.siteId, date: i.timestamp, value: parseFloat(i[`tx1_${metric.field}`]), tx: 'TX1' },
          { site: i.siteName || i.siteId, date: i.timestamp, value: parseFloat(i[`tx2_${metric.field}`]), tx: 'TX2' }
        ]).filter(d => !isNaN(d.value));

        return { data, metric };
      };

      const { data: metricData, metric } = getMetricData();

      const stats = {
        total: inspections.length,
        logEntries: logEntries.length,
        sites: [...new Set([...inspections.map(i => i.siteId), ...logEntries.map(l => l.siteId)])].length,
        avgFreqError: inspections.length > 0 ? 
          (inspections.reduce((sum, i) => sum + Math.abs(parseFloat(i.tx1_freq_error) || 0) + Math.abs(parseFloat(i.tx2_freq_error) || 0), 0) / (inspections.length * 2)).toFixed(1) : 0,
        outOfSpec: inspections.filter(i => Math.abs(parseFloat(i.tx1_freq_error)) > 200 || Math.abs(parseFloat(i.tx2_freq_error)) > 200).length
      };

      if (loading) {
        return (
          <div className="flex items-center justify-center h-64">
            <Icon name="Loader2" className="w-8 h-8 text-noaa-sky animate-spin" />
          </div>
        );
      }

      return (
        <div className="space-y-6 animate-in">
          {/* Header */}
          <div className="flex flex-col sm:flex-row justify-between gap-4">
            <div>
              <h2 className="text-2xl font-bold text-white flex items-center gap-2">
                <Icon name="TrendingUp" className="w-6 h-6 text-noaa-sky" /> Trend Analysis
              </h2>
              <p className="text-sm text-slate-400 mt-1">Real-time inspection data and performance metrics</p>
            </div>
            <button onClick={exportCSV} 
              className="px-4 py-2 bg-noaa-blue hover:bg-noaa-light text-white rounded-lg flex items-center gap-2 transition-all font-medium">
              <Icon name="Download" className="w-4 h-4" /> Export CSV
            </button>
          </div>

          {/* Filters */}
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
              <label className="block text-xs text-slate-400 uppercase font-semibold mb-2">Time Range</label>
              <select value={timeRange} onChange={e => setTimeRange(e.target.value)}
                className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 text-sm">
                <option value="7">Last 7 Days</option>
                <option value="30">Last 30 Days</option>
                <option value="90">Last 90 Days</option>
                <option value="365">Last Year</option>
              </select>
            </div>
            <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
              <label className="block text-xs text-slate-400 uppercase font-semibold mb-2">Site Filter</label>
              <select value={selectedSite} onChange={e => setSelectedSite(e.target.value)}
                className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 text-sm">
                <option value="all">All Sites</option>
                {SITES.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
              <label className="block text-xs text-slate-400 uppercase font-semibold mb-2">Metric</label>
              <select value={selectedMetric} onChange={e => setSelectedMetric(e.target.value)}
                className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 text-sm">
                <option value="frequency">Frequency Error</option>
                <option value="modulation">Modulation Deviation</option>
                <option value="power">Forward Power</option>
              </select>
            </div>
          </div>

          {/* Stats Cards */}
          <div className="grid grid-cols-2 lg:grid-cols-5 gap-4">
            <div className="bg-gradient-to-br from-blue-500/10 to-blue-600/5 border border-blue-500/30 rounded-xl p-4">
              <div className="flex items-center gap-3">
                <Icon name="FileText" className="w-8 h-8 text-blue-400" />
                <div>
                  <p className="text-2xl font-bold text-white">{stats.total}</p>
                  <p className="text-xs text-slate-400 uppercase">Inspections</p>
                </div>
              </div>
            </div>
            <div className="bg-gradient-to-br from-amber-500/10 to-amber-600/5 border border-amber-500/30 rounded-xl p-4">
              <div className="flex items-center gap-3">
                <Icon name="ScrollText" className="w-8 h-8 text-amber-400" />
                <div>
                  <p className="text-2xl font-bold text-white">{stats.logEntries}</p>
                  <p className="text-xs text-slate-400 uppercase">Log Entries</p>
                </div>
              </div>
            </div>
            <div className="bg-gradient-to-br from-emerald-500/10 to-emerald-600/5 border border-emerald-500/30 rounded-xl p-4">
              <div className="flex items-center gap-3">
                <Icon name="Radio" className="w-8 h-8 text-emerald-400" />
                <div>
                  <p className="text-2xl font-bold text-white">{stats.sites}</p>
                  <p className="text-xs text-slate-400 uppercase">Sites Covered</p>
                </div>
              </div>
            </div>
            <div className="bg-gradient-to-br from-cyan-500/10 to-cyan-600/5 border border-cyan-500/30 rounded-xl p-4">
              <div className="flex items-center gap-3">
                <Icon name="Activity" className="w-8 h-8 text-cyan-400" />
                <div>
                  <p className="text-2xl font-bold text-white">±{stats.avgFreqError} Hz</p>
                  <p className="text-xs text-slate-400 uppercase">Avg Freq Error</p>
                </div>
              </div>
            </div>
            <div className={`bg-gradient-to-br ${stats.outOfSpec > 0 ? 'from-red-500/10 to-red-600/5 border-red-500/30' : 'from-emerald-500/10 to-emerald-600/5 border-emerald-500/30'} border rounded-xl p-4`}>
              <div className="flex items-center gap-3">
                <Icon name={stats.outOfSpec > 0 ? "AlertTriangle" : "CheckCircle"} className={`w-8 h-8 ${stats.outOfSpec > 0 ? 'text-red-400' : 'text-emerald-400'}`} />
                <div>
                  <p className="text-2xl font-bold text-white">{stats.outOfSpec}</p>
                  <p className="text-xs text-slate-400 uppercase">Out of Spec</p>
                </div>
              </div>
            </div>
          </div>

          {/* Chart */}
          <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-6">
            <h3 className="text-lg font-bold text-white mb-4">{metric.label} Over Time</h3>
            {metricData.length > 0 ? (
              <div className="space-y-4">
                {[...new Set(metricData.map(d => d.site))].map(site => {
                  const siteData = metricData.filter(d => d.site === site);
                  return (
                    <div key={site} className="border-b border-slate-700/50 pb-4 last:border-0">
                      <p className="text-sm font-bold text-slate-300 mb-2">{site}</p>
                      <div className="grid grid-cols-2 gap-4">
                        {['TX1', 'TX2'].map(tx => {
                          const txData = siteData.filter(d => d.tx === tx);
                          const avg = txData.length > 0 ? (txData.reduce((sum, d) => sum + d.value, 0) / txData.length).toFixed(2) : 'N/A';
                          const min = txData.length > 0 ? Math.min(...txData.map(d => d.value)).toFixed(2) : 'N/A';
                          const max = txData.length > 0 ? Math.max(...txData.map(d => d.value)).toFixed(2) : 'N/A';
                          
                          return (
                            <div key={tx} className="bg-slate-900/50 rounded-lg p-3">
                              <p className="text-xs font-bold text-noaa-sky mb-2">{tx}</p>
                              <div className="space-y-1 text-xs">
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Avg:</span>
                                  <span className="text-white font-mono">{avg}</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Min:</span>
                                  <span className="text-emerald-400 font-mono">{min}</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Max:</span>
                                  <span className="text-red-400 font-mono">{max}</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Count:</span>
                                  <span className="text-white font-mono">{txData.length}</span>
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            ) : (
              <div className="text-center py-12">
                <Icon name="BarChart3" className="w-12 h-12 text-slate-600 mx-auto mb-3" />
                <p className="text-slate-400">No inspection data available for selected filters</p>
              </div>
            )}
          </div>

          {/* Recent Inspections Table */}
          <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-6">
            <h3 className="text-lg font-bold text-white mb-4 flex items-center gap-2">
              <Icon name="Clock" className="w-5 h-5 text-noaa-sky" /> Recent Inspections
            </h3>
            {inspections.length > 0 ? (
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="border-b border-slate-700">
                      <th className="text-left py-2 px-3 text-slate-400 font-semibold">Date</th>
                      <th className="text-left py-2 px-3 text-slate-400 font-semibold">Site</th>
                      <th className="text-left py-2 px-3 text-slate-400 font-semibold">TX Type</th>
                      <th className="text-right py-2 px-3 text-slate-400 font-semibold">TX1 Freq</th>
                      <th className="text-right py-2 px-3 text-slate-400 font-semibold">TX2 Freq</th>

    // Admin Tab
    const AdminTab = () => {
      const [statuses, setStatuses] = useState(() => {
        const saved = localStorage.getItem('nwr-site-status');
        return saved ? JSON.parse(saved) : {};
      });
      const getStatus = (id) => statuses[id] || 'ONLINE';
      const cycleStatus = (id) => {
        const order = ['ONLINE', 'DEGRADED', 'OFFLINE'];
        const current = getStatus(id);
        const next = order[(order.indexOf(current) + 1) % order.length];
        const updated = { ...statuses, [id]: next };
        setStatuses(updated);
        localStorage.setItem('nwr-site-status', JSON.stringify(updated));
        const ts = new Date().toISOString(); localStorage.setItem('nwr-last-updated', ts); window.dispatchEvent(new CustomEvent('nwr-last-updated', { detail: ts }));
      };
      const statusColor = (s) => s === 'ONLINE' ? 'text-emerald-400 border-emerald-500/40 bg-emerald-500/10' : s === 'DEGRADED' ? 'text-yellow-400 border-yellow-500/40 bg-yellow-500/10' : 'text-red-400 border-red-500/40 bg-red-500/10';
      return (

              <div className="absolute inset-0 opacity-20" style={{
