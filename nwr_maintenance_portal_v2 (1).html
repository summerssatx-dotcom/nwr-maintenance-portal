    // Error Boundary Component
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, errorInfo: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true };
      }

      componentDidCatch(error, errorInfo) {
        console.error('ErrorBoundary caught an error:', error, errorInfo);
        this.setState({ error, errorInfo });
      }

      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">

    // Form Components
    const Section = ({ title, num, note }) => (

        <div>

    const Input = React.memo(({ label, field, data, set, type = 'text', unit, small, classic }) => (
      <div className={classic ? 'classic-field pl-2' : ''}>
        <label className={`block text-slate-400 mb-1 ${small ? 'text-[10px]' : 'text-xs'} uppercase font-semibold`}>

        />

    const Textarea = React.memo(({ label, field, data, set, rows = 3 }) => (
      <div>
        <label className="block text-slate-400 mb-1 text-xs uppercase font-semibold">{label}</label>
        <textarea
          value={data[field] || ''}
          onChange={e => set(field, e.target.value)}

    const Radio = ({ label, field, data, set, options }) => (
      <div className="p-3 bg-slate-900/50 rounded-lg border border-slate-700/50">

                <input type="radio" checked={data[field] === o.value} onChange={() => set(field, o.value)} className="text-noaa-sky" />
                {o.label}
              </label>
            ))}
          </div>
        </div>

    const DualInput = React.memo(({ label, dbm, vrms, data, set }) => (
      <div>
        <label className="block text-slate-400 mb-1 text-xs uppercase font-semibold">{label}</label>
        <div className="flex gap-2">
          <div className="flex-1">
            <input type="number" value={data[dbm] || ''} onChange={e => set(dbm, e.target.value)} placeholder="dBm"
              className="w-full bg-slate-900/80 border border-slate-700/50 text-white rounded-lg p-2 text-sm focus:border-noaa-sky outline-none" />
            <span className="text-[10px] text-slate-500">dBm</span>
          </div>
          <span className="text-slate-500 self-center text-xs">or</span>
          <div className="flex-1">
            <input type="number" value={data[vrms] || ''} onChange={e => set(vrms, e.target.value)} placeholder="Vrms"
              className="w-full bg-slate-900/80 border border-slate-700/50 text-white rounded-lg p-2 text-sm focus:border-noaa-sky outline-none" />

          </div>
        </div>

    // Main Form
    // Facility Maintenance Log (FAA 6030-1 style)
    const MaintenanceLog = () => {
      const [entries, setEntries] = useState([]);
      const [showAdd, setShowAdd] = useState(false);
      const [newEntry, setNewEntry] = useState({ siteId: '', time: '', remarks: '', initials: '' });

      useEffect(() => {
        const saved = localStorage.getItem('nwr-maintenance-log');
        if (saved) setEntries(JSON.parse(saved));
      }, []);

      useEffect(() => {
        // Auto-populate current time when adding new entry
        if (showAdd && !newEntry.time) {
          const now = new Date();
          const time24 = now.toTimeString().split(' ')[0].substring(0, 5); // HH:MM
          setNewEntry(prev => ({ ...prev, time: time24 }));
        }
      }, [showAdd]);

      const saveEntries = (updated) => {
        setEntries(updated);
        localStorage.setItem('nwr-maintenance-log', JSON.stringify(updated));
      };

      const addEntry = () => {
        // Input validation
        if (!newEntry.siteId) {
          alert('⚠️ Please select a site');
          return;
        }
        if (!newEntry.time) {
          alert('⚠️ Please enter the time');
          return;
        }
        if (!newEntry.remarks || newEntry.remarks.trim().length === 0) {
          alert('⚠️ Please enter remarks');
          return;
        }
        if (!newEntry.initials || newEntry.initials.trim().length === 0) {
          alert('⚠️ Please enter your initials');
          return;
        }
        if (newEntry.initials.length > 4) {
          alert('⚠️ Initials must be 4 characters or less');
          return;
        }

        const now = new Date();
        const site = SITES.find(s => s.id === newEntry.siteId);
        const entry = {
          id: Date.now(),
          date: now.toISOString().split('T')[0],
          time: newEntry.time,
          siteId: newEntry.siteId,
          siteName: site?.name || newEntry.siteId,
          siteCall: site?.call || '',
          remarks: newEntry.remarks.trim(),
          initials: newEntry.initials.trim().toUpperCase(),
          timestamp: now.toISOString()
        };

        try {
          saveEntries([entry, ...entries]); // Newest first
          setNewEntry({ siteId: '', time: '', remarks: '', initials: '' });
          setShowAdd(false);
        } catch (error) {
          console.error('Error saving log entry:', error);
          alert('❌ Error saving log entry. Please try again.');
        }
      };

      const deleteEntry = (id) => {
        if (confirm('Delete this log entry?')) {
          saveEntries(entries.filter(e => e.id !== id));
        }
      };

      return (
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-2xl overflow-hidden h-full flex flex-col">
          <div className="bg-gradient-to-r from-slate-700 to-slate-900 p-5 border-b border-slate-700/50">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-lg bg-slate-600/50 flex items-center justify-center">
                  <Icon name="FileText" className="w-5 h-5 text-slate-300" />
                </div>
                <div>
                  <h2 className="text-lg font-bold text-white">Facility Maintenance Log</h2>
                  <p className="text-xs text-slate-400">FAA Form 6030-1 Style</p>
                </div>
              </div>
              <button onClick={() => setShowAdd(!showAdd)}
                className="p-2 hover:bg-slate-600 rounded-lg text-slate-300 hover:text-white transition-colors">
                <Icon name={showAdd ? "X" : "Plus"} className="w-5 h-5" />
              </button>
            </div>
            {showAdd && (
              <div className="mt-4 p-4 bg-slate-900/50 rounded-xl border border-slate-600 space-y-3 animate-in">
                <select value={newEntry.siteId} onChange={e => setNewEntry({...newEntry, siteId: e.target.value})}
                  className="w-full bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2.5 outline-none focus:border-noaa-sky">
                  <option value="">— Select Site —</option>
                  {SITES.map(s => <option key={s.id} value={s.id}>{s.name} ({s.call})</option>)}
                </select>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-xs text-slate-400 mb-1 uppercase font-semibold">Time (24-hour)</label>
                    <input type="time" value={newEntry.time} onChange={e => setNewEntry({...newEntry, time: e.target.value})}
                      className="w-full bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2.5 outline-none focus:border-noaa-sky" />
                  </div>
                  <div>
                    <label className="block text-xs text-slate-400 mb-1 uppercase font-semibold">Initials</label>
                    <input type="text" placeholder="Initials *" value={newEntry.initials} onChange={e => setNewEntry({...newEntry, initials: e.target.value})}
                      className="w-full bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2.5 outline-none focus:border-noaa-sky" maxLength="4" />
                  </div>
                </div>
                <textarea placeholder="Remarks *" value={newEntry.remarks} onChange={e => setNewEntry({...newEntry, remarks: e.target.value})}
                  className="w-full bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2.5 outline-none focus:border-noaa-sky resize-none" rows="3" />
                <button onClick={addEntry}
                  className="w-full bg-noaa-blue hover:bg-noaa-light text-white text-sm font-bold py-2.5 rounded-lg transition-colors">
                  Add Entry
                </button>
              </div>
            )}
          </div>

          <div className="flex-1 overflow-hidden flex flex-col">
            {entries.length > 0 ? (
              <>
                <div className="bg-slate-900/50 border-b border-slate-700/50 p-2 grid grid-cols-12 gap-2 text-xs font-bold text-slate-400 uppercase">
                  <div className="col-span-2">Date</div>
                  <div className="col-span-1">Time</div>
                  <div className="col-span-2">Site</div>
                  <div className="col-span-6">Remarks</div>
                  <div className="col-span-1 text-center">Init</div>
                </div>
                <div className="flex-1 overflow-y-auto scrollbar-thin">
                  {entries.map(entry => (
                    <div key={entry.id} className="p-2 border-b border-slate-700/30 hover:bg-slate-900/30 transition-colors grid grid-cols-12 gap-2 text-sm group">
                      <div className="col-span-2 text-slate-400 font-mono text-xs">
                        {new Date(entry.date).toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: '2-digit' })}
                      </div>
                      <div className="col-span-1 text-slate-400 font-mono text-xs">{entry.time}</div>
                      <div className="col-span-2">
                        <div className="text-white text-xs font-semibold">{entry.siteName}</div>
                        <div className="text-slate-500 text-[10px] font-mono">{entry.siteCall}</div>
                      </div>
                      <div className="col-span-6 text-white text-xs leading-relaxed">{entry.remarks}</div>
                      <div className="col-span-1 flex items-center justify-between">
                        <span className="text-slate-300 font-bold text-xs">{entry.initials}</span>
                        <button onClick={() => deleteEntry(entry.id)}
                          className="opacity-0 group-hover:opacity-100 p-1 hover:bg-red-500/20 rounded text-slate-500 hover:text-red-400 transition-all">
                          <Icon name="X" className="w-3 h-3" />
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            ) : (
              <div className="flex-1 flex items-center justify-center text-center p-8">
                <div>
                  <Icon name="FileText" className="w-12 h-12 mx-auto mb-3 text-slate-600 opacity-30" />
                  <p className="text-slate-500 text-sm">No log entries</p>
                  <p className="text-slate-600 text-xs mt-1">Click + to add first entry</p>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const InspectionForm = ({ user }) => {
      const [step, setStep] = useState(1);
      const [txType, setTxType] = useState(null);
      const [isClassic, setIsClassic] = useState(false);
      const [is1KW, setIs1KW] = useState(false);
      const [activeTx, setActiveTx] = useState('tx1');
      const [saving, setSaving] = useState(false);
      const [data, setData] = useState({});

      const set = (f, v) => setData(p => ({ ...p, [f]: v }));
      const site = SITES.find(s => s.id === data.siteId);

      const handleSiteChange = (id) => {
        const s = SITES.find(x => x.id === id);
        set('siteId', id);
        if (s) {
          const t = s.tx.toLowerCase();
          if (t.includes('crown')) { setTxType('crown'); setIsClassic(false); setIs1KW(t.includes('1kw')); }
          else if (t.includes('nautel')) { setTxType('nautel'); setIsClassic(false); setIs1KW(true); setActiveTx('txa'); }
          else if (t.includes('armstrong')) { setTxType('armstrong'); setIsClassic(t.includes('classic')); setIs1KW(true); }
        }
      };

      const save = async () => {
        // Input validation
        if (!data.siteId || !data.date) {
          alert('⚠️ Please complete at least Site and Date fields before saving');
          return;
        }

        setSaving(true);
        try {
          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('inspections').add({
            ...data, txType, isClassic, is1KW, siteName: site?.name, siteCall: site?.call,
            timestamp: new Date().toISOString(), techId: user?.uid
          });
          alert('✓ Inspection saved successfully!');
          setStep(1); setData({}); setTxType(null);
        } catch (e) {
          console.error('Error saving inspection:', e);
          alert('❌ Error saving inspection: ' + (e.message || 'Unknown error occurred. Please try again.'));
        } finally {
          setSaving(false);
        }
      };

      const exportToPDF = () => {
        if (!data.siteId || !data.date) {
          alert('Please complete at least Site and Date fields before exporting');
          return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pageWidth = doc.internal.pageSize.getWidth();
        let yPos = 20;

        // Header
        doc.setFontSize(18);
        doc.setTextColor(14, 165, 233); // noaa-sky color
        doc.text('NOAA Weather Radio Inspection Report', pageWidth / 2, yPos, { align: 'center' });
        yPos += 8;
        doc.setFontSize(11);
        doc.setTextColor(100, 116, 139);
        doc.text('EHB-7 Compliance Inspection', pageWidth / 2, yPos, { align: 'center' });
        yPos += 15;

        // Site Information
        doc.setFontSize(12);
        doc.setTextColor(14, 165, 233);
        doc.text('Site Information', 20, yPos);
        yPos += 8;
        doc.setFontSize(10);
        doc.setTextColor(0, 0, 0);
        const siteInfo = [
          ['Site:', site?.name || 'N/A'],
          ['Call Sign:', site?.call || 'N/A'],
          ['Frequency:', site?.freq || 'N/A'],
          ['Transmitter:', site?.tx || 'N/A'],
          ['Date:', data.date || 'N/A'],
          ['Technician:', data.tech || 'N/A']
        ];
        siteInfo.forEach(([label, value]) => {
          doc.setTextColor(100, 116, 139);
          doc.text(label, 25, yPos);
          doc.setTextColor(0, 0, 0);
          doc.text(value, 60, yPos);
          yPos += 6;
        });
        yPos += 10;

        // Transmitter 1 Measurements
        doc.setFontSize(12);
        doc.setTextColor(14, 165, 233);
        doc.text('Transmitter 1 Measurements', 20, yPos);
        yPos += 8;
        doc.setFontSize(10);
        doc.setTextColor(0, 0, 0);
        
        // Frequency measurements
        const tx1FreqError = data.tx1_freq_error || 'N/A';
        const tx1Modulation = data.tx1_modulation || 'N/A';
        const tx1FwdPower = data.tx1_ext_fwd || 'N/A';
        
        doc.text(`Frequency Error: ${tx1FreqError} Hz`, 25, yPos);
        yPos += 6;
        doc.text(`Modulation: ${tx1Modulation} kHz`, 25, yPos);
        yPos += 6;
        doc.text(`Forward Power: ${tx1FwdPower} W`, 25, yPos);
        yPos += 12;

        // Transmitter 2 (if not Classic Armstrong)
        if (!isClassic || txType !== 'armstrong') {
          doc.setFontSize(12);
          doc.setTextColor(14, 165, 233);
          doc.text('Transmitter 2 Measurements', 20, yPos);
          yPos += 8;
          doc.setFontSize(10);
          doc.setTextColor(0, 0, 0);
          
          const tx2FreqError = data.tx2_freq_error || 'N/A';
          const tx2Modulation = data.tx2_modulation || 'N/A';
          const tx2FwdPower = data.tx2_ext_fwd || 'N/A';
          
          doc.text(`Frequency Error: ${tx2FreqError} Hz`, 25, yPos);
          yPos += 6;
          doc.text(`Modulation: ${tx2Modulation} kHz`, 25, yPos);
          yPos += 6;
          doc.text(`Forward Power: ${tx2FwdPower} W`, 25, yPos);
          yPos += 12;
        }

        // Visual Inspection Checklist
        if (yPos > 250) {
          doc.addPage();
          yPos = 20;
        }
        doc.setFontSize(12);
        doc.setTextColor(14, 165, 233);
        doc.text('Visual Inspection Checklist', 20, yPos);
        yPos += 8;
        doc.setFontSize(10);
        doc.setTextColor(0, 0, 0);
        
        const checklist = [
          ['Filters Replaced:', data.filters || 'N/A'],
          ['Visual Comments:', data.visualComments || 'N/A'],
          ['Defective Fans:', data.defectiveFans || 'None'],
          ['AC Input TX1:', (data.ac1 || 'N/A') + ' V'],
          ['AC Input TX2:', (data.ac2 || 'N/A') + ' V'],
          ['Surge Protector OK:', data.surgeOk || 'N/A'],
          ['ROAMS Battery Date:', data.roamsDate || 'N/A']
        ];
        
        checklist.forEach(([label, value]) => {
          if (yPos > 270) {
            doc.addPage();
            yPos = 20;
          }
          doc.setTextColor(100, 116, 139);
          doc.text(label, 25, yPos);
          doc.setTextColor(0, 0, 0);
          const lines = doc.splitTextToSize(value.toString(), pageWidth - 80);
          doc.text(lines, 80, yPos);
          yPos += 6 * lines.length + 2;
        });

        // Footer
        yPos = doc.internal.pageSize.getHeight() - 15;
        doc.setFontSize(8);
        doc.setTextColor(148, 163, 184);
        doc.text(`Generated: ${new Date().toLocaleDateString()} at ${new Date().toLocaleTimeString()}`, pageWidth / 2, yPos, { align: 'center' });
        yPos += 4;
        doc.text('National Weather Service - Electronics Maintenance', pageWidth / 2, yPos, { align: 'center' });

        // Save PDF
        const filename = `NWR_Inspection_${site?.id || 'UNKNOWN'}_${data.date || new Date().toISOString().split('T')[0]}.pdf`;
        doc.save(filename);
      };

      const txLabel = (n) => txType === 'nautel' ? (n === 1 ? 'TX A' : 'TX B') : (n === 1 ? 'TX 1' : 'TX 2');
      const p = activeTx;

      const steps = [
        { n: 1, l: 'Site' }, { n: 2, l: '1-3' }, { n: 3, l: '4-5' }, { n: 4, l: '6-7' },
        { n: 5, l: '8' }, { n: 6, l: '9' }, { n: 7, l: '10' }, { n: 8, l: '11' }
      ];

      // Step 1: Site
      const Step1 = () => (
        <div className="space-y-4 animate-in">
          <div className="text-center mb-4">
            <h2 className="text-xl font-bold text-white">Select Transmitter Site</h2>
          </div>
          <select value={data.siteId || ''} onChange={e => handleSiteChange(e.target.value)}
            className="w-full bg-slate-900 border border-slate-700 text-white rounded-xl p-4 focus:border-noaa-sky outline-none">
            <option value="">— Select Site —</option>
            {SITES.map(s => <option key={s.id} value={s.id}>{s.name} ({s.call}) — {s.tx}</option>)}
          </select>
          {site && (
            <div className={`p-4 rounded-xl border animate-in ${txType === 'armstrong' ? 'bg-blue-500/10 border-blue-500/30' : txType === 'crown' ? 'bg-teal-500/10 border-teal-500/30' : 'bg-purple-500/10 border-purple-500/30'}`}>
              <div className="grid grid-cols-2 gap-3 text-sm">
                <div><span className="text-slate-500">Call:</span> <span className="text-white font-mono">{site.call}</span></div>
                <div><span className="text-slate-500">Freq:</span> <span className="text-white font-mono">{site.freq}</span></div>
              </div>
              {isClassic && <p className="text-amber-400 text-xs mt-2">* Classic: PA2/PA3 & Combiner fields enabled</p>}
            </div>
          )}
          <div className="grid grid-cols-2 gap-4">
            <Input label="Date" field="date" data={data} set={set} type="date" />
            <Input label="Technician" field="tech" data={data} set={set} />
          </div>
        </div>
      );

      // Step 2: General {1-3}
      const Step2 = () => (
        <div className="space-y-3 animate-in">
          <Section title="Filters Replaced" num="1" />
          <Textarea label="List filters replaced" field="filters" data={data} set={set} />
          <Section title="Visual Inspection" num="2" />
          <Textarea label="Comments" field="visualComments" data={data} set={set} />
          <Input label="Defective Fans Found" field="defectiveFans" data={data} set={set} />
          <Section title="AC Input, Surge, ROAMS" num="3" />
          <div className="grid grid-cols-2 gap-4">
            <Input label={`AC Input ${txLabel(1)}`} field="ac1" data={data} set={set} type="number" unit="V" />
            <Input label={`AC Input ${txLabel(2)}`} field="ac2" data={data} set={set} type="number" unit="V" />
          </div>
          <Radio label="Surge Protector OK?" field="surgeOk" data={data} set={set} options={[{value:'yes',label:'Yes'},{value:'no',label:'No'}]} />
          <div className="grid grid-cols-2 gap-4">
            <Input label="ROAMS Battery Date" field="roamsDate" data={data} set={set} />
            <Radio label="ROAMS Replaced?" field="roamsReplaced" data={data} set={set} options={[{value:'yes',label:'Yes'},{value:'no',label:'No'}]} />
          </div>
        </div>
      );

      // Step 3: Power {4-5}
      const Step3 = () => (
