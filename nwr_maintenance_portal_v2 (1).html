                  <div className="w-10 h-10 rounded-lg bg-noaa-sky/20 flex items-center justify-center">
                    <Icon name="ClipboardList" className="w-5 h-5 text-noaa-sky" />
                  </div>
                  <div>
                    <h2 className="text-lg font-bold text-white">{txType ? `${txType.charAt(0).toUpperCase() + txType.slice(1)} Transmitter` : 'NWR Transmitter'}</h2>
                    <p className="text-xs text-noaa-sky">Maintenance Form • EHB-7</p>
                  </div>
                </div>
                {site && <div className="text-right"><p className="text-white font-semibold">{site.name}</p><p className="text-xs text-noaa-sky font-mono">{site.call}</p></div>}
              </div>
              <div className="flex gap-1 overflow-x-auto pb-1">
                {steps.map((s, i) => (
                  <Fragment key={s.n}>
                    <button onClick={() => data.siteId && setStep(s.n)} disabled={!data.siteId}
                      className={`px-3 py-1.5 rounded-lg text-xs font-medium ${step === s.n ? 'bg-noaa-sky text-white' : step > s.n ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-700/50 text-slate-500'}`}>
                      {step > s.n ? '✓' : s.n} {s.l}
                    </button>
                    {i < steps.length - 1 && <div className={`w-3 h-0.5 self-center ${step > s.n ? 'bg-emerald-500/50' : 'bg-slate-700'}`} />}
                  </Fragment>
                ))}
              </div>
            </div>
            <div className="p-5 max-h-[60vh] overflow-y-auto">{renderStep()}</div>
            <div className="p-5 border-t border-slate-700/50 bg-slate-900/50 flex justify-between items-center">
              {step > 1 ? <button onClick={() => setStep(step - 1)} className="px-5 py-2 rounded-xl bg-slate-700 text-white font-medium">← Back</button> : <div />}
              <div className="flex gap-3">
                {step === 8 && (
                  <button onClick={exportToPDF} className="px-5 py-2 rounded-xl bg-blue-600 text-white font-medium flex items-center gap-2">
                    <Icon name="FileDown" className="w-4 h-4" />
                    Export PDF
                  </button>
                )}
                {step < 8 ? (
                  <button onClick={() => setStep(step + 1)} disabled={!data.siteId} className="px-5 py-2 rounded-xl bg-noaa-light text-white font-medium disabled:opacity-50">Next →</button>
                ) : (
                  <button onClick={save} disabled={saving || !data.siteId} className="px-6 py-2 rounded-xl bg-emerald-500 text-white font-semibold disabled:opacity-50">
                    {saving ? 'Saving...' : '✓ Submit'}
                  </button>
                )}
              </div>
            </div>
          </div>
          <MaintenanceLog />
        </div>
      );
    };

    // Site Map Component
    const SiteMap = () => {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);

      useEffect(() => {
        if (mapRef.current && !mapInstanceRef.current) {
          // Center on Texas
          const map = L.map(mapRef.current).setView([29.5, -98.5], 7);
          
          // Add tile layer (CartoDB Voyager - medium tones, darkened via CSS)
          L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors, © CARTO',
            className: 'map-tiles-dark'
          }).addTo(map);

          // Custom marker icon
          const createMarkerIcon = (color) => {
            return L.divIcon({
              className: 'custom-marker',
              html: `<div style="background-color: ${color}; width: 24px; height: 24px; border-radius: 50%; border: 2px solid #1e293b; box-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 0 2px ${color}40; display: flex; align-items: center; justify-content: center;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2">
                  <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5M19.1 4.9c3.9 3.9 3.9 10.3 0 14.2M12 12h.01"/>
                </svg>
              </div>`,
              iconSize: [24, 24],
              iconAnchor: [12, 12],
              popupAnchor: [0, -12]
            });
          };

          // Add markers for each site
          SITES.forEach(site => {
            const color = site.tx.includes('Crown') ? '#14b8a6' : 
                         site.tx.includes('Armstrong') ? '#3b82f6' : '#a855f7';
            
            const marker = L.marker([parseFloat(site.lat), parseFloat(site.lng)], {
              icon: createMarkerIcon(color)
            }).addTo(map);

            marker.bindPopup(`
              <div style="min-width: 250px; max-width: 300px; font-family: system-ui, sans-serif; background: #1e293b; color: #e2e8f0; padding: 8px; border-radius: 8px;">
                <div style="font-weight: bold; font-size: 15px; margin-bottom: 4px; color: white;">${site.name}</div>
                <div style="color: #38bdf8; font-family: monospace; font-size: 12px; margin-bottom: 8px;">${site.call}</div>
                
                <div style="font-size: 11px; color: #94a3b8; margin-bottom: 2px;">
                  <strong style="color: #cbd5e1;">Freq:</strong> ${site.freq}
                </div>
                <div style="font-size: 11px; color: #94a3b8; margin-bottom: 8px;">
                  <strong style="color: #cbd5e1;">Transmitter:</strong> ${site.tx}
                </div>

                ${site.address ? `
                <div style="border-top: 1px solid #334155; padding-top: 8px; margin-bottom: 8px;">
                  <div style="font-size: 11px; color: #94a3b8; margin-bottom: 4px;">
                    <strong style="color: #cbd5e1;">Address:</strong><br/>
                    <span style="color: #e2e8f0;">${site.address}</span>
                  </div>
                  ${site.building ? `<div style="font-size: 11px; color: #94a3b8; margin-bottom: 2px;">
                    <strong style="color: #cbd5e1;">Building:</strong> ${site.building}
                  </div>` : ''}
                  ${site.poc ? `<div style="font-size: 11px; color: #94a3b8; margin-bottom: 2px;">
                    <strong style="color: #cbd5e1;">POC:</strong> ${site.poc}${site.phone ? ' ' + site.phone : ''}
                  </div>` : ''}
                </div>
                ` : ''}

                ${site.gateCode || site.lockboxCode || site.securityCode ? `
                <div style="border-top: 1px solid #334155; padding-top: 8px; margin-bottom: 8px; background: #0f172a; padding: 6px; border-radius: 4px;">
                  <div style="font-size: 10px; font-weight: 600; color: #38bdf8; margin-bottom: 4px; text-transform: uppercase;">Access Codes</div>
                  ${site.gateCode ? `<div style="font-size: 11px; color: #94a3b8; margin-bottom: 2px;">
                    <strong style="color: #cbd5e1;">Gate:</strong> <span style="font-family: monospace; color: #fbbf24;">${site.gateCode}</span>
                  </div>` : ''}
                  ${site.lockboxCode ? `<div style="font-size: 11px; color: #94a3b8; margin-bottom: 2px;">
                    <strong style="color: #cbd5e1;">Lockbox:</strong> <span style="font-family: monospace; color: #fbbf24;">${site.lockboxCode}</span>
                  </div>` : ''}
                  ${site.securityCode ? `<div style="font-size: 11px; color: #94a3b8; margin-bottom: 2px;">
                    <strong style="color: #cbd5e1;">Security:</strong> <span style="font-family: monospace; color: #fbbf24;">${site.securityCode}</span>
                  </div>` : ''}
                </div>
                ` : ''}

                ${site.notes ? `
                <div style="border-top: 1px solid #334155; padding-top: 6px; margin-bottom: 8px;">
                  <div style="font-size: 10px; color: #f59e0b; background: #451a03; padding: 4px 6px; border-radius: 4px; border-left: 3px solid #f59e0b;">
                    ⚠️ ${site.notes}
                  </div>
                </div>
                ` : ''}

                ${site.mapsLink ? `
                <div style="margin-top: 8px;">
                  <a href="${site.mapsLink}" target="_blank" style="display: inline-block; background: #0ea5e9; color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; text-decoration: none; font-weight: 600;">
                    📍 Open in Maps
                  </a>
                </div>
                ` : ''}
              </div>
            `, { className: 'dark-popup' });
          });

          mapInstanceRef.current = map;
        }

        return () => {
          if (mapInstanceRef.current) {
            mapInstanceRef.current.remove();
            mapInstanceRef.current = null;
          }
        };
      }, []);

      return (
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl overflow-hidden relative z-10">
          <div className="p-4 border-b border-slate-700/50 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <Icon name="MapPin" className="w-5 h-5 text-noaa-sky" />
              <h3 className="font-bold text-white">Site Locations</h3>
            </div>
            <div className="flex items-center gap-3 text-xs">
              <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-teal-500" /><span className="text-slate-400">Crown</span></div>
              <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-blue-500" /><span className="text-slate-400">Armstrong</span></div>
              <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-purple-500" /><span className="text-slate-400">Nautel</span></div>
            </div>
          </div>
          <div ref={mapRef} style={{ height: '300px', width: '100%', position: 'relative', zIndex: 1 }} />
        </div>
      );
    };

    // Date Picker Component
    const DatePicker = ({ value, onChange, disabled }) => {
      const [open, setOpen] = useState(false);
      const [viewDate, setViewDate] = useState(() => value ? new Date(value + 'T00:00:00') : new Date());
      const ref = useRef(null);

      useEffect(() => {
        const handleClickOutside = (e) => {
          if (ref.current && !ref.current.contains(e.target)) setOpen(false);
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      useEffect(() => {
        if (value) setViewDate(new Date(value + 'T00:00:00'));
      }, [value]);

      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const monthName = viewDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(i);

      const selectDate = (day) => {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        onChange(dateStr);
        setOpen(false);
      };

      const formatDisplay = (dateStr) => {
        if (!dateStr) return 'Select date...';
        const d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
      };

      const today = new Date().toISOString().split('T')[0];

      return (
        <div className="relative" ref={ref}>
          <button
            type="button"
            onClick={() => !disabled && setOpen(!open)}
            disabled={disabled}
            className={`w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 text-left flex items-center justify-between ${disabled ? 'opacity-70 cursor-not-allowed' : 'hover:border-slate-600 cursor-pointer'}`}
          >
            <div className="flex items-center gap-2">
              <Icon name="Calendar" className="w-4 h-4 text-noaa-sky" />
              <span className={value ? 'text-white' : 'text-slate-500'}>{formatDisplay(value)}</span>
            </div>
            {!disabled && <Icon name="ChevronDown" className={`w-4 h-4 text-slate-400 transition-transform ${open ? 'rotate-180' : ''}`} />}
          </button>

          {open && (
            <div className="absolute top-full left-0 mt-2 bg-slate-800 border border-slate-600 rounded-xl shadow-2xl z-50 p-3 w-72">
              <div className="flex items-center justify-between mb-3">
                <button type="button" onClick={() => setViewDate(new Date(year, month - 1, 1))} className="p-1.5 hover:bg-slate-700 rounded-lg">
                  <Icon name="ChevronLeft" className="w-4 h-4 text-slate-400" />
                </button>
                <span className="text-white font-semibold text-sm">{monthName}</span>
                <button type="button" onClick={() => setViewDate(new Date(year, month + 1, 1))} className="p-1.5 hover:bg-slate-700 rounded-lg">
                  <Icon name="ChevronRight" className="w-4 h-4 text-slate-400" />
                </button>
              </div>
              <div className="grid grid-cols-7 gap-1 mb-1">
                {['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'].map(d => (
                  <div key={d} className="text-center text-xs font-semibold text-slate-500 py-1">{d}</div>
                ))}
              </div>
              <div className="grid grid-cols-7 gap-1">
                {days.map((day, idx) => {
                  if (!day) return <div key={idx} className="h-8" />;
                  const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                  const isSelected = dateStr === value;
                  const isToday = dateStr === today;
                  return (
                    <button
                      key={idx}
                      type="button"
                      onClick={() => selectDate(day)}
                      className={`h-8 w-8 rounded-lg text-sm font-medium transition-all flex items-center justify-center mx-auto
                        ${isSelected ? 'bg-noaa-sky text-white' : isToday ? 'bg-noaa-sky/20 text-noaa-sky ring-1 ring-noaa-sky/50' : 'text-slate-300 hover:bg-slate-700'}`}
                    >
                      {day}
                    </button>
                  );
                })}
              </div>
              <div className="mt-3 pt-3 border-t border-slate-700 flex justify-between">
                <button type="button" onClick={() => { onChange(today); setOpen(false); }} className="text-xs text-noaa-sky hover:text-noaa-light font-medium">Today</button>
                <button type="button" onClick={() => setOpen(false)} className="text-xs text-slate-400 hover:text-white font-medium">Close</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    // Maintenance Calendar
    const MaintenanceCalendar = () => {
      const [currentDate, setCurrentDate] = useState(new Date());
      const [events, setEvents] = useState(() => {
        const saved = localStorage.getItem('nwr_calendar_events');
        return saved ? JSON.parse(saved) : [
          { id: 1, date: '2025-11-29', siteId: 'AUS', type: 'routine', completed: false, notes: 'Quarterly inspection' },
          { id: 2, date: '2025-11-30', siteId: 'SAT', type: 'routine', completed: false, notes: 'Annual inspection' },
          { id: 3, date: '2025-12-02', siteId: 'KER', type: 'nonroutine', completed: false, notes: 'Replace cooling fan' },
          { id: 4, date: '2025-12-05', siteId: 'GNZ', type: 'routine', completed: false, notes: 'Quarterly inspection' },
          { id: 5, date: '2025-11-25', siteId: 'DRT', type: 'routine', completed: true, notes: 'Completed inspection' },
        ];
      });
      const [showModal, setShowModal] = useState(false);
      const [editEvent, setEditEvent] = useState(null);
      const [isEditing, setIsEditing] = useState(false);
      const [form, setForm] = useState({ date: '', siteId: '', type: 'routine', notes: '' });

      useEffect(() => {
        localStorage.setItem('nwr_calendar_events', JSON.stringify(events));
      }, [events]);

      const today = new Date().toISOString().split('T')[0];
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const monthName = currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const getEventStatus = (event) => {
        if (event.completed) return 'completed';
        if (event.date < today) return 'pastdue';
        if (event.date === today) return 'duetoday';
        return 'scheduled';
      };

      const statusBorders = {
        scheduled: 'border-blue-400 bg-blue-500/40 text-white font-medium',
        duetoday: 'border-amber-400 bg-amber-500/50 text-white font-medium',
        pastdue: 'border-red-400 bg-red-500/50 text-white font-medium',
        completed: 'border-emerald-400 bg-emerald-500/40 text-white font-medium'
      };

      const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
      const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));

      const openAddModal = (date) => {
        setEditEvent(null);
        setIsEditing(true);
        setForm({ date: date || today, siteId: '', type: 'routine', notes: '' });
        setShowModal(true);
      };

      const openEditModal = (event) => {
        setEditEvent(event);
        setIsEditing(false);
        setForm({ date: event.date, siteId: event.siteId, type: event.type, notes: event.notes || '' });
        setShowModal(true);
      };

      const saveEvent = () => {
        if (!form.date || !form.siteId) return alert('Please select date and site');
        if (editEvent) {
          setEvents(events.map(e => e.id === editEvent.id ? { ...e, ...form } : e));
        } else {
          setEvents([...events, { id: Date.now(), ...form, completed: false }]);
        }
        setShowModal(false);
        setIsEditing(false);
      };

      const deleteEvent = (id) => {
        if (confirm('Delete this event?')) {
          setEvents(events.filter(e => e.id !== id));
          setShowModal(false);
        }
      };

      const toggleComplete = (id) => {
        setEvents(events.map(e => e.id === id ? { ...e, completed: !e.completed } : e));
      };

      const getEventsForDate = (day) => {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        return events.filter(e => e.date === dateStr);
      };

      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(i);

      return (
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl overflow-hidden">
          <div className="p-4 border-b border-slate-700/50 flex items-center justify-between flex-wrap gap-2">
            <div className="flex items-center gap-2">
              <Icon name="Calendar" className="w-5 h-5 text-noaa-sky" />
              <h3 className="font-bold text-white text-lg">Maintenance Calendar</h3>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={prevMonth} className="p-2 hover:bg-slate-700 rounded-lg"><Icon name="ChevronLeft" className="w-5 h-5 text-slate-400" /></button>
              <span className="text-white font-semibold w-40 text-center">{monthName}</span>
              <button onClick={nextMonth} className="p-2 hover:bg-slate-700 rounded-lg"><Icon name="ChevronRight" className="w-5 h-5 text-slate-400" /></button>
              <button onClick={() => openAddModal()} className="ml-3 px-4 py-2 bg-noaa-sky text-white text-sm font-semibold rounded-lg flex items-center gap-1.5">
                <Icon name="Plus" className="w-4 h-4" /> Add Event
              </button>
            </div>
          </div>

          <div className="p-4">
            <div className="grid grid-cols-7 gap-1.5 mb-2">
              {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => (
                <div key={d} className="text-center text-sm font-semibold text-slate-400 py-2">{d}</div>
              ))}
            </div>
            <div className="grid grid-cols-7 gap-1.5">
              {days.map((day, idx) => {
                if (!day) return <div key={idx} className="h-24 bg-slate-900/30 rounded-lg" />;
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayEvents = getEventsForDate(day);
                const isToday = dateStr === today;
                return (
                  <div key={idx} onClick={() => openAddModal(dateStr)}
                    className={`h-24 p-2 rounded-lg cursor-pointer transition-all hover:ring-2 hover:ring-noaa-sky/50 ${isToday ? 'bg-noaa-sky/15 ring-2 ring-noaa-sky/40' : 'bg-slate-900/50'}`}>
                    <div className={`text-sm font-bold mb-1 ${isToday ? 'text-noaa-sky' : 'text-slate-300'}`}>{day}</div>
                    <div className="space-y-1 overflow-hidden">
                      {dayEvents.slice(0, 2).map(ev => {
                        const site = SITES.find(s => s.id === ev.siteId);
                        const status = getEventStatus(ev);
                        return (
                          <div key={ev.id} onClick={(e) => { e.stopPropagation(); openEditModal(ev); }}
                            className={`text-[11px] px-1.5 py-1 rounded border truncate flex items-center gap-1 ${statusBorders[status]}`}>
                            <Icon name={ev.type === 'routine' ? 'Glasses' : 'Wrench'} className="w-3 h-3 flex-shrink-0" />
                            <span className="truncate">{site?.id || ev.siteId}</span>
                          </div>
                        );
                      })}
                      {dayEvents.length > 2 && <div className="text-xs text-slate-400 pl-1 font-medium">+{dayEvents.length - 2} more</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Legend */}
          <div className="px-4 pb-4 flex flex-wrap gap-4 text-sm border-t border-slate-700/50 pt-4">
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded bg-blue-500" /><span className="text-slate-300">Scheduled</span></div>
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded bg-amber-500" /><span className="text-slate-300">Due Today</span></div>
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded bg-red-500" /><span className="text-slate-300">Past Due</span></div>
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded bg-emerald-500" /><span className="text-slate-300">Completed</span></div>
            <span className="text-slate-600">|</span>
            <div className="flex items-center gap-2"><Icon name="Glasses" className="w-4 h-4 text-slate-400" /><span className="text-slate-300">Routine</span></div>
            <div className="flex items-center gap-2"><Icon name="Wrench" className="w-4 h-4 text-slate-400" /><span className="text-slate-300">Non-Routine</span></div>
          </div>

          {/* Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onClick={() => { setShowModal(false); setIsEditing(false); }}>
              <div className="bg-slate-800 border border-slate-700 rounded-xl p-5 w-full max-w-md" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-lg font-bold text-white">
                    {editEvent ? (isEditing ? 'Edit Event' : 'Event Details') : 'Add Event'}
                  </h3>
                  <button type="button" onClick={() => { setShowModal(false); setIsEditing(false); }} className="text-slate-400 hover:text-white"><Icon name="X" className="w-5 h-5" /></button>
                </div>
                <div className="space-y-4">
                  <div>
                    <label className="block text-xs text-slate-400 uppercase font-semibold mb-1">Date</label>
                    {isEditing ? (
                      <DatePicker value={form.date} onChange={(d) => setForm({ ...form, date: d })} disabled={false} />
                    ) : (
                      <div className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 flex items-center gap-2 opacity-70">
                        <Icon name="Calendar" className="w-4 h-4 text-noaa-sky" />
                        <span>{form.date ? new Date(form.date + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }) : 'No date'}</span>
                      </div>
                    )}
                  </div>
                  <div>
                    <label className="block text-xs text-slate-400 uppercase font-semibold mb-1">Site</label>
                    {isEditing ? (
                      <select value={form.siteId} onChange={e => setForm({ ...form, siteId: e.target.value })}
                        className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 focus:border-noaa-sky outline-none">
                        <option value="">— Select Site —</option>
                        {SITES.map(s => <option key={s.id} value={s.id}>{s.name} ({s.call})</option>)}
                      </select>
                    ) : (
                      <div className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 opacity-70">
                        {SITES.find(s => s.id === form.siteId)?.name || form.siteId || 'No site selected'}
                      </div>
                    )}
                  </div>
                  <div>
                    <label className="block text-xs text-slate-400 uppercase font-semibold mb-1">Type</label>
                    {isEditing ? (
                      <div className="flex gap-4">
                        <label className="flex items-center gap-2 cursor-pointer">
                          <input type="radio" checked={form.type === 'routine'} onChange={() => setForm({ ...form, type: 'routine' })} />
                          <Icon name="Glasses" className="w-4 h-4 text-slate-400" />
                          <span className="text-white text-sm">Routine Inspection</span>
                        </label>
                        <label className="flex items-center gap-2 cursor-pointer">
                          <input type="radio" checked={form.type === 'nonroutine'} onChange={() => setForm({ ...form, type: 'nonroutine' })} />
                          <Icon name="Wrench" className="w-4 h-4 text-slate-400" />
                          <span className="text-white text-sm">Non-Routine</span>
                        </label>
                      </div>
                    ) : (
                      <div className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 opacity-70 flex items-center gap-2">
                        <Icon name={form.type === 'routine' ? 'Glasses' : 'Wrench'} className="w-4 h-4 text-slate-400" />
                        <span>{form.type === 'routine' ? 'Routine Inspection' : 'Non-Routine'}</span>
                      </div>
                    )}
                  </div>
                  <div>
                    <label className="block text-xs text-slate-400 uppercase font-semibold mb-1">Notes</label>
                    {isEditing ? (
                      <textarea value={form.notes} onChange={e => setForm({ ...form, notes: e.target.value })} rows={2}
                        className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 focus:border-noaa-sky outline-none resize-none" />
                    ) : (
                      <div className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 opacity-70 min-h-[60px]">
                        {form.notes || 'No notes'}
                      </div>
                    )}
                  </div>
                  {editEvent && (
                    <div className="flex items-center justify-between p-3 bg-slate-900/50 rounded-lg border border-slate-700/50">
                      <span className="text-sm text-slate-300">Status</span>
                      <button type="button" onClick={() => { toggleComplete(editEvent.id); setEditEvent({...editEvent, completed: !editEvent.completed}); }}
                        className={`px-3 py-1.5 rounded-lg text-sm font-medium ${events.find(e=>e.id===editEvent.id)?.completed ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-700 text-slate-300'}`}>
                        {events.find(e=>e.id===editEvent.id)?.completed ? '✓ Completed' : 'Mark Complete'}
                      </button>
                    </div>
                  )}
                </div>
                <div className="flex gap-3 mt-5">
                  {editEvent && (
                    <button type="button" onClick={() => deleteEvent(editEvent.id)}
                      className="px-4 py-2 bg-red-500/20 text-red-400 rounded-lg font-medium hover:bg-red-500/30">Delete</button>
                  )}
                  <div className="flex-1" />
                  <button type="button" onClick={() => { setShowModal(false); setIsEditing(false); }} className="px-4 py-2 bg-slate-700 text-white rounded-lg font-medium">Cancel</button>
                  {editEvent && !isEditing && (
                    <button type="button" onClick={() => setIsEditing(true)} className="px-4 py-2 bg-amber-500 text-white rounded-lg font-medium hover:bg-amber-400">Edit</button>
                  )}
                  {isEditing && (
                    <button type="button" onClick={saveEvent} className="px-4 py-2 bg-noaa-sky text-white rounded-lg font-medium">{editEvent ? 'Save' : 'Add'}</button>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // Dashboard
    const Dashboard = ({ setTab }) => {
      const [events] = useState(() => {
        const saved = localStorage.getItem('nwr_calendar_events');
        return saved ? JSON.parse(saved) : [];
      });

      const today = new Date().toISOString().split('T')[0];
      const scheduled = events.filter(e => !e.completed && e.date >= today).length;
      const pastDue = events.filter(e => !e.completed && e.date < today).length;
      const completed = events.filter(e => e.completed).length;

      return (
        <div className="space-y-6 animate-in">
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            {[
              { t: 'Sites', v: '12', l: 'Operational', c: 'noaa-sky', i: 'Radio' },
              { t: 'Scheduled', v: String(scheduled || 5), l: 'Upcoming', c: 'blue', i: 'Calendar' },
              { t: 'Past Due', v: String(pastDue), l: pastDue > 0 ? 'Action Needed' : 'None', c: pastDue > 0 ? 'red' : 'emerald', i: 'AlertTriangle' },
              { t: 'Completed', v: String(completed || 1), l: 'This Period', c: 'emerald', i: 'CheckCircle' }
            ].map((s, i) => {
              // Map color names to actual Tailwind classes
              const colorClasses = {
                'noaa-sky': { text: 'text-noaa-sky', bg: 'bg-noaa-sky/10' },
                'blue': { text: 'text-blue-400', bg: 'bg-blue-500/10' },
                'red': { text: 'text-red-400', bg: 'bg-red-500/10' },
                'emerald': { text: 'text-emerald-400', bg: 'bg-emerald-500/10' }
              };
              const colors = colorClasses[s.c] || colorClasses['blue'];

              return (
                <div key={i} className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
                  <div className="flex justify-between">
                    <div>
                      <p className="text-slate-500 text-xs uppercase">{s.t}</p>
                      <h3 className="text-2xl font-bold text-white">{s.v}</h3>
                      <p className={`text-xs ${colors.text}`}>{s.l}</p>
                    </div>
                    <div className={`p-2 rounded-lg ${colors.bg}`}><Icon name={s.i} className={`w-5 h-5 ${colors.text}`} /></div>
                  </div>
                </div>
              );
            })}
          </div>

          <div className="grid lg:grid-cols-4 gap-6">
            <div className="lg:col-span-3 space-y-6">
              <SiteMap />
              <MaintenanceCalendar />
            </div>
            <div className="space-y-4">
              <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-5">
                <h3 className="font-bold text-white mb-4 flex items-center gap-2">
                  <Icon name="Zap" className="w-4 h-4 text-noaa-sky" /> Quick Actions
                </h3>
                <div className="space-y-3">
                  <button onClick={() => setTab('forms')} className="w-full p-4 bg-slate-900/50 border border-slate-700/50 rounded-xl text-left hover:border-noaa-sky/50">
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 rounded-lg bg-noaa-sky/20 flex items-center justify-center"><Icon name="ClipboardList" className="w-5 h-5 text-noaa-sky" /></div>
                      <div><p className="font-medium text-white">Start Inspection</p><p className="text-xs text-slate-500">EHB-7 Form</p></div>
                    </div>
                  </button>
                  <button onClick={() => setTab('sites')} className="w-full p-4 bg-slate-900/50 border border-slate-700/50 rounded-xl text-left hover:border-emerald-500/50">
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center"><Icon name="MapPin" className="w-5 h-5 text-emerald-400" /></div>
                      <div><p className="font-medium text-white">View Sites</p><p className="text-xs text-slate-500">Directory</p></div>
                    </div>
                  </button>
                </div>
              </div>
              <NWRUPCard />
              <PartsTracker />
            </div>
          </div>
        </div>
      );
    };

    // Analytics & Trend Analysis
    const Analytics = () => {
      const [inspections, setInspections] = useState([]);
      const [logEntries, setLogEntries] = useState([]);
      const [loading, setLoading] = useState(true);
      const [timeRange, setTimeRange] = useState('30'); // days
      const [selectedSite, setSelectedSite] = useState('all');
      const [selectedMetric, setSelectedMetric] = useState('frequency');

      useEffect(() => {
        const fetchInspections = async () => {
          try {
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - parseInt(timeRange));

            let query = db.collection('artifacts').doc(appId).collection('public').doc('data')
              .collection('inspections').orderBy('timestamp', 'desc');

            if (selectedSite !== 'all') {
              query = query.where('siteId', '==', selectedSite);
            }

            const snapshot = await query.get();
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
              .filter(d => new Date(d.timestamp) >= cutoff);

            setInspections(data);
          } catch (e) {
            console.error('Error fetching inspections:', e);
            // Show error state to user
            alert('⚠️ Error loading inspection data: ' + (e.message || 'Please check your connection and try again.'));
          } finally {
            setLoading(false);
          }
        };

        fetchInspections();

        let unsubscribe = () => {};
        try {
          unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data')
            .collection('inspections').onSnapshot(
              () => fetchInspections(),
              (error) => console.error('Real-time update error:', error)
            );
        } catch (e) {
          console.error('Error setting up real-time listener:', e);
        }

        return () => unsubscribe();
      }, [timeRange, selectedSite]);

      // Load and filter maintenance log entries
      useEffect(() => {
        const saved = localStorage.getItem('nwr-maintenance-log');
        if (saved) {
          const allLogs = JSON.parse(saved);
          const cutoff = new Date();
          cutoff.setDate(cutoff.getDate() - parseInt(timeRange));
          
          let filtered = allLogs.filter(log => new Date(log.timestamp) >= cutoff);
          
          if (selectedSite !== 'all') {
            filtered = filtered.filter(log => log.siteId === selectedSite);
          }
          
          setLogEntries(filtered);
        } else {
          setLogEntries([]);
        }
      }, [timeRange, selectedSite]);

      const exportCSV = () => {
        if (!inspections.length && !logEntries.length) return alert('No data to export');

        // Helper function to escape CSV fields properly
        const escapeCSV = (field) => {
          if (field == null) return '';
          const str = String(field);
          // If field contains comma, quote, or newline, wrap in quotes and escape existing quotes
          if (str.includes(',') || str.includes('"') || str.includes('\n')) {
            return `"${str.replace(/"/g, '""')}"`;
          }
          return str;
        };

        const headers = ['Type', 'Timestamp', 'Site', 'Call Sign', 'TX Type', 'TX1 Freq Error', 'TX2 Freq Error',
          'TX1 Modulation', 'TX2 Modulation', 'TX1 Fwd Pwr', 'TX2 Fwd Pwr', 'Remarks', 'Initials', 'Tech ID'];

        const inspectionRows = inspections.map(i => [
          'Inspection', i.timestamp, i.siteName || i.siteId, i.siteCall, i.txType,
          i.tx1_freq_error || '', i.tx2_freq_error || '',
          i.tx1_mod_deviation || '', i.tx2_mod_deviation || '',
          i.tx1_ext_fwd || '', i.tx2_ext_fwd || '',
          '', '', i.techId || ''
        ]);

        const logRows = logEntries.map(log => [
          'Log Entry', log.timestamp, log.siteName, log.siteCall, '', '', '', '', '', '', '',
          log.remarks || '', log.initials || '', ''
        ]);

        // Properly escape all fields and join with commas
        const csv = [headers, ...inspectionRows, ...logRows]
          .map(row => row.map(escapeCSV).join(','))
          .join('\n');

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `nwr-maintenance-data-${new Date().toISOString().split('T')[0]}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      const getMetricData = () => {
        const metricMap = {
          frequency: { field: 'freq_error', label: 'Frequency Error (Hz)', threshold: 200 },
          modulation: { field: 'mod_deviation', label: 'Modulation (kHz)', threshold: null },
          power: { field: 'ext_fwd', label: 'Forward Power (W)', threshold: null }
        };
        
        const metric = metricMap[selectedMetric];
        const data = inspections.flatMap(i => [
          { site: i.siteName || i.siteId, date: i.timestamp, value: parseFloat(i[`tx1_${metric.field}`]), tx: 'TX1' },
          { site: i.siteName || i.siteId, date: i.timestamp, value: parseFloat(i[`tx2_${metric.field}`]), tx: 'TX2' }
        ]).filter(d => !isNaN(d.value));

        return { data, metric };
      };

      const { data: metricData, metric } = getMetricData();

      const stats = {
        total: inspections.length,
        logEntries: logEntries.length,
        sites: [...new Set([...inspections.map(i => i.siteId), ...logEntries.map(l => l.siteId)])].length,
        avgFreqError: inspections.length > 0 ? 
          (inspections.reduce((sum, i) => sum + Math.abs(parseFloat(i.tx1_freq_error) || 0) + Math.abs(parseFloat(i.tx2_freq_error) || 0), 0) / (inspections.length * 2)).toFixed(1) : 0,
        outOfSpec: inspections.filter(i => Math.abs(parseFloat(i.tx1_freq_error)) > 200 || Math.abs(parseFloat(i.tx2_freq_error)) > 200).length
      };

      if (loading) {
        return (
          <div className="flex items-center justify-center h-64">
            <Icon name="Loader2" className="w-8 h-8 text-noaa-sky animate-spin" />
          </div>
        );
      }

      return (
        <div className="space-y-6 animate-in">
          {/* Header */}
          <div className="flex flex-col sm:flex-row justify-between gap-4">
            <div>
              <h2 className="text-2xl font-bold text-white flex items-center gap-2">
                <Icon name="TrendingUp" className="w-6 h-6 text-noaa-sky" /> Trend Analysis
              </h2>
              <p className="text-sm text-slate-400 mt-1">Real-time inspection data and performance metrics</p>
            </div>
            <button onClick={exportCSV} 
              className="px-4 py-2 bg-noaa-blue hover:bg-noaa-light text-white rounded-lg flex items-center gap-2 transition-all font-medium">
              <Icon name="Download" className="w-4 h-4" /> Export CSV
            </button>
          </div>

          {/* Filters */}
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
              <label className="block text-xs text-slate-400 uppercase font-semibold mb-2">Time Range</label>
              <select value={timeRange} onChange={e => setTimeRange(e.target.value)}
                className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 text-sm">
                <option value="7">Last 7 Days</option>
                <option value="30">Last 30 Days</option>
                <option value="90">Last 90 Days</option>
                <option value="365">Last Year</option>
              </select>
            </div>
            <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
              <label className="block text-xs text-slate-400 uppercase font-semibold mb-2">Site Filter</label>
              <select value={selectedSite} onChange={e => setSelectedSite(e.target.value)}
                className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 text-sm">
                <option value="all">All Sites</option>
                {SITES.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
              <label className="block text-xs text-slate-400 uppercase font-semibold mb-2">Metric</label>
              <select value={selectedMetric} onChange={e => setSelectedMetric(e.target.value)}
                className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 text-sm">
                <option value="frequency">Frequency Error</option>
                <option value="modulation">Modulation Deviation</option>
                <option value="power">Forward Power</option>
              </select>
            </div>
          </div>

          {/* Stats Cards */}
          <div className="grid grid-cols-2 lg:grid-cols-5 gap-4">
            <div className="bg-gradient-to-br from-blue-500/10 to-blue-600/5 border border-blue-500/30 rounded-xl p-4">
              <div className="flex items-center gap-3">
                <Icon name="FileText" className="w-8 h-8 text-blue-400" />
                <div>
                  <p className="text-2xl font-bold text-white">{stats.total}</p>
                  <p className="text-xs text-slate-400 uppercase">Inspections</p>
                </div>
              </div>
            </div>
            <div className="bg-gradient-to-br from-amber-500/10 to-amber-600/5 border border-amber-500/30 rounded-xl p-4">
              <div className="flex items-center gap-3">
                <Icon name="ScrollText" className="w-8 h-8 text-amber-400" />
                <div>
                  <p className="text-2xl font-bold text-white">{stats.logEntries}</p>
                  <p className="text-xs text-slate-400 uppercase">Log Entries</p>
                </div>
              </div>
            </div>
            <div className="bg-gradient-to-br from-emerald-500/10 to-emerald-600/5 border border-emerald-500/30 rounded-xl p-4">
              <div className="flex items-center gap-3">
                <Icon name="Radio" className="w-8 h-8 text-emerald-400" />
                <div>
                  <p className="text-2xl font-bold text-white">{stats.sites}</p>
                  <p className="text-xs text-slate-400 uppercase">Sites Covered</p>
                </div>
              </div>
            </div>
            <div className="bg-gradient-to-br from-cyan-500/10 to-cyan-600/5 border border-cyan-500/30 rounded-xl p-4">
              <div className="flex items-center gap-3">
                <Icon name="Activity" className="w-8 h-8 text-cyan-400" />
                <div>
                  <p className="text-2xl font-bold text-white">±{stats.avgFreqError} Hz</p>
                  <p className="text-xs text-slate-400 uppercase">Avg Freq Error</p>
                </div>
              </div>
            </div>
            <div className={`bg-gradient-to-br ${stats.outOfSpec > 0 ? 'from-red-500/10 to-red-600/5 border-red-500/30' : 'from-emerald-500/10 to-emerald-600/5 border-emerald-500/30'} border rounded-xl p-4`}>
              <div className="flex items-center gap-3">
                <Icon name={stats.outOfSpec > 0 ? "AlertTriangle" : "CheckCircle"} className={`w-8 h-8 ${stats.outOfSpec > 0 ? 'text-red-400' : 'text-emerald-400'}`} />
                <div>
                  <p className="text-2xl font-bold text-white">{stats.outOfSpec}</p>
                  <p className="text-xs text-slate-400 uppercase">Out of Spec</p>
                </div>
              </div>
            </div>
          </div>

          {/* Chart */}
          <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-6">
            <h3 className="text-lg font-bold text-white mb-4">{metric.label} Over Time</h3>
            {metricData.length > 0 ? (
              <div className="space-y-4">
                {[...new Set(metricData.map(d => d.site))].map(site => {
                  const siteData = metricData.filter(d => d.site === site);
                  return (
                    <div key={site} className="border-b border-slate-700/50 pb-4 last:border-0">
                      <p className="text-sm font-bold text-slate-300 mb-2">{site}</p>
                      <div className="grid grid-cols-2 gap-4">
                        {['TX1', 'TX2'].map(tx => {
                          const txData = siteData.filter(d => d.tx === tx);
                          const avg = txData.length > 0 ? (txData.reduce((sum, d) => sum + d.value, 0) / txData.length).toFixed(2) : 'N/A';
                          const min = txData.length > 0 ? Math.min(...txData.map(d => d.value)).toFixed(2) : 'N/A';
                          const max = txData.length > 0 ? Math.max(...txData.map(d => d.value)).toFixed(2) : 'N/A';
                          
                          return (
                            <div key={tx} className="bg-slate-900/50 rounded-lg p-3">
                              <p className="text-xs font-bold text-noaa-sky mb-2">{tx}</p>
                              <div className="space-y-1 text-xs">
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Avg:</span>
                                  <span className="text-white font-mono">{avg}</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Min:</span>
                                  <span className="text-emerald-400 font-mono">{min}</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Max:</span>
                                  <span className="text-red-400 font-mono">{max}</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">Count:</span>
                                  <span className="text-white font-mono">{txData.length}</span>
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            ) : (
              <div className="text-center py-12">
                <Icon name="BarChart3" className="w-12 h-12 text-slate-600 mx-auto mb-3" />
                <p className="text-slate-400">No inspection data available for selected filters</p>
              </div>
            )}
          </div>

          {/* Recent Inspections Table */}
          <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-6">
            <h3 className="text-lg font-bold text-white mb-4 flex items-center gap-2">
              <Icon name="Clock" className="w-5 h-5 text-noaa-sky" /> Recent Inspections
            </h3>
            {inspections.length > 0 ? (
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="border-b border-slate-700">
                      <th className="text-left py-2 px-3 text-slate-400 font-semibold">Date</th>
                      <th className="text-left py-2 px-3 text-slate-400 font-semibold">Site</th>
                      <th className="text-left py-2 px-3 text-slate-400 font-semibold">TX Type</th>
                      <th className="text-right py-2 px-3 text-slate-400 font-semibold">TX1 Freq</th>
                      <th className="text-right py-2 px-3 text-slate-400 font-semibold">TX2 Freq</th>
                      <th className="text-center py-2 px-3 text-slate-400 font-semibold">Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    {inspections.slice(0, 15).map(i => {
                      const freq1 = Math.abs(parseFloat(i.tx1_freq_error) || 0);
                      const freq2 = Math.abs(parseFloat(i.tx2_freq_error) || 0);
                      const isSpec = freq1 <= 200 && freq2 <= 200;
                      
                      return (
                        <tr key={i.id} className="border-b border-slate-700/50 hover:bg-slate-700/30">
                          <td className="py-2 px-3 text-slate-300 font-mono text-xs">
                            {new Date(i.timestamp).toLocaleDateString()}
                          </td>
                          <td className="py-2 px-3 text-white">{i.siteName || i.siteId}</td>
                          <td className="py-2 px-3 text-slate-300 capitalize">{i.txType}</td>
                          <td className="py-2 px-3 text-right font-mono">
                            <span className={freq1 > 200 ? 'text-red-400' : 'text-emerald-400'}>
                              {i.tx1_freq_error || 'N/A'}
                            </span>
                          </td>
                          <td className="py-2 px-3 text-right font-mono">
                            <span className={freq2 > 200 ? 'text-red-400' : 'text-emerald-400'}>
                              {i.tx2_freq_error || 'N/A'}
                            </span>
                          </td>
                          <td className="py-2 px-3 text-center">
                            {isSpec ? (
                              <span className="inline-flex items-center gap-1 px-2 py-1 bg-emerald-500/20 text-emerald-400 rounded-full text-xs font-medium">
                                <Icon name="CheckCircle" className="w-3 h-3" /> In Spec
                              </span>
                            ) : (
                              <span className="inline-flex items-center gap-1 px-2 py-1 bg-red-500/20 text-red-400 rounded-full text-xs font-medium">
                                <Icon name="AlertTriangle" className="w-3 h-3" /> Out of Spec
                              </span>
                            )}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            ) : (
              <div className="text-center py-8">
                <p className="text-slate-400">No recent inspections found</p>
              </div>
            )}
          </div>

          {/* Recent Maintenance Log Activity */}
          <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-6">
            <h3 className="text-lg font-bold text-white mb-4 flex items-center gap-2">
              <Icon name="ScrollText" className="w-5 h-5 text-amber-400" /> Recent Maintenance Activity
            </h3>
            {logEntries.length > 0 ? (
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="border-b border-slate-700">
                      <th className="text-left py-2 px-3 text-slate-400 font-semibold">Date</th>
                      <th className="text-left py-2 px-3 text-slate-400 font-semibold">Time</th>
                      <th className="text-left py-2 px-3 text-slate-400 font-semibold">Site</th>
                      <th className="text-left py-2 px-3 text-slate-400 font-semibold">Remarks</th>
                      <th className="text-center py-2 px-3 text-slate-400 font-semibold">Initials</th>
                    </tr>
                  </thead>
                  <tbody>
                    {logEntries.slice(0, 15).map(log => (
                      <tr key={log.id} className="border-b border-slate-700/50 hover:bg-slate-700/30">
                        <td className="py-2 px-3 text-slate-300 font-mono text-xs">
                          {new Date(log.timestamp).toLocaleDateString()}
                        </td>
                        <td className="py-2 px-3 text-slate-300 font-mono text-xs">{log.time}</td>
                        <td className="py-2 px-3">
                          <div className="text-white text-sm">{log.siteName}</div>
                          <div className="text-slate-500 text-xs font-mono">{log.siteCall}</div>
                        </td>
                        <td className="py-2 px-3 text-slate-300">{log.remarks}</td>
                        <td className="py-2 px-3 text-center">
                          <span className="inline-flex items-center px-2 py-1 bg-slate-700 text-white rounded text-xs font-bold">
                            {log.initials}
                          </span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ) : (
              <div className="text-center py-8">
                <Icon name="ScrollText" className="w-12 h-12 text-slate-600 mx-auto mb-3 opacity-30" />
                <p className="text-slate-400">No maintenance log entries found</p>
              </div>
            )}
          </div>
        </div>
      );
    };

    // Sites
    const SitesList = () => {
      const [q, setQ] = useState('');
      const [expanded, setExpanded] = useState({});
      const filtered = SITES.filter(s => s.name.toLowerCase().includes(q.toLowerCase()) || s.call.toLowerCase().includes(q.toLowerCase()) || s.tx.toLowerCase().includes(q.toLowerCase()));
      const color = (t) => t.includes('Crown') ? 'teal' : t.includes('Armstrong') ? 'blue' : 'purple';
      
      const toggleExpand = (id) => {
        setExpanded(prev => ({ ...prev, [id]: !prev[id] }));
      };

      return (
        <div className="space-y-6 animate-in">
          <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4 flex flex-col sm:flex-row gap-4 justify-between items-center">
            <div className="flex items-center gap-4">
              <h2 className="text-lg font-bold text-white flex items-center gap-2"><Icon name="MapPin" className="w-5 h-5 text-noaa-sky" /> Site Directory</h2>
              <div className="flex items-center gap-2 px-3 py-1.5 bg-emerald-500/10 border border-emerald-500/30 rounded-lg">
                <div className="relative">
                  <div className="w-2 h-2 rounded-full bg-emerald-500" />
                  <div className="absolute inset-0 w-2 h-2 rounded-full bg-emerald-500 animate-ping opacity-50" />
                </div>
                <span className="text-emerald-400 text-xs font-medium">All Sites Operational</span>
              </div>
            </div>
            <div className="relative w-full sm:w-72">
              <Icon name="Search" className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-500" />
              <input type="text" placeholder="Search name, call, or transmitter..." value={q} onChange={e => setQ(e.target.value)}
                className="w-full pl-10 pr-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-sm text-white focus:border-noaa-sky outline-none" />
            </div>
          </div>
          
          {/* Summary Stats */}
          <div className="grid grid-cols-3 gap-4">
            <div className="bg-teal-500/10 border border-teal-500/30 rounded-xl p-4 text-center">
              <p className="text-2xl font-bold text-teal-400">{SITES.filter(s => s.tx.includes('Crown')).length}</p>
              <p className="text-xs text-teal-400/70">Crown</p>
            </div>
            <div className="bg-blue-500/10 border border-blue-500/30 rounded-xl p-4 text-center">
              <p className="text-2xl font-bold text-blue-400">{SITES.filter(s => s.tx.includes('Armstrong')).length}</p>
              <p className="text-xs text-blue-400/70">Armstrong</p>
            </div>
            <div className="bg-purple-500/10 border border-purple-500/30 rounded-xl p-4 text-center">
              <p className="text-2xl font-bold text-purple-400">{SITES.filter(s => s.tx.includes('Nautel')).length}</p>
              <p className="text-xs text-purple-400/70">Nautel</p>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            {filtered.map(s => (
              <div key={s.id} className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-5 hover:border-slate-600/50 transition-all">
                <div className="flex justify-between mb-3">
                  <div>
                    <div className="flex items-center gap-2">
                      <h3 className="font-bold text-white text-lg">{s.name}</h3>
                      <div className="relative">
                        <div className="w-2 h-2 rounded-full bg-emerald-500" />
                        <div className="absolute inset-0 w-2 h-2 rounded-full bg-emerald-500 animate-ping opacity-50" />
                      </div>
                    </div>
                    <p className="text-noaa-sky font-mono text-sm">{s.call}</p>
                  </div>
                  <div className="w-10 h-10 rounded-lg bg-slate-900 flex items-center justify-center">
                    <Icon name="Radio" className="w-5 h-5 text-noaa-sky" />
                  </div>
                </div>
                <div className="space-y-1.5 text-sm">
                  <div className="flex justify-between">
                    <span className="text-slate-500">Frequency</span>
                    <span className="text-white font-mono">{s.freq}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-500">Coordinates</span>
                    <span className="text-slate-300 font-mono text-xs">{s.lat}, {s.lng}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-slate-500">Status</span>
                    <span className="text-emerald-400 text-xs font-medium">● Online</span>
                  </div>
                </div>
                
                {/* Expandable Details Section */}
                {expanded[s.id] && (
                  <div className="mt-3 pt-3 border-t border-slate-700/50 space-y-3 animate-in">
                    {s.address && (
                      <div>
                        <p className="text-xs text-slate-500 font-semibold mb-1">ADDRESS</p>
                        <p className="text-sm text-white">{s.address}</p>
                        {s.building && <p className="text-xs text-slate-400 mt-1">Building: {s.building}</p>}
                      </div>
                    )}
                    
                    {(s.poc || s.phone) && (
                      <div>
                        <p className="text-xs text-slate-500 font-semibold mb-1">POINT OF CONTACT</p>
                        <p className="text-sm text-white">{s.poc}</p>
                        {s.phone && <p className="text-sm text-noaa-sky font-mono">{s.phone}</p>}
                      </div>
                    )}
                    
                    {(s.gateCode || s.lockboxCode || s.securityCode) && (
                      <div className="bg-slate-900/50 border border-amber-500/30 rounded-lg p-3">
                        <p className="text-xs text-amber-400 font-semibold mb-2">🔐 ACCESS CODES</p>
                        <div className="space-y-1">
                          {s.gateCode && (
                            <div className="flex justify-between text-sm">
                              <span className="text-slate-400">Gate:</span>
                              <span className="text-amber-300 font-mono font-semibold">{s.gateCode}</span>
                            </div>
                          )}
                          {s.lockboxCode && (
                            <div className="flex justify-between text-sm">
                              <span className="text-slate-400">Lockbox:</span>
                              <span className="text-amber-300 font-mono font-semibold">{s.lockboxCode}</span>
                            </div>
                          )}
                          {s.securityCode && (
                            <div className="flex justify-between text-sm">
                              <span className="text-slate-400">Security:</span>
                              <span className="text-amber-300 font-mono font-semibold">{s.securityCode}</span>
                            </div>
                          )}
                        </div>
                      </div>
                    )}
                    
                    {s.notes && (
                      <div className="bg-amber-500/10 border border-amber-500/30 rounded-lg p-2">
                        <p className="text-xs text-amber-400 flex items-center gap-1">
                          <Icon name="AlertTriangle" className="w-3 h-3" />
                          {s.notes}
                        </p>
                      </div>
                    )}
                    
                    {s.mapsLink && (
                      <a href={s.mapsLink} target="_blank" className="flex items-center justify-center gap-2 w-full px-4 py-2 bg-noaa-sky text-white text-sm font-semibold rounded-lg hover:bg-noaa-light transition-colors">
                        <Icon name="Navigation" className="w-4 h-4" />
                        Open in Maps
                      </a>
                    )}
                  </div>
                )}

                <div className="mt-3 pt-3 border-t border-slate-700/50 flex justify-between items-center">
                  <span className={
                    color(s.tx) === 'teal'
                      ? 'text-xs px-2.5 py-1 rounded-full border font-semibold bg-teal-500/10 text-teal-400 border-teal-500/30'
                      : color(s.tx) === 'blue'
                      ? 'text-xs px-2.5 py-1 rounded-full border font-semibold bg-blue-500/10 text-blue-400 border-blue-500/30'
                      : 'text-xs px-2.5 py-1 rounded-full border font-semibold bg-purple-500/10 text-purple-400 border-purple-500/30'
                  }>{s.tx}</span>
                  <button onClick={() => toggleExpand(s.id)} className="text-xs text-noaa-sky font-semibold flex items-center gap-1 hover:text-noaa-light transition-colors">
                    {expanded[s.id] ? 'Hide' : 'Details'}
                    <Icon name={expanded[s.id] ? "ChevronUp" : "ChevronDown"} className="w-3 h-3" />
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // App
    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [tab, setTab] = useState('dashboard');

      useEffect(() => {
        const unsub = auth.onAuthStateChanged(u => { setUser(u); setLoading(false); });
        if (!auth.currentUser) auth.signInAnonymously().catch(() => setLoading(false));
        return unsub;
      }, []);

      if (loading) return <div className="min-h-screen bg-slate-900 flex items-center justify-center"><Icon name="Loader2" className="w-8 h-8 text-noaa-sky animate-spin" /></div>;

      if (!user) return (
        <div className="min-h-screen bg-gradient-to-br from-noaa-blue via-slate-900 to-noaa-blue flex items-center justify-center p-4">
          <div className="bg-slate-900/90 border border-slate-700/50 rounded-2xl p-8 max-w-md w-full text-center">
            <div className="w-16 h-16 mx-auto mb-4 rounded-xl bg-noaa-sky/20 flex items-center justify-center"><Icon name="Radio" className="w-8 h-8 text-noaa-sky" /></div>
            <h1 className="text-2xl font-bold text-white mb-2">NWR Maintenance</h1>
            <p className="text-noaa-sky text-sm mb-6">EHB-7 Technician Portal</p>
            <button onClick={() => { setLoading(true); auth.signInAnonymously().catch(() => setLoading(false)); }}
              className="w-full bg-noaa-light hover:bg-noaa-sky text-white font-semibold py-3 rounded-xl">Enter Portal</button>
          </div>
        </div>
      );

      const navItems = [
        { id: 'dashboard', label: 'Dashboard', icon: 'LayoutDashboard' },
        { id: 'forms', label: 'Inspection', icon: 'ClipboardList' },
        { id: 'analytics', label: 'Analytics', icon: 'TrendingUp' },
        { id: 'sites', label: 'Sites', icon: 'Radio' }
      ];

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-slate-200 pb-24">
          {/* Header with Storm-Themed Banner */}
          <header className="sticky top-0 z-50">
            <div className="relative h-32 border-b-4 border-noaa-cyan/50 overflow-hidden" style={{
              background: 'linear-gradient(135deg, #0f172a 0%, #1e293b 20%, #334155 40%, #475569 60%, #64748b 80%, #94a3b8 100%)',
            }}>
              {/* Animated lightning bolts pattern */}
              <div className="absolute inset-0 opacity-20" style={{
                backgroundImage: `url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 5 L43 28 L55 24 L40 50 L37 32 L25 36 Z' fill='%23ffffff' opacity='0.3'/%3E%3Cpath d='M65 15 L67 30 L75 28 L65 45 L63 35 L55 37 Z' fill='%23ffffff' opacity='0.2'/%3E%3C/svg%3E")`,
                backgroundSize: '160px 160px',
                backgroundRepeat: 'repeat'
              }} />
              
              {/* Dark overlay for text contrast */}
              <div className="absolute inset-0 bg-gradient-to-r from-slate-950/85 via-slate-900/60 to-slate-950/85" />
              
              <div className="relative max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
                <div className="flex items-center gap-4">
                  <div className="w-16 h-16 bg-white/95 rounded-2xl flex items-center justify-center shadow-2xl shadow-noaa-blue/40 border-2 border-noaa-cyan/40">
                    <Icon name="Radio" className="w-8 h-8 text-noaa-blue" />
                  </div>
                  <div>
                    <h1 className="font-black text-white text-3xl tracking-tight drop-shadow-lg" style={{textShadow: '0 2px 12px rgba(0,0,0,0.6)'}}>
                      NWRManager
                    </h1>
                    <p className="text-sm text-noaa-cyan uppercase tracking-widest font-bold drop-shadow-md">
                      National Weather Service • Maintenance Portal
                    </p>
                  </div>
                </div>
                
                <nav className="hidden md:flex gap-2 bg-slate-900/90 backdrop-blur-xl rounded-xl p-1.5 border border-slate-700/60 shadow-2xl">
                  {navItems.map(n => (
                    <button key={n.id} onClick={() => setTab(n.id)}
                      className={`px-5 py-2.5 rounded-lg text-sm font-bold flex items-center gap-2 transition-all ${
                        tab === n.id 
                          ? 'bg-noaa-blue text-white shadow-lg shadow-noaa-blue/40' 
                          : 'text-slate-300 hover:text-white hover:bg-slate-800/80'
                      }`}>
                      <Icon name={n.icon} className="w-4 h-4" /> {n.label}
                    </button>
                  ))}
                  <button onClick={() => auth.signOut()} 
                    className="px-4 py-2.5 rounded-lg text-sm font-bold text-slate-400 hover:text-red-400 hover:bg-red-500/10 transition-all flex items-center gap-2">
                    <Icon name="LogOut" className="w-4 h-4" />
                  </button>
                </nav>
                
                <button onClick={() => auth.signOut()}
                  className="md:hidden text-white/80 hover:text-white transition-colors p-3 hover:bg-white/10 rounded-xl backdrop-blur">
                  <Icon name="LogOut" className="w-5 h-5" />
                </button>
              </div>
            </div>
          </header>
          <main className="max-w-7xl mx-auto px-4 py-6">
            {tab === 'dashboard' && <Dashboard setTab={setTab} />}
            {tab === 'forms' && <InspectionForm user={user} />}
            {tab === 'analytics' && <Analytics />}
            {tab === 'sites' && <SitesList />}
          </main>
          <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-noaa-blue/95 border-t border-slate-800 px-2 py-2 z-50">
            <div className="flex justify-around">
              {navItems.map(n => (
                <button key={n.id} onClick={() => setTab(n.id)} className={`flex flex-col items-center gap-1 px-3 py-2 ${tab === n.id ? 'text-white' : 'text-white/50'}`}>
                  <Icon name={n.icon} className="w-5 h-5" />
                  <span className="text-[10px]">{n.label}</span>
                </button>
              ))}
            </div>
          </nav>
        </div>
      );
    }

    // Render App with ErrorBoundary
    ReactDOM.createRoot(document.getElementById('root')).render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
