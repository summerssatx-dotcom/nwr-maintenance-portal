    // Error Boundary Component
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, errorInfo: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true };
      }

      componentDidCatch(error, errorInfo) {
        console.error('ErrorBoundary caught an error:', error, errorInfo);
        this.setState({ error, errorInfo });
      }

        if (this.state.hasError) {

    const Input = React.memo(

          <label className={`block text-slate-400 mb-1 ${small ? 'text-[10px]' : 'text-xs'} uppercase font-semibold`}>

      (prev, next) =>
        prev.label === next.label &&
        prev.field === next.field &&
        prev.data[prev.field] === next.data[next.field] &&

    const Textarea = React.memo(

    const Radio = ({ label, field, data, set, options }) => (

    const DualInput = React.memo(
      ({ label, dbm, vrms, data, set }) => (

              <span className="text-[10px] text-slate-500">dBm</span>

                className="w-full bg-slate-900/80 border border-slate-700/50 text-white rounded-lg p-2 text-sm focus:border-noaa-sky outline-none" />
              <span className="text-[10px] text-slate-500">Vrms</span>

      (prev, next) =>

    // Main Form
    // Facility Maintenance Log (FAA 6030-1 style)
    const MaintenanceLog = () => {
      const [entries, setEntries] = useState([]);
      const [showAdd, setShowAdd] = useState(false);
      const [newEntry, setNewEntry] = useState({ siteId: '', time: '', remarks: '', initials: '' });
      const [loading, setLoading] = useState(true);

      // Load maintenance log entries from Firebase
      useEffect(() => {
        const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data')
          .collection('maintenance_log')
          .orderBy('timestamp', 'desc')
          .onSnapshot(snapshot => {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setEntries(data);
            setLoading(false);
          }, error => {
            console.error('Error loading maintenance log:', error);
            setLoading(false);
          });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        // Auto-populate current time when adding new entry
        if (showAdd && !newEntry.time) {
          const now = new Date();
          const time24 = now.toTimeString().split(' ')[0].substring(0, 5); // HH:MM
          setNewEntry(prev => ({ ...prev, time: time24 }));
        }
      }, [showAdd]);

      const addEntry = async () => {
        // Input validation
        if (!newEntry.siteId) {
          alert('⚠️ Please select a site');
          return;
        }
        if (!newEntry.time) {
          alert('⚠️ Please enter the time');
          return;
        }
        if (!newEntry.remarks || newEntry.remarks.trim().length === 0) {
          alert('⚠️ Please enter remarks');
          return;
        }
        if (!newEntry.initials || newEntry.initials.trim().length === 0) {
          alert('⚠️ Please enter your initials');
          return;
        }
        if (newEntry.initials.length > 4) {
          alert('⚠️ Initials must be 4 characters or less');
          return;
        }

        const now = new Date();
        const site = SITES.find(s => s.id === newEntry.siteId);
        const entry = {
          date: now.toISOString().split('T')[0],
          time: newEntry.time,
          siteId: newEntry.siteId,
          siteName: site?.name || newEntry.siteId,
          siteCall: site?.call || '',
          remarks: newEntry.remarks.trim(),
          initials: newEntry.initials.trim().toUpperCase(),
          timestamp: now.toISOString()
        };

        try {
          await db.collection('artifacts').doc(appId).collection('public').doc('data')
            .collection('maintenance_log').add(entry);
          setNewEntry({ siteId: '', time: '', remarks: '', initials: '' });
          setShowAdd(false);
        } catch (error) {
          console.error('Error saving log entry:', error);
          alert('❌ Error saving log entry. Please try again.');
        }
      };

      const deleteEntry = async (id) => {
        if (confirm('Delete this log entry?')) {
          try {
            await db.collection('artifacts').doc(appId).collection('public').doc('data')
              .collection('maintenance_log').doc(id).delete();
          } catch (error) {
            console.error('Error deleting log entry:', error);
            alert('❌ Error deleting log entry. Please try again.');
          }
        }
      };

      return (
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-2xl overflow-hidden h-full flex flex-col">
          <div className="bg-gradient-to-r from-slate-700 to-slate-900 p-5 border-b border-slate-700/50">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-lg bg-slate-600/50 flex items-center justify-center">
                  <Icon name="FileText" className="w-5 h-5 text-slate-300" />
                </div>
                <div>
                  <h2 className="text-lg font-bold text-white">Facility Maintenance Log</h2>
                  <p className="text-xs text-slate-400">FAA Form 6030-1 Style</p>
                </div>
              </div>
              <button onClick={() => setShowAdd(!showAdd)}
                className="p-2 hover:bg-slate-600 rounded-lg text-slate-300 hover:text-white transition-colors">
                <Icon name={showAdd ? "X" : "Plus"} className="w-5 h-5" />
              </button>
            </div>
            {showAdd && (
              <div className="mt-4 p-4 bg-slate-900/50 rounded-xl border border-slate-600 space-y-3 animate-in">
                <select value={newEntry.siteId} onChange={e => setNewEntry({...newEntry, siteId: e.target.value})}
                  className="w-full bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2.5 outline-none focus:border-noaa-sky">
                  <option value="">— Select Site —</option>
                  {SITES.map(s => <option key={s.id} value={s.id}>{s.name} ({s.call})</option>)}
                </select>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-xs text-slate-400 mb-1 uppercase font-semibold">Time (24-hour)</label>
                    <input type="time" value={newEntry.time} onChange={e => setNewEntry({...newEntry, time: e.target.value})}
                      className="w-full bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2.5 outline-none focus:border-noaa-sky" />
                  </div>
                  <div>
                    <label className="block text-xs text-slate-400 mb-1 uppercase font-semibold">Initials</label>
                    <input type="text" placeholder="Initials *" value={newEntry.initials} onChange={e => setNewEntry({...newEntry, initials: e.target.value})}
                      className="w-full bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2.5 outline-none focus:border-noaa-sky" maxLength="4" />
                  </div>
                </div>
                <textarea placeholder="Remarks *" value={newEntry.remarks} onChange={e => setNewEntry({...newEntry, remarks: e.target.value})}
                  className="w-full bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2.5 outline-none focus:border-noaa-sky resize-none" rows="3" />
                <button onClick={addEntry}
                  className="w-full bg-noaa-blue hover:bg-noaa-light text-white text-sm font-bold py-2.5 rounded-lg transition-colors">
                  Add Entry
                </button>
              </div>
            )}
          </div>

          <div className="flex-1 overflow-hidden flex flex-col">
            {entries.length > 0 ? (
              <>
                <div className="bg-slate-900/50 border-b border-slate-700/50 p-2 grid grid-cols-12 gap-2 text-xs font-bold text-slate-400 uppercase">
                  <div className="col-span-2">Date</div>
                  <div className="col-span-1">Time</div>
                  <div className="col-span-2">Site</div>
                  <div className="col-span-6">Remarks</div>
                  <div className="col-span-1 text-center">Init</div>
                </div>
                <div className="flex-1 overflow-y-auto scrollbar-thin">
                  {entries.map(entry => (
                    <div key={entry.id} className="p-2 border-b border-slate-700/30 hover:bg-slate-900/30 transition-colors grid grid-cols-12 gap-2 text-sm group">
                      <div className="col-span-2 text-slate-400 font-mono text-xs">
                        {new Date(entry.date).toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: '2-digit' })}
                      </div>
                      <div className="col-span-1 text-slate-400 font-mono text-xs">{entry.time}</div>
                      <div className="col-span-2">
                        <div className="text-white text-xs font-semibold">{entry.siteName}</div>
                        <div className="text-slate-500 text-[10px] font-mono">{entry.siteCall}</div>
                      </div>
                      <div className="col-span-6 text-white text-xs leading-relaxed">{entry.remarks}</div>
                      <div className="col-span-1 flex items-center justify-between">
                        <span className="text-slate-300 font-bold text-xs">{entry.initials}</span>
                        <button onClick={() => deleteEntry(entry.id)}
                          className="opacity-0 group-hover:opacity-100 p-1 hover:bg-red-500/20 rounded text-slate-500 hover:text-red-400 transition-all">
                          <Icon name="X" className="w-3 h-3" />
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            ) : (
              <div className="flex-1 flex items-center justify-center text-center p-8">
                <div>
                  <Icon name="FileText" className="w-12 h-12 mx-auto mb-3 text-slate-600 opacity-30" />
                  <p className="text-slate-500 text-sm">No log entries</p>
                  <p className="text-slate-600 text-xs mt-1">Click + to add first entry</p>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const InspectionForm = ({ user, userRole, editingInspection, setEditingInspection }) => {
      const [step, setStep] = useState(1);
      const [txType, setTxType] = useState(null);
      const [isClassic, setIsClassic] = useState(false);
      const [is1KW, setIs1KW] = useState(false);
      const [activeTx, setActiveTx] = useState('tx1');
      const [saving, setSaving] = useState(false);
      const [data, setData] = useState({});

      const set = useCallback((f, v) => setData(p => ({ ...p, [f]: v })), []);
      const site = SITES.find(s => s.id === data.siteId);

      // Load data when editing an inspection
      useEffect(() => {
        if (editingInspection) {
          setData(editingInspection);
          // Set transmitter type states
          if (editingInspection.txType) setTxType(editingInspection.txType);
          if (editingInspection.isClassic !== undefined) setIsClassic(editingInspection.isClassic);
          if (editingInspection.is1KW !== undefined) setIs1KW(editingInspection.is1KW);
          if (editingInspection.activeTx) setActiveTx(editingInspection.activeTx);
        }
      }, [editingInspection]);

      const handleSiteChange = (id) => {
        const s = SITES.find(x => x.id === id);
        set('siteId', id);
        if (s) {
          const t = s.tx.toLowerCase();
          if (t.includes('crown')) { setTxType('crown'); setIsClassic(false); setIs1KW(t.includes('1kw')); }
          else if (t.includes('nautel')) { setTxType('nautel'); setIsClassic(false); setIs1KW(true); setActiveTx('txa'); }
          else if (t.includes('armstrong')) { setTxType('armstrong'); setIsClassic(t.includes('classic')); setIs1KW(true); }
        }
      };

      const save = async () => {
        // Input validation
        if (!data.siteId || !data.date) {
          alert('⚠️ Please complete at least Site and Date fields before saving');
          return;
        }

        setSaving(true);
        try {
          const inspectionData = {
            ...data, txType, isClassic, is1KW, siteName: site?.name, siteCall: site?.call,
            techId: user?.uid
          };

          if (editingInspection && editingInspection.id) {
            // Update existing inspection
            const { id, ...dataToUpdate } = inspectionData;
            await db.collection('artifacts').doc(appId).collection('public').doc('data')
              .collection('inspections').doc(editingInspection.id).update({
                ...dataToUpdate,
                lastModified: new Date().toISOString()
              });
            alert('✓ Inspection updated successfully!');
            setEditingInspection(null);
          } else {
            // Create new inspection
            await db.collection('artifacts').doc(appId).collection('public').doc('data')
              .collection('inspections').add({
                ...inspectionData,
                timestamp: new Date().toISOString()
              });
            alert('✓ Inspection saved successfully!');
          }
          setStep(1); setData({}); setTxType(null);
        } catch (e) {
          console.error('Error saving inspection:', e);
          alert('❌ Error saving inspection: ' + (e.message || 'Unknown error occurred. Please try again.'));
        } finally {
          setSaving(false);
        }
      };

      const exportToPDF = () => {
        if (!data.siteId || !data.date) {
          alert('Please complete at least Site and Date fields before exporting');
          return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pageWidth = doc.internal.pageSize.getWidth();
        let yPos = 20;

        const checkSpace = (needed = 30) => {
          if (yPos > 270 - needed) {
            doc.addPage();
            yPos = 20;
          }
        };

        const addSectionHeader = (title) => {
          checkSpace(15);
          doc.setFontSize(12);
          doc.setTextColor(14, 165, 233);
          doc.text(title, 20, yPos);
          yPos += 8;
          doc.setFontSize(10);
          doc.setTextColor(0, 0, 0);
        };

        const addField = (label, value, unit = '') => {
          if (!value || value === '') return false;
          checkSpace(8);
          doc.setTextColor(100, 116, 139);
          doc.text(label, 25, yPos);
          doc.setTextColor(0, 0, 0);
          const displayValue = value + (unit ? ` ${unit}` : '');
          const lines = doc.splitTextToSize(displayValue.toString(), pageWidth - 80);
          doc.text(lines, 80, yPos);
          yPos += 6 * lines.length + 2;
          return true;
        };

        // Header
        doc.setFontSize(18);
        doc.setTextColor(14, 165, 233);
        doc.text('NOAA Weather Radio Inspection Report', pageWidth / 2, yPos, { align: 'center' });
        yPos += 8;
        doc.setFontSize(11);
        doc.setTextColor(100, 116, 139);
        doc.text('EHB-7 Compliance Inspection', pageWidth / 2, yPos, { align: 'center' });
        yPos += 15;

        // Site Information (always shown)
        addSectionHeader('Site Information');
        addField('Site:', site?.name || 'N/A');
        addField('Call Sign:', site?.call || 'N/A');
        addField('Frequency:', site?.freq || 'N/A');
        addField('Transmitter:', site?.tx || 'N/A');
        addField('Date:', data.date || 'N/A');
        addField('Technician:', data.tech || 'N/A');
        yPos += 5;

        // Section 1: Filters Replaced
        if (data.filters) {
          addSectionHeader('Section 1: Filters Replaced');
          addField('Filters:', data.filters);
          yPos += 5;
        }

        // Section 2: Visual Inspection
        let hasSection2 = false;
        if (data.visualComments || data.defectiveFans) {
          addSectionHeader('Section 2: Visual Inspection');
          hasSection2 = addField('Comments:', data.visualComments) || hasSection2;
          hasSection2 = addField('Defective Fans:', data.defectiveFans) || hasSection2;
          if (hasSection2) yPos += 5;
        }

        // Section 3: AC Input, Surge, ROAMS
        let hasSection3 = false;
        if (data.ac1 || data.ac2 || data.surgeOk || data.roamsDate || data.roamsReplaced) {
          addSectionHeader('Section 3: AC Input, Surge, ROAMS');
          hasSection3 = addField('AC Input TX1:', data.ac1, 'V') || hasSection3;
          hasSection3 = addField('AC Input TX2:', data.ac2, 'V') || hasSection3;
          hasSection3 = addField('Surge Protector OK:', data.surgeOk) || hasSection3;
          hasSection3 = addField('ROAMS Battery Date:', data.roamsDate) || hasSection3;
          hasSection3 = addField('ROAMS Replaced:', data.roamsReplaced) || hasSection3;
          if (hasSection3) yPos += 5;
        }

        // Section 4-5: Power Measurements
        const txPrefix = txType === 'nautel' ? ['txa', 'txb'] : ['tx1', 'tx2'];
        txPrefix.forEach((tx, idx) => {
          const txNum = idx + 1;
          const txName = txType === 'nautel' ? (tx === 'txa' ? 'TX A' : 'TX B') : `TX ${txNum}`;
          const powerFields = Object.keys(data).filter(k => k.startsWith(tx + '_') && data[k]);
          if (powerFields.length > 0) {
            addSectionHeader(`Section 4-5: ${txName} Power Measurements`);
            powerFields.forEach(field => {
              const label = field.replace(tx + '_', '').replace(/_/g, ' ').toUpperCase();
              addField(label + ':', data[field]);
            });
            yPos += 5;
          }
        });

        // Section 6-7: Frequency & Modulation
        if (data.freq_init_1 || data.freq_final_1 || data.freq_init_2 || data.freq_final_2 || data.mod_crt_1 || data.mod_meter_1 || data.mod_crt_2 || data.mod_meter_2) {
          addSectionHeader('Section 6-7: Frequency & Modulation');
          addField('Freq Initial TX1:', data.freq_init_1, 'MHz');
          addField('Freq Final TX1:', data.freq_final_1, 'MHz');
          addField('Freq Initial TX2:', data.freq_init_2, 'MHz');
          addField('Freq Final TX2:', data.freq_final_2, 'MHz');
          addField('Mod CRT TX1:', data.mod_crt_1);
          addField('Mod Meter TX1:', data.mod_meter_1);
          addField('Mod CRT TX2:', data.mod_crt_2);
          addField('Mod Meter TX2:', data.mod_meter_2);
          yPos += 5;
        }

        // Section 8: Audio
        const audioFields = Object.keys(data).filter(k => k.startsWith('audio') && data[k]);
        if (audioFields.length > 0) {
          addSectionHeader('Section 8: Audio Input Level');
          audioFields.forEach(field => {
            const label = field.replace(/audio\d_/, '').replace(/_/g, ' ').toUpperCase();
            addField(label + ':', data[field]);
          });
          yPos += 5;
        }

        // Section 9: Transfer

                <div className="mb-3 pb-3 border-b border-slate-700/50">
                  <p className="text-xs text-slate-400 mb-2">1050 Hz Alert Tone (-9 to -12 dBm)</p>
                  <div className="grid grid-cols-2 gap-3">
                    <DualInput label="Alert Tone" dbm={`audio${n}_alert_dbm`} vrms={`audio${n}_alert_vrms`} data={data} set={set} />
                    <Input label="Modulation" field={`audio${n}_alert_mod`} data={data} set={set} type="number" unit="kHz" />
                  </div>
                </div>
                <div className="mb-3 pb-3 border-b border-slate-700/50">
                  <p className="text-xs text-slate-400 mb-2">SAME Level (H/W) (-14.5 dBm ±0.5)</p>
                  <div className="grid grid-cols-2 gap-3">
                    <DualInput label="SAME H/W" dbm={`audio${n}_hw_dbm`} vrms={`audio${n}_hw_vrms`} data={data} set={set} />
                    <Input label="Modulation" field={`audio${n}_hw_mod`} data={data} set={set} type="number" unit="kHz" />
                  </div>
                </div>
                <div>
                  <p className="text-xs text-slate-400 mb-2">SAME Level (CRS) (-14.5 dBm ±0.5)</p>
                  <div className="grid grid-cols-2 gap-3">
                    <DualInput label="SAME CRS" dbm={`audio${n}_crs_dbm`} vrms={`audio${n}_crs_vrms`} data={data} set={set} />
                    <Input label="Modulation" field={`audio${n}_crs_mod`} data={data} set={set} type="number" unit="kHz" />
                  </div>
                </div>
              </div>
            ))}
          </div>
        );
      }, [data, txType, set]);

      // Step 6: Transfer {9}
      const Step6 = useMemo(() => (
        <div className="space-y-3 animate-in">
          <Section title="Check Proper Transmitter Transfer" num="9" />
          <Radio label="Proper CRS transfer?" field="transfer_crs" data={data} set={set} options={[{value:'yes',label:'Yes'},{value:'no',label:'No'}]} />
          <Radio label="Proper ACP transfer?" field="transfer_acp" data={data} set={set} options={[{value:'yes',label:'Yes'},{value:'no',label:'No'}]} />
          <div className="p-3 bg-slate-800/50 rounded-xl border border-slate-700/50">
            <p className="text-sm text-slate-300 mb-2">Final broadcasting transmitter:</p>
            <div className="flex gap-4">
              {[1,2].map(n => (
                <label key={n} className="flex items-center gap-2 cursor-pointer">
                  <input type="radio" checked={data.final_tx === String(n)} onChange={() => set('final_tx', String(n))} />
                  <span className="text-white font-semibold">{txLabel(n)}</span>
                </label>
              ))}
            </div>
          </div>
        </div>
      ), [data.transfer_crs, data.transfer_acp, data.final_tx, set]);

      // Step 7: Generator {10}
      const Step7 = useMemo(() => {
        const runtime = txType === 'armstrong' ? '20' : '30';
        return (
          <div className="space-y-3 animate-in">
            <Section title="Backup Generator & Transfer Switch" num="10" note="If applicable" />
            <Textarea label="Fuel, oil, coolant level normal?" field="gen_fluids" data={data} set={set} />
            <Textarea label="Air filter still clean?" field="gen_air" data={data} set={set} />
            <Textarea label="Fluid leaks, electrical, or hose problems?" field="gen_problems" data={data} set={set} />
            <Textarea label="Transfer Switch performed transfer?" field="gen_transfer" data={data} set={set} />
            <Radio label={`Generator ran for ${runtime} minutes?`} field="gen_ran" data={data} set={set} options={[{value:'yes',label:'Yes'},{value:'no',label:'No'}]} />
            {txType === 'armstrong' && <Input label="Hour Meter Reading" field="gen_hours" data={data} set={set} />}
          </div>
        );
      }, [data, txType, set]);

      // Step 8: Signal Strength {11}
      const Step8 = useMemo(() => {
        if (txType === 'nautel') {
          return (
            <div className="space-y-3 animate-in">
              <div className="p-4 bg-purple-500/10 border border-purple-500/30 rounded-xl text-center">
                <p className="text-purple-400 font-semibold">Nautel Form Complete</p>
                <p className="text-slate-400 text-sm mt-1">No Section 11 for Nautel.</p>
              </div>
              <Textarea label="Notes" field="notes" data={data} set={set} rows={4} />
            </div>
          );
        }
        return (
          <div className="space-y-3 animate-in">
            <Section title="Signal Strength" num="11" note="Yearly • 0° = Due North" />
            <div className="grid grid-cols-3 gap-3">
              <Input label="Antenna Type" field="sig_ant" data={data} set={set} />
              <Input label="Height" field="sig_height" data={data} set={set} />
              <Input label="Orientation" field="sig_orient" data={data} set={set} />
            </div>
            {[0, 90, 180, 270].map(deg => (
              <div key={deg} className="p-3 bg-slate-800/50 rounded-xl border border-slate-700/50">
                <p className="text-white font-bold mb-2">{deg}°</p>
                <div className="grid grid-cols-4 gap-2">
                  <Input label="uV/m" field={`sig_${deg}_uvm`} data={data} set={set} type="number" small />
                  <Input label="dBuV/m" field={`sig_${deg}_db`} data={data} set={set} type="number" small />
                  <Input label="Dist" field={`sig_${deg}_dist`} data={data} set={set} type="number" unit="mi" small />
                  <Input label="Lat" field={`sig_${deg}_lat`} data={data} set={set} small />
                </div>
                <div className="mt-2"><Input label="Long" field={`sig_${deg}_lng`} data={data} set={set} small /></div>
              </div>
            ))}
            <Textarea label="Notes" field="notes" data={data} set={set} rows={4} />
          </div>
        );
      }, [data, txType, set]);

      const renderStep = useMemo(() => {
        switch(step) {
          case 1: return Step1;
          case 2: return Step2;
          case 3: return Step3;
          case 4: return Step4;
          case 5: return Step5;
          case 6: return Step6;
          case 7: return Step7;
          case 8: return Step8;
          default: return null;
        }
      }, [step, Step1, Step2, Step3, Step4, Step5, Step6, Step7, Step8]);

      return (
        <div className="grid lg:grid-cols-2 gap-6 animate-in">
          <div className="bg-slate-800/50 border border-slate-700/50 rounded-2xl overflow-hidden">
            <div className="bg-gradient-to-r from-noaa-blue to-slate-900 p-5 border-b border-slate-700/50">
              <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-noaa-sky/20 flex items-center justify-center">
                    <Icon name="ClipboardList" className="w-5 h-5 text-noaa-sky" />
                  </div>
                  <div>
                    <h2 className="text-lg font-bold text-white">{txType ? `${txType.charAt(0).toUpperCase() + txType.slice(1)} Transmitter` : 'NWR Transmitter'}</h2>
                    <p className="text-xs text-noaa-sky">Maintenance Form • EHB-7</p>
                  </div>
                </div>
                {site && <div className="text-right"><p className="text-white font-semibold">{site.name}</p><p className="text-xs text-noaa-sky font-mono">{site.call}</p></div>}
              </div>
              <div className="flex gap-1 overflow-x-auto pb-1">
                {steps.map((s, i) => (
                  <Fragment key={s.n}>
                    <button onClick={() => data.siteId && setStep(s.n)} disabled={!data.siteId}
                      className={`px-3 py-1.5 rounded-lg text-xs font-medium ${step === s.n ? 'bg-noaa-sky text-white' : step > s.n ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-700/50 text-slate-500'}`}>
                      {step > s.n ? '✓' : s.n} {s.l}
                    </button>
                    {i < steps.length - 1 && <div className={`w-3 h-0.5 self-center ${step > s.n ? 'bg-emerald-500/50' : 'bg-slate-700'}`} />}
                  </Fragment>
                ))}
              </div>
            </div>
            <div className="p-5 max-h-[60vh] overflow-y-auto">{renderStep}</div>
            <div className="p-5 border-t border-slate-700/50 bg-slate-900/50 flex justify-between items-center">
              {step > 1 ? <button onClick={() => setStep(step - 1)} className="px-5 py-2 rounded-xl bg-slate-700 text-white font-medium">← Back</button> : <div />}
              <div className="flex gap-3">
                {step === 8 && (
                  <button onClick={exportToPDF} className="px-5 py-2 rounded-xl bg-blue-600 text-white font-medium flex items-center gap-2">
                    <Icon name="FileDown" className="w-4 h-4" />
                    Export PDF
                  </button>
                )}
                {step < 8 ? (
                  <button onClick={() => setStep(step + 1)} disabled={!data.siteId} className="px-5 py-2 rounded-xl bg-noaa-light text-white font-medium disabled:opacity-50">Next →</button>
                ) : (
                  <button onClick={save} disabled={saving || !data.siteId} className="px-6 py-2 rounded-xl bg-emerald-500 text-white font-semibold disabled:opacity-50">
                    {saving ? 'Saving...' : '✓ Submit'}
                  </button>
                )}
              </div>
            </div>
          </div>
          <MaintenanceLog />
        </div>
      );
    };

    // Site Map Component
    const SiteMap = () => {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);

      useEffect(() => {
        if (mapRef.current && !mapInstanceRef.current) {
          // Center on Texas
          const map = L.map(mapRef.current).setView([29.5, -98.5], 7);
          
          // Add tile layer (CartoDB Voyager - medium tones, darkened via CSS)
          L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors, © CARTO',
            className: 'map-tiles-dark'
          }).addTo(map);

          // Custom marker icon
          const createMarkerIcon = (color) => {
            return L.divIcon({
              className: 'custom-marker',
              html: `<div style="background-color: ${color}; width: 24px; height: 24px; border-radius: 50%; border: 2px solid #1e293b; box-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 0 2px ${color}40; display: flex; align-items: center; justify-content: center;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2">
                  <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5M19.1 4.9c3.9 3.9 3.9 10.3 0 14.2M12 12h.01"/>
                </svg>
              </div>`,
              iconSize: [24, 24],
              iconAnchor: [12, 12],
              popupAnchor: [0, -12]
            });
          };

          // Add markers for each site
          SITES.forEach(site => {
            const color = site.tx.includes('Crown') ? '#14b8a6' : 
                         site.tx.includes('Armstrong') ? '#3b82f6' : '#a855f7';
            
            const marker = L.marker([parseFloat(site.lat), parseFloat(site.lng)], {
              icon: createMarkerIcon(color)
            }).addTo(map);

            marker.bindPopup(`
              <div style="min-width: 250px; max-width: 300px; font-family: system-ui, sans-serif; background: #1e293b; color: #e2e8f0; padding: 8px; border-radius: 8px;">
                <div style="font-weight: bold; font-size: 15px; margin-bottom: 4px; color: white;">${site.name}</div>
                <div style="color: #38bdf8; font-family: monospace; font-size: 12px; margin-bottom: 8px;">${site.call}</div>
                
                <div style="font-size: 11px; color: #94a3b8; margin-bottom: 2px;">
                  <strong style="color: #cbd5e1;">Freq:</strong> ${site.freq}
                </div>
                <div style="font-size: 11px; color: #94a3b8; margin-bottom: 8px;">
                  <strong style="color: #cbd5e1;">Transmitter:</strong> ${site.tx}
                </div>

                ${site.address ? `
                <div style="border-top: 1px solid #334155; padding-top: 8px; margin-bottom: 8px;">
                  <div style="font-size: 11px; color: #94a3b8; margin-bottom: 4px;">
                    <strong style="color: #cbd5e1;">Address:</strong><br/>
                    <span style="color: #e2e8f0;">${site.address}</span>
                  </div>
                  ${site.building ? `<div style="font-size: 11px; color: #94a3b8; margin-bottom: 2px;">
                    <strong style="color: #cbd5e1;">Building:</strong> ${site.building}
                  </div>` : ''}
                  ${site.poc ? `<div style="font-size: 11px; color: #94a3b8; margin-bottom: 2px;">
                    <strong style="color: #cbd5e1;">POC:</strong> ${site.poc}${site.phone ? ' ' + site.phone : ''}
                  </div>` : ''}
                </div>
                ` : ''}

                ${site.gateCode || site.lockboxCode || site.securityCode ? `
                <div style="border-top: 1px solid #334155; padding-top: 8px; margin-bottom: 8px; background: #0f172a; padding: 6px; border-radius: 4px;">
                  <div style="font-size: 10px; font-weight: 600; color: #38bdf8; margin-bottom: 4px; text-transform: uppercase;">Access Codes</div>
                  ${site.gateCode ? `<div style="font-size: 11px; color: #94a3b8; margin-bottom: 2px;">
                    <strong style="color: #cbd5e1;">Gate:</strong> <span style="font-family: monospace; color: #fbbf24;">${site.gateCode}</span>
                  </div>` : ''}
                  ${site.lockboxCode ? `<div style="font-size: 11px; color: #94a3b8; margin-bottom: 2px;">
                    <strong style="color: #cbd5e1;">Lockbox:</strong> <span style="font-family: monospace; color: #fbbf24;">${site.lockboxCode}</span>
                  </div>` : ''}
                  ${site.securityCode ? `<div style="font-size: 11px; color: #94a3b8; margin-bottom: 2px;">
                    <strong style="color: #cbd5e1;">Security:</strong> <span style="font-family: monospace; color: #fbbf24;">${site.securityCode}</span>
                  </div>` : ''}
                </div>
                ` : ''}

                ${site.notes ? `
                <div style="border-top: 1px solid #334155; padding-top: 6px; margin-bottom: 8px;">
                  <div style="font-size: 10px; color: #f59e0b; background: #451a03; padding: 4px 6px; border-radius: 4px; border-left: 3px solid #f59e0b;">
                    ⚠️ ${site.notes}
                  </div>
                </div>
                ` : ''}

                ${site.mapsLink ? `
                <div style="margin-top: 8px;">
                  <a href="${site.mapsLink}" target="_blank" style="display: inline-block; background: #0ea5e9; color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; text-decoration: none; font-weight: 600;">
                    📍 Open in Maps
                  </a>
                </div>
                ` : ''}
              </div>
            `, { className: 'dark-popup' });
          });

          mapInstanceRef.current = map;
        }

        return () => {
          if (mapInstanceRef.current) {
            mapInstanceRef.current.remove();
            mapInstanceRef.current = null;
          }
        };
      }, []);

      return (
        <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl overflow-hidden relative z-10">
          <div className="p-4 border-b border-slate-700/50 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <Icon name="MapPin" className="w-5 h-5 text-noaa-sky" />
              <h3 className="font-bold text-white">Site Locations</h3>
            </div>
            <div className="flex items-center gap-3 text-xs">
              <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-teal-500" /><span className="text-slate-400">Crown</span></div>
              <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-blue-500" /><span className="text-slate-400">Armstrong</span></div>
              <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-purple-500" /><span className="text-slate-400">Nautel</span></div>
            </div>
          </div>
          <div ref={mapRef} style={{ height: '300px', width: '100%', position: 'relative', zIndex: 1 }} />
        </div>
      );
    };

    // Date Picker Component
    const DatePicker = ({ value, onChange, disabled }) => {
      const [open, setOpen] = useState(false);
      const [viewDate, setViewDate] = useState(() => value ? new Date(value + 'T00:00:00') : new Date());
      const ref = useRef(null);

      useEffect(() => {
        const handleClickOutside = (e) => {
          if (ref.current && !ref.current.contains(e.target)) setOpen(false);
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      useEffect(() => {
        if (value) setViewDate(new Date(value + 'T00:00:00'));
      }, [value]);

      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const monthName = viewDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let i = 1; i <= daysInMonth; i++) days.push(i);

      const selectDate = (day) => {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        onChange(dateStr);
        setOpen(false);
      };

      const formatDisplay = (dateStr) => {
        if (!dateStr) return 'Select date...';
        const d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
      };

      const today = new Date().toISOString().split('T')[0];

      return (
        <div className="relative" ref={ref}>
          <button
            type="button"
            onClick={() => !disabled && setOpen(!open)}
            disabled={disabled}
            className={`w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 text-left flex items-center justify-between ${disabled ? 'opacity-70 cursor-not-allowed' : 'hover:border-slate-600 cursor-pointer'}`}
          >
            <div className="flex items-center gap-2">
              <Icon name="Calendar" className="w-4 h-4 text-noaa-sky" />
              <span className={value ? 'text-white' : 'text-slate-500'}>{formatDisplay(value)}</span>
            </div>
            {!disabled && <Icon name="ChevronDown" className={`w-4 h-4 text-slate-400 transition-transform ${open ? 'rotate-180' : ''}`} />}
          </button>

          {open && (
            <div className="absolute top-full left-0 mt-2 bg-slate-800 border border-slate-600 rounded-xl shadow-2xl z-50 p-3 w-72">
              <div className="flex items-center justify-between mb-3">
                <button type="button" onClick={() => setViewDate(new Date(year, month - 1, 1))} className="p-1.5 hover:bg-slate-700 rounded-lg">
                  <Icon name="ChevronLeft" className="w-4 h-4 text-slate-400" />
                </button>
                <span className="text-white font-semibold text-sm">{monthName}</span>
                <button type="button" onClick={() => setViewDate(new Date(year, month + 1, 1))} className="p-1.5 hover:bg-slate-700 rounded-lg">
                  <Icon name="ChevronRight" className="w-4 h-4 text-slate-400" />
                </button>
              </div>
              <div className="grid grid-cols-7 gap-1 mb-1">
                {['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'].map(d => (
                  <div key={d} className="text-center text-xs font-semibold text-slate-500 py-1">{d}</div>
                ))}
              </div>
              <div className="grid grid-cols-7 gap-1">
                {days.map((day, idx) => {
                  if (!day) return <div key={idx} className="h-8" />;
                  const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                  const isSelected = dateStr === value;
                  const isToday = dateStr === today;
                  return (
                    <button
                      key={idx}
                      type="button"
                      onClick={() => selectDate(day)}
                      className={`h-8 w-8 rounded-lg text-sm font-medium transition-all flex items-center justify-center mx-auto
                        ${isSelected ? 'bg-noaa-sky text-white' : isToday ? 'bg-noaa-sky/20 text-noaa-sky ring-1 ring-noaa-sky/50' : 'text-slate-300 hover:bg-slate-700'}`}
                    >
                      {day}
                    </button>
                  );
                })}
              </div>
              <div className="mt-3 pt-3 border-t border-slate-700 flex justify-between">
                <button type="button" onClick={() => { onChange(today); setOpen(false); }} className="text-xs text-noaa-sky hover:text-noaa-light font-medium">Today</button>
                <button type="button" onClick={() => setOpen(false)} className="text-xs text-slate-400 hover:text-white font-medium">Close</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    // Maintenance Calendar
    const MaintenanceCalendar = () => {
      const [currentDate, setCurrentDate] = useState(new Date());
      const [events, setEvents] = useState([]);
      const [showModal, setShowModal] = useState(false);
      const [editEvent, setEditEvent] = useState(null);
      const [isEditing, setIsEditing] = useState(false);
      const [form, setForm] = useState({ date: '', siteId: '', type: 'routine', notes: '' });
      const [loading, setLoading] = useState(true);

      // Load events from Firebase
      useEffect(() => {
        const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data')
          .collection('calendar_events')
          .onSnapshot(snapshot => {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setEvents(data);
            setLoading(false);
          }, error => {
            console.error('Error loading calendar events:', error);
            setLoading(false);
          });
        return () => unsubscribe();
      }, []);

      const today = new Date().toISOString().split('T')[0];
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const monthName = currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const getEventStatus = (event) => {
        if (event.completed) return 'completed';
        if (event.date < today) return 'pastdue';
        if (event.date === today) return 'duetoday';
        return 'scheduled';
      };

      const statusBorders = {
        scheduled: 'border-blue-400 bg-blue-500/40 text-white font-medium',
        duetoday: 'border-amber-400 bg-amber-500/50 text-white font-medium',
        pastdue: 'border-red-400 bg-red-500/50 text-white font-medium',
        completed: 'border-emerald-400 bg-emerald-500/40 text-white font-medium'
      };

      const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
      const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));

      const openAddModal = (date) => {
        setEditEvent(null);
        setIsEditing(true);
        setForm({ date: date || today, siteId: '', type: 'routine', notes: '' });
        setShowModal(true);
      };

      const openEditModal = (event) => {
        setEditEvent(event);
        setIsEditing(false);
        setForm({ date: event.date, siteId: event.siteId, type: event.type, notes: event.notes || '' });
        setShowModal(true);
      };

      const saveEvent = async () => {
        if (!form.date || !form.siteId) return alert('Please select date and site');
        try {
          const eventsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('calendar_events');
          if (editEvent) {
            await eventsRef.doc(editEvent.id).update(form);
          } else {
            await eventsRef.add({ ...form, completed: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
          }
          setShowModal(false);
          setIsEditing(false);
        } catch (error) {
          console.error('Error saving event:', error);
          alert('Failed to save event. Please try again.');

      const deleteEvent = async (id) => {
        if (confirm('Delete this event?')) {

            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('calendar_events').doc(id).delete();

        const event = events.find(e => e.id === id);

          try {
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('calendar_events').doc(id).update({
              completed: !event.completed
            });

            console.error('Error toggling completion:', error);
            alert('Failed to update event. Please try again.');
          }
        }
      };

      const getEventsForDate = (day) => {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        return events.filter(e => e.date === dateStr);

                        className={`px-3 py-1.5 rounded-lg text-sm font-medium ${events.find(e=>e.id===editEvent.id)?.completed ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-700 text-slate-300'}`}>

                <div className="flex gap-3 mt-5">
                  {editEvent && (

                  )}
                  <div className="flex-1" />
                  <button type="button" onClick={() => { setShowModal(false); setIsEditing(false); }} className="px-4 py-2 bg-slate-700 text-white rounded-lg font-medium">Cancel</button>
                  {editEvent && !isEditing && (

    // Dashboard

            ].map((s, i) => {

                'emerald': { text: 'text-emerald-400', bg: 'bg-emerald-500/10' }
              };
              const colors = colorClasses[s.c] || colorClasses['blue'];

              return (

                  <div className="flex justify-between">
                    <div>
                      <p className="text-slate-500 text-xs uppercase">{s.t}</p>
                      <h3 className="text-2xl font-bold text-white">{s.v}</h3>

                    <div className={`p-2 rounded-lg ${colors.bg}`}><Icon name={s.i} className={`w-5 h-5 ${colors.text}`} /></div>
                  </div>
                </div>
              );
            })}
          </div>

          <div className="grid lg:grid-cols-4 gap-6">
            <div className="lg:col-span-3 space-y-6">
              <SiteMap />
              <MaintenanceCalendar />
            </div>
            <div className="space-y-4">
              <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-5">
                <h3 className="font-bold text-white mb-4 flex items-center gap-2">
                  <Icon name="Zap" className="w-4 h-4 text-noaa-sky" /> Quick Actions
                </h3>
                <div className="space-y-3">
                  <button onClick={() => setTab('forms')} className="w-full p-4 bg-slate-900/50 border border-slate-700/50 rounded-xl text-left hover:border-noaa-sky/50">
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 rounded-lg bg-noaa-sky/20 flex items-center justify-center"><Icon name="ClipboardList" className="w-5 h-5 text-noaa-sky" /></div>

                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center"><Icon name="MapPin" className="w-5 h-5 text-emerald-400" /></div>
                      <div><p className="font-medium text-white">View Sites</p><p className="text-xs text-slate-500">Directory</p></div>

              <NWRUPCard />

    };

    // Analytics & Trend Analysis
    const Analytics = () => {
      const [inspections, setInspections] = useState([]);
      const [logEntries, setLogEntries] = useState([]);
      const [loading, setLoading] = useState(true);
      const [timeRange, setTimeRange] = useState('30'); // days
      const [selectedSite, setSelectedSite] = useState('all');
      const [selectedMetric, setSelectedMetric] = useState('frequency');

      useEffect(() => {
        const fetchInspections = async () => {
          try {
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - parseInt(timeRange));

            let query = db.collection('artifacts').doc(appId).collection('public').doc('data')
              .collection('inspections').orderBy('timestamp', 'desc');

            if (selectedSite !== 'all') {
              query = query.where('siteId', '==', selectedSite);
            }

            const snapshot = await query.get();
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
              .filter(d => new Date(d.timestamp) >= cutoff);

            setInspections(data);
          } catch (e) {
            console.error('Error fetching inspections:', e);
            // Show error state to user
            alert('⚠️ Error loading inspection data: ' + (e.message || 'Please check your connection and try again.'));
          } finally {
            setLoading(false);
          }
        };

        fetchInspections();

        let unsubscribe = () => {};
        try {
          unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data')
            .collection('inspections').onSnapshot(
              () => fetchInspections(),
              (error) => console.error('Real-time update error:', error)
            );
        } catch (e) {
          console.error('Error setting up real-time listener:', e);
        }

        return () => unsubscribe();
      }, [timeRange, selectedSite]);

      // Load and filter maintenance log entries from Firebase
      useEffect(() => {
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - parseInt(timeRange));

        let query = db.collection('artifacts').doc(appId).collection('public').doc('data')
          .collection('maintenance_log')
          .orderBy('timestamp', 'desc');

        const unsubscribe = query.onSnapshot(snapshot => {
          let data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

          // Filter by date range
          data = data.filter(log => new Date(log.timestamp) >= cutoff);

          // Filter by site if specified
          if (selectedSite !== 'all') {
            data = data.filter(log => log.siteId === selectedSite);
          }

          setLogEntries(data);
        }, error => {
          console.error('Error loading maintenance log:', error);
          setLogEntries([]);
        });

        return () => unsubscribe();
      }, [timeRange, selectedSite]);

      const exportCSV = () => {
        if (!inspections.length && !logEntries.length) return alert('No data to export');

        // Helper function to escape CSV fields properly
        const escapeCSV = (field) => {
          if (field == null) return '';
          const str = String(field);
          // If field contains comma, quote, or newline, wrap in quotes and escape existing quotes
          if (str.includes(',') || str.includes('"') || str.includes('\n')) {
            return `"${str.replace(/"/g, '""')}"`;
          }
          return str;
        };

        const headers = ['Type', 'Timestamp', 'Site', 'Call Sign', 'TX Type', 'TX1 Freq Error', 'TX2 Freq Error',
          'TX1 Modulation', 'TX2 Modulation', 'TX1 Fwd Pwr', 'TX2 Fwd Pwr', 'Remarks', 'Initials', 'Tech ID'];

        const inspectionRows = inspections.map(i => [
          'Inspection', i.timestamp, i.siteName || i.siteId, i.siteCall, i.txType,
          i.tx1_freq_error || '', i.tx2_freq_error || '',
          i.tx1_mod_deviation || '', i.tx2_mod_deviation || '',
          i.tx1_ext_fwd || '', i.tx2_ext_fwd || '',
          '', '', i.techId || ''
        ]);

        const logRows = logEntries.map(log => [
          'Log Entry', log.timestamp, log.siteName, log.siteCall, '', '', '', '', '', '', '',
          log.remarks || '', log.initials || '', ''
        ]);

        // Properly escape all fields and join with commas
        const csv = [headers, ...inspectionRows, ...logRows]
          .map(row => row.map(escapeCSV).join(','))
          .join('\n');

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `nwr-maintenance-data-${new Date().toISOString().split('T')[0]}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      const getMetricData = () => {
        const metricMap = {
          frequency: { field: 'freq_error', label: 'Frequency Error (Hz)', threshold: 200 },
          modulation: { field: 'mod_deviation', label: 'Modulation (kHz)', threshold: null },
          power: { field: 'ext_fwd', label: 'Forward Power (W)', threshold: null }
        };
        
        const metric = metricMap[selectedMetric];
        const data = inspections.flatMap(i => [
          { site: i.siteName || i.siteId, date: i.timestamp, value: parseFloat(i[`tx1_${metric.field}`]), tx: 'TX1' },
          { site: i.siteName || i.siteId, date: i.timestamp, value: parseFloat(i[`tx2_${metric.field}`]), tx: 'TX2' }
        ]).filter(d => !isNaN(d.value));

        return { data, metric };
      };

      const { data: metricData, metric } = getMetricData();

      const stats = {
        total: inspections.length,
        logEntries: logEntries.length,
        sites: [...new Set([...inspections.map(i => i.siteId), ...logEntries.map(l => l.siteId)])].length,
        avgFreqError: inspections.length > 0 ? 
          (inspections.reduce((sum, i) => sum + Math.abs(parseFloat(i.tx1_freq_error) || 0) + Math.abs(parseFloat(i.tx2_freq_error) || 0), 0) / (inspections.length * 2)).toFixed(1) : 0,
        outOfSpec: inspections.filter(i => Math.abs(parseFloat(i.tx1_freq_error)) > 200 || Math.abs(parseFloat(i.tx2_freq_error)) > 200).length
      };

      if (loading) {
        return (
          <div className="flex items-center justify-center h-64">
            <Icon name="Loader2" className="w-8 h-8 text-noaa-sky animate-spin" />
          </div>
        );
      }

      return (
        <div className="space-y-6 animate-in">
          {/* Header */}
          <div className="flex flex-col sm:flex-row justify-between gap-4">
            <div>
              <h2 className="text-2xl font-bold text-white flex items-center gap-2">
                <Icon name="TrendingUp" className="w-6 h-6 text-noaa-sky" /> Trend Analysis
              </h2>
              <p className="text-sm text-slate-400 mt-1">Real-time inspection data and performance metrics</p>
            </div>
            <button onClick={exportCSV} 
              className="px-4 py-2 bg-noaa-blue hover:bg-noaa-light text-white rounded-lg flex items-center gap-2 transition-all font-medium">
              <Icon name="Download" className="w-4 h-4" /> Export CSV
            </button>
          </div>

          {/* Filters */}
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
              <label className="block text-xs text-slate-400 uppercase font-semibold mb-2">Time Range</label>
              <select value={timeRange} onChange={e => setTimeRange(e.target.value)}
                className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 text-sm">
                <option value="7">Last 7 Days</option>
                <option value="30">Last 30 Days</option>
                <option value="90">Last 90 Days</option>
                <option value="365">Last Year</option>
              </select>
            </div>
            <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
              <label className="block text-xs text-slate-400 uppercase font-semibold mb-2">Site Filter</label>
              <select value={selectedSite} onChange={e => setSelectedSite(e.target.value)}
                className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2.5 text-sm">
                <option value="all">All Sites</option>
                {SITES.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
              <label className="block text-xs text-slate-400 uppercase font-semibold mb-2">Metric</label>
              <select value={selectedMetric} onChange={e => setSelectedMetric(e.target.value)}

          {/* Recent Maintenance Log Activity */}

    // Resources
    const Resources = ({ userRole }) => {
      const [resources, setResources] = useState([]);
      const [loading, setLoading] = useState(true);
      const [uploading, setUploading] = useState(false);
      const [uploadProgress, setUploadProgress] = useState(0);

      // Category definitions with icons and colors - Organized by transmitter type
      const categories = [
        { id: 'armstrong', name: 'Armstrong Transmitters', icon: 'Radio', color: 'text-purple-400', bg: 'bg-purple-500/10' },
        { id: 'crown', name: 'Crown Transmitters', icon: 'Radio', color: 'text-blue-400', bg: 'bg-blue-500/10' },
        { id: 'nautel', name: 'Nautel Transmitters', icon: 'Radio', color: 'text-emerald-400', bg: 'bg-emerald-500/10' }
      ];

      // Load resources from Firebase Storage
      useEffect(() => {
        const loadResources = async () => {
          try {
            const storageRef = storage.ref('resources');
            const result = await storageRef.listAll();

            const filePromises = result.items.map(async (itemRef) => {
              const url = await itemRef.getDownloadURL();
              const metadata = await itemRef.getMetadata();
              const pathParts = itemRef.fullPath.split('/');
              const category = pathParts.length > 1 ? pathParts[1] : 'other';

              return {
                name: itemRef.name,
                url: url,
                size: metadata.size,
                type: metadata.contentType,
                category: category,
                updated: metadata.updated
              };
            });

            const files = await Promise.all(filePromises);
            setResources(files);
            setLoading(false);
          } catch (error) {
            console.error('Error loading resources:', error);
            setLoading(false);
          }
        };

        loadResources();
      }, []);

      // Upload file handler (admin only)
      const handleUpload = async (e, category) => {
        if (userRole !== 'admin') {
          alert('Only admins can upload files');
          return;
        }

        const file = e.target.files[0];
        if (!file) return;

        setUploading(true);
        try {
          const storageRef = storage.ref(`resources/${category}/${file.name}`);
          const uploadTask = storageRef.put(file);

          uploadTask.on('state_changed',
            (snapshot) => {
              const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
              setUploadProgress(progress);
            },
            (error) => {
              console.error('Upload error:', error);
              alert('Upload failed: ' + error.message);
              setUploading(false);
            },
            async () => {
              alert('✓ File uploaded successfully!');
              setUploading(false);
              setUploadProgress(0);
              // Reload resources
              window.location.reload();
            }
          );
        } catch (error) {
          console.error('Upload error:', error);
          alert('Upload failed: ' + error.message);
          setUploading(false);
        }
      };

      // Delete file handler (admin only)
      const handleDelete = async (resource) => {
        if (userRole !== 'admin') {
          alert('Only admins can delete files');
          return;
        }

        if (!confirm(`Delete ${resource.name}?`)) return;

        try {
          const storageRef = storage.ref(`resources/${resource.category}/${resource.name}`);
          await storageRef.delete();
          alert('✓ File deleted successfully!');
          setResources(resources.filter(r => r.name !== resource.name));
        } catch (error) {
          console.error('Delete error:', error);
          alert('Delete failed: ' + error.message);
        }
      };

      // Format file size
      const formatSize = (bytes) => {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      };

      // Get file icon based on type
      const getFileIcon = (type) => {
        if (type?.includes('pdf')) return 'FileText';
        if (type?.includes('image')) return 'Image';
        if (type?.includes('video')) return 'Video';
        if (type?.includes('word') || type?.includes('document')) return 'FileText';
        if (type?.includes('sheet') || type?.includes('excel')) return 'Table';
        if (type?.includes('presentation') || type?.includes('powerpoint')) return 'Presentation';
        return 'File';
      };

      if (loading) {
        return (
          <div className="flex items-center justify-center h-64">
            <div className="text-center">
              <div className="w-12 h-12 border-4 border-noaa-sky border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-slate-400">Loading resources...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="space-y-6 animate-in">
          {/* Header */}
          <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
            <div className="flex justify-between items-center">
              <div>
                <h2 className="text-lg font-bold text-white flex items-center gap-2">
                  <Icon name="FolderOpen" className="w-5 h-5 text-noaa-sky" /> Resources Library
                </h2>
                <p className="text-sm text-slate-400 mt-1">{resources.length} files available • Organized by transmitter type</p>
              </div>
            </div>
          </div>

          {/* Categories */}
          {categories.map(cat => {
            const categoryFiles = resources.filter(r => r.category === cat.id);

            return (
              <div key={cat.id} className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-6">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="font-bold text-white text-lg flex items-center gap-2">
                    <div className={`p-2 rounded-lg ${cat.bg}`}>
                      <Icon name={cat.icon} className={`w-5 h-5 ${cat.color}`} />
                    </div>
                    {cat.name}
                    <span className="text-sm text-slate-500">({categoryFiles.length})</span>
                  </h3>

                  {userRole === 'admin' && (
                    <label className="px-4 py-2 bg-noaa-sky hover:bg-noaa-light text-white text-sm font-semibold rounded-lg cursor-pointer transition-colors flex items-center gap-2">
                      <Icon name="Upload" className="w-4 h-4" />
                      Upload
                      <input
                        type="file"
                        onChange={(e) => handleUpload(e, cat.id)}
                        className="hidden"
                        disabled={uploading}
                      />
                    </label>
                  )}
                </div>

                {categoryFiles.length === 0 ? (
                  <div className="text-center py-8 text-slate-500">
                    <Icon name="Inbox" className="w-12 h-12 mx-auto mb-2 opacity-50" />
                    <p className="text-sm">No files in this category</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {categoryFiles.map(file => (
                      <div key={file.name} className="bg-slate-900/50 border border-slate-700/50 rounded-lg p-4 hover:border-noaa-sky/50 transition-all">
                        <div className="flex items-start gap-3">
                          <div className="p-2 bg-slate-800 rounded-lg">
                            <Icon name={getFileIcon(file.type)} className="w-5 h-5 text-noaa-sky" />
                          </div>
                          <div className="flex-1 min-w-0">
                            <p className="font-semibold text-white text-sm truncate" title={file.name}>
                              {file.name}
                            </p>
                            <p className="text-xs text-slate-500 mt-1">{formatSize(file.size)}</p>
                          </div>
                        </div>
                        <div className="flex gap-2 mt-3">
                          <a
                            href={file.url}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="flex-1 px-3 py-2 bg-noaa-sky hover:bg-noaa-light text-white text-xs font-semibold rounded-lg transition-colors flex items-center justify-center gap-1"
                          >
                            <Icon name="Download" className="w-3 h-3" />
                            Download
                          </a>
                          {userRole === 'admin' && (
                            <button
                              onClick={() => handleDelete(file)}
                              className="px-3 py-2 bg-red-500/20 hover:bg-red-500/30 text-red-400 text-xs font-semibold rounded-lg transition-colors"
                            >
                              <Icon name="Trash2" className="w-3 h-3" />
                            </button>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}

          {/* Upload Progress */}
          {uploading && (
            <div className="fixed bottom-24 right-6 bg-slate-800 border border-slate-700 rounded-xl p-4 shadow-xl z-50">
              <div className="flex items-center gap-3">
                <div className="w-8 h-8 border-4 border-noaa-sky border-t-transparent rounded-full animate-spin"></div>
                <div>
                  <p className="text-white font-semibold text-sm">Uploading...</p>
                  <p className="text-slate-400 text-xs">{Math.round(uploadProgress)}%</p>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // Sites
    const SitesList = () => {
      const [q, setQ] = useState('');
      const [expanded, setExpanded] = useState({});
      const [siteStatuses, setSiteStatuses] = useState({});
      const [loading, setLoading] = useState(true);

      // Load site statuses from Firebase
      useEffect(() => {
        const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data')
          .collection('site_statuses')
          .onSnapshot(snapshot => {
            const statusMap = {};
            snapshot.docs.forEach(doc => {
              statusMap[doc.id] = doc.data().status || 'online';
            });
            // Initialize missing sites as 'online'
            SITES.forEach(site => {
              if (!statusMap[site.id]) statusMap[site.id] = 'online';
            });
            setSiteStatuses(statusMap);
            setLoading(false);
          }, error => {
            console.error('Error loading site statuses:', error);
            // Initialize all as online on error
            const initial = {};
            SITES.forEach(site => initial[site.id] = 'online');
            setSiteStatuses(initial);
            setLoading(false);
          });
        return () => unsubscribe();
      }, []);

      const updateSiteStatus = async (siteId, newStatus) => {
        try {
          await db.collection('artifacts').doc(appId).collection('public').doc('data')
            .collection('site_statuses').doc(siteId).set({ status: newStatus });
        } catch (error) {
          console.error('Error updating site status:', error);
          alert('Failed to update site status. Please try again.');
        }
      };

      const filtered = SITES.filter(s => s.name.toLowerCase().includes(q.toLowerCase()) || s.call.toLowerCase().includes(q.toLowerCase()) || s.tx.toLowerCase().includes(q.toLowerCase()));
      const color = (t) => t.includes('Crown') ? 'teal' : t.includes('Armstrong') ? 'blue' : 'purple';

      const toggleExpand = (id) => {
        setExpanded(prev => ({ ...prev, [id]: !prev[id] }));
      };

      const statusConfig = {
        'online': { label: '● Online', color: 'text-emerald-400', bgColor: 'bg-emerald-500/10', borderColor: 'border-emerald-500/30', dotColor: 'bg-emerald-500' },
        'degraded': { label: '● Degraded', color: 'text-amber-400', bgColor: 'bg-amber-500/10', borderColor: 'border-amber-500/30', dotColor: 'bg-amber-500' },
        'offline': { label: '● Not Operational', color: 'text-red-400', bgColor: 'bg-red-500/10', borderColor: 'border-red-500/30', dotColor: 'bg-red-500' }
      };

      const onlineSites = Object.values(siteStatuses).filter(s => s === 'online').length;
      const degradedSites = Object.values(siteStatuses).filter(s => s === 'degraded').length;
      const offlineSites = Object.values(siteStatuses).filter(s => s === 'offline').length;

      return (
        <div className="space-y-6 animate-in">
          <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4 flex flex-col sm:flex-row gap-4 justify-between items-center">
            <div className="flex items-center gap-4 flex-wrap">
              <h2 className="text-lg font-bold text-white flex items-center gap-2"><Icon name="MapPin" className="w-5 h-5 text-noaa-sky" /> Site Directory</h2>
              {onlineSites > 0 && (
                <div className="flex items-center gap-2 px-3 py-1.5 bg-emerald-500/10 border border-emerald-500/30 rounded-lg">
                  <div className="w-2 h-2 rounded-full bg-emerald-500" />
                  <span className="text-emerald-400 text-xs font-medium">{onlineSites} Online</span>
                </div>
              )}
              {degradedSites > 0 && (
                <div className="flex items-center gap-2 px-3 py-1.5 bg-amber-500/10 border border-amber-500/30 rounded-lg">
                  <div className="w-2 h-2 rounded-full bg-amber-500" />
                  <span className="text-amber-400 text-xs font-medium">{degradedSites} Degraded</span>
                </div>
              )}
              {offlineSites > 0 && (
                <div className="flex items-center gap-2 px-3 py-1.5 bg-red-500/10 border border-red-500/30 rounded-lg">
                  <div className="w-2 h-2 rounded-full bg-red-500" />
                  <span className="text-red-400 text-xs font-medium">{offlineSites} Offline</span>
                </div>
              )}

    // Past Inspections History
    const PastInspections = ({ setTab, setEditingInspection, userRole }) => {

        const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data')
          .collection('inspections')
          .orderBy('timestamp', 'desc')
          .onSnapshot(snapshot => {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setInspections(data);
            setLoading(false);

            console.error('Error fetching inspections:', error);
            setLoading(false);
          });
        return () => unsubscribe();

      const filteredInspections = inspections.filter(inspection => {
        const term = searchTerm.toLowerCase();

          inspection.siteId?.toLowerCase().includes(term) ||
          inspection.tech?.toLowerCase().includes(term) ||
          inspection.date?.includes(term)

        return site ? site.name : siteId;

              <p className="text-slate-400">Loading inspection history...</p>
            </div>
          </div>

      return (

          <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">

              <div className="relative w-full sm:w-72">

                  placeholder="Search by site, tech, or date..."
                  value={searchTerm}
                  onChange={e => setSearchTerm(e.target.value)}
                  className="w-full pl-10 pr-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-sm text-white focus:border-noaa-sky outline-none"

          </div>

          {/* Inspections List */}
          {filteredInspections.length === 0 ? (
            <div className="text-center py-12">
              <Icon name="FileText" className="w-16 h-16 text-slate-600 mx-auto mb-4" />
              <p className="text-slate-400">
                {searchTerm ? 'No inspections match your search' : 'No inspections recorded yet'}
              </p>
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {filteredInspections.map(inspection => (
                <div
                  key={inspection.id}
                  onClick={() => setSelectedInspection(inspection)}
                  className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4 hover:border-noaa-sky/50 transition-all cursor-pointer"
                >
                  <div className="flex justify-between items-start mb-3">
                    <div>
                      <h3 className="font-bold text-white text-lg">{getSiteName(inspection.siteId)}</h3>
                      <p className="text-noaa-sky text-sm font-mono">{inspection.siteId}</p>
                    </div>
                    <Icon name="FileText" className="w-5 h-5 text-noaa-sky" />
                  </div>
                  <div className="space-y-1 text-sm">
                    <div className="flex justify-between">
                      <span className="text-slate-500">Date</span>
                      <span className="text-white">{inspection.date}</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-slate-500">Technician</span>
                      <span className="text-white">{inspection.tech}</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-slate-500">Submitted</span>
                      <span className="text-slate-400 text-xs">
                        {inspection.timestamp ? new Date(inspection.timestamp.seconds * 1000).toLocaleDateString() : 'N/A'}
                      </span>
                    </div>
                  </div>
                  <div className="mt-3 pt-3 border-t border-slate-700/50">
                    <button className="text-xs text-noaa-sky font-semibold flex items-center gap-1 hover:text-noaa-light">
                      View Details <Icon name="ChevronRight" className="w-3 h-3" />
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Inspection Detail Modal */}
          {selectedInspection && (
            <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setSelectedInspection(null)}>
              <div className="bg-slate-900 border border-slate-700 rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                {/* Modal Header */}
                <div className="sticky top-0 bg-slate-900 border-b border-slate-700 p-6 flex justify-between items-center z-10">
                  <div>
                    <h2 className="text-2xl font-bold text-white">Inspection Report</h2>
                    <p className="text-sm text-slate-400 mt-1">
                      {getSiteName(selectedInspection.siteId)} • {selectedInspection.date}
                    </p>

                  <div className="flex items-center gap-2">
                    {userRole === 'admin' && (
                      <button
                        onClick={() => handleEdit(selectedInspection)}
                        className="px-4 py-2 bg-noaa-sky hover:bg-noaa-light text-white text-sm font-semibold rounded-lg transition-colors flex items-center gap-2"
                      >
                        <Icon name="Edit" className="w-4 h-4" />
                        Edit
                      </button>
                    )}
                    <button
                      onClick={() => setSelectedInspection(null)}
                      className="p-2 hover:bg-slate-800 rounded-lg transition-colors"
                    >
                      <Icon name="X" className="w-6 h-6 text-slate-400" />
                    </button>
                  </div>
                </div>

                {/* Modal Content */}
                <div className="p-6 space-y-6">
                  {/* Basic Info */}
                  <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">
                    <h3 className="font-bold text-white mb-3 flex items-center gap-2">
                      <Icon name="Info" className="w-4 h-4 text-noaa-sky" /> Basic Information
                    </h3>
                    <div className="grid grid-cols-2 gap-3 text-sm">
                      <div>
                        <p className="text-slate-500">Site ID</p>
                        <p className="text-white font-mono">{selectedInspection.siteId}</p>
                      </div>
                      <div>
                        <p className="text-slate-500">Date</p>
                        <p className="text-white">{selectedInspection.date}</p>
                      </div>
                      <div>
                        <p className="text-slate-500">Technician</p>
                        <p className="text-white">{selectedInspection.tech}</p>
