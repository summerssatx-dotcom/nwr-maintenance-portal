                      <div>
                        <p className="text-slate-500">Submitted</p>
                        <p className="text-white">
                          {selectedInspection.timestamp ? new Date(selectedInspection.timestamp.seconds * 1000).toLocaleString() : 'N/A'}
                        </p>
                      </div>
                    </div>
                  </div>

                  {/* Render all inspection data dynamically */}
                  {Object.entries(selectedInspection).map(([key, value]) => {
                    // Skip metadata fields
                    if (['id', 'timestamp', 'siteId', 'date', 'tech'].includes(key)) return null;
                    // Skip empty values
                    if (!value || value === '') return null;

                    return (
                      <div key={key} className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4">

                  >
                    Close
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // App
    function App() {
      const [user, setUser] = useState(null);
      const [userRole, setUserRole] = useState(null);
      const [loading, setLoading] = useState(true);
      const [tab, setTab] = useState('dashboard');
      const [authenticated, setAuthenticated] = useState(false);
      const [passwordInput, setPasswordInput] = useState('');
      const [editingInspection, setEditingInspection] = useState(null);

      // Check if already authenticated in session
      useEffect(() => {
        const savedAuth = sessionStorage.getItem('portal_authenticated');
        if (savedAuth === 'true') {
          setAuthenticated(true);
        }
      }, []);

      useEffect(() => {
        if (!authenticated) {
          setLoading(false);
          return;
        }

        const unsub = auth.onAuthStateChanged(async (u) => {
          if (!u) {
            // Sign in anonymously if not signed in
            try {
              await auth.signInAnonymously();
              return; // Will trigger this useEffect again
            } catch (error) {
              console.error('Anonymous sign-in error:', error);
              setLoading(false);
              return;
            }
          }

          setUser(u);

          // Get user role from session storage (set during login)
          const savedRole = sessionStorage.getItem('portal_role');
          setUserRole(savedRole || 'viewer');
          setLoading(false);
        });

        return unsub;
      }, [authenticated]);

      const handlePasswordSubmit = (e) => {
        e.preventDefault();

        // Check which password was entered and assign role
        let role = null;
        if (passwordInput === PASSWORDS.admin) {
          role = 'admin';
        } else if (passwordInput === PASSWORDS.viewer) {
          role = 'viewer';
        }

        if (role) {
          setAuthenticated(true);
          sessionStorage.setItem('portal_authenticated', 'true');
          sessionStorage.setItem('portal_role', role);
          setPasswordInput('');
        } else {
          alert('Incorrect password. Please try again.');
          setPasswordInput('');
        }
      };

      const handleSignOut = () => {
        sessionStorage.removeItem('portal_authenticated');
        sessionStorage.removeItem('portal_role');
        setAuthenticated(false);
        setUser(null);
        setUserRole(null);
        auth.signOut();
      };

      if (loading) return <div className="min-h-screen bg-slate-900 flex items-center justify-center"><Icon name="Loader2" className="w-8 h-8 text-noaa-sky animate-spin" /></div>;

      if (!authenticated || !user) return (
        <div className="min-h-screen bg-gradient-to-br from-noaa-blue via-slate-900 to-noaa-blue flex items-center justify-center p-4">
          <div className="bg-slate-900/90 border border-slate-700/50 rounded-2xl p-8 max-w-md w-full">
            <div className="text-center mb-6">
              <div className="w-16 h-16 mx-auto mb-4 rounded-xl bg-noaa-sky/20 flex items-center justify-center">
                <Icon name="Radio" className="w-8 h-8 text-noaa-sky" />
              </div>
              <h1 className="text-2xl font-bold text-white mb-2">NWR Maintenance Portal</h1>
              <p className="text-noaa-sky text-sm">EHB-7 Technician Portal</p>
            </div>
            <form onSubmit={handlePasswordSubmit} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-300 mb-2">Access Password</label>
                <div className="relative">
                  <Icon name="Lock" className="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-slate-500" />
                  <input
                    type="password"
                    value={passwordInput}
                    onChange={(e) => setPasswordInput(e.target.value)}
                    placeholder="Enter portal password"
                    className="w-full pl-11 pr-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:border-noaa-sky outline-none transition-colors"
                    autoFocus
                    required
                  />
                </div>
              </div>
              <button
                type="submit"
                className="w-full bg-noaa-sky hover:bg-noaa-light text-white font-semibold py-3 rounded-xl transition-colors flex items-center justify-center gap-2"
              >
                <Icon name="LogIn" className="w-5 h-5" />
                Access Portal
              </button>
            </form>
            <p className="text-xs text-slate-500 text-center mt-6">
              Authorized personnel only • Contact administrator for access
            </p>
          </div>
        </div>
      );

      const navItems = [
        { id: 'dashboard', label: 'Dashboard', icon: 'LayoutDashboard' },
        { id: 'forms', label: 'Inspection', icon: 'ClipboardList' },
        { id: 'history', label: 'History', icon: 'Archive' },
        { id: 'analytics', label: 'Analytics', icon: 'TrendingUp' },
        { id: 'resources', label: 'Resources', icon: 'FolderOpen' },
        { id: 'sites', label: 'Sites', icon: 'Radio' }
      ];

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-slate-200 pb-24">
          {/* Header with Storm-Themed Banner */}
          <header className="sticky top-0 z-50">
            <div className="relative h-32 border-b-4 border-noaa-cyan/50 overflow-hidden" style={{
              background: 'linear-gradient(135deg, #0f172a 0%, #1e293b 20%, #334155 40%, #475569 60%, #64748b 80%, #94a3b8 100%)',
            }}>
              {/* Animated lightning bolts pattern */}
              <div className="absolute inset-0 opacity-20" style={{
                backgroundImage: `url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 5 L43 28 L55 24 L40 50 L37 32 L25 36 Z' fill='%23ffffff' opacity='0.3'/%3E%3Cpath d='M65 15 L67 30 L75 28 L65 45 L63 35 L55 37 Z' fill='%23ffffff' opacity='0.2'/%3E%3C/svg%3E")`,
                backgroundSize: '160px 160px',
                backgroundRepeat: 'repeat'
              }} />
              
              {/* Dark overlay for text contrast */}
              <div className="absolute inset-0 bg-gradient-to-r from-slate-950/85 via-slate-900/60 to-slate-950/85" />
              
              <div className="relative max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
                <div className="flex items-center gap-4">
                  <div className="w-16 h-16 bg-white/95 rounded-2xl flex items-center justify-center shadow-2xl shadow-noaa-blue/40 border-2 border-noaa-cyan/40">
                    <Icon name="Radio" className="w-8 h-8 text-noaa-blue" />
                  </div>
                  <div>
                    <h1 className="font-black text-white text-3xl tracking-tight drop-shadow-lg" style={{textShadow: '0 2px 12px rgba(0,0,0,0.6)'}}>

                    <p className="text-sm text-noaa-cyan uppercase tracking-widest font-bold drop-shadow-md">

                  <nav className="flex gap-2 bg-slate-900/90 backdrop-blur-xl rounded-xl p-1.5 border border-slate-700/60 shadow-2xl">
                    {navItems.map(n => (
                      <button key={n.id} onClick={() => setTab(n.id)}
                        className={`px-5 py-2.5 rounded-lg text-sm font-bold flex items-center gap-2 transition-all ${
                          tab === n.id

                        <Icon name={n.icon} className="w-4 h-4" /> {n.label}
                      </button>

                    <button onClick={handleSignOut}
                      className="px-4 py-2.5 rounded-lg text-sm font-bold text-slate-400 hover:text-red-400 hover:bg-red-500/10 transition-all flex items-center gap-2">
                      <Icon name="LogOut" className="w-4 h-4" />
                    </button>
                  </nav>
                  {userRole && (
                    <div className={`px-3 py-2 rounded-lg text-xs font-bold uppercase tracking-wider ${
                      userRole === 'admin' ? 'bg-purple-500/20 text-purple-400 border border-purple-500/30' :
                      userRole === 'editor' ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30' :
                      'bg-slate-700/50 text-slate-400 border border-slate-600/30'
                    }`}>
                      {userRole === 'viewer' && <Icon name="Eye" className="w-3 h-3 inline mr-1" />}
                      {userRole === 'editor' && <Icon name="Edit" className="w-3 h-3 inline mr-1" />}
                      {userRole === 'admin' && <Icon name="Shield" className="w-3 h-3 inline mr-1" />}
                      {userRole}
                    </div>
                  )}
                </div>
                
                <button onClick={handleSignOut}
                  className="md:hidden text-white/80 hover:text-white transition-colors p-3 hover:bg-white/10 rounded-xl backdrop-blur">
                  <Icon name="LogOut" className="w-5 h-5" />
                </button>
              </div>
            </div>
          </header>
          <main className="max-w-7xl mx-auto px-4 py-6">
            {userRole === 'viewer' && (
              <div className="mb-6 bg-slate-800/50 border border-slate-600/50 rounded-xl p-4 flex items-center gap-3">
                <Icon name="Eye" className="w-5 h-5 text-slate-400" />
                <div>
                  <p className="text-white font-semibold text-sm">Read-Only Access</p>
                  <p className="text-slate-400 text-xs">You can view all data but cannot make changes. Contact an admin for edit access.</p>
                </div>
              </div>
            )}
            {tab === 'dashboard' && <Dashboard setTab={setTab} />}
            {tab === 'forms' && <InspectionForm user={user} userRole={userRole} editingInspection={editingInspection} setEditingInspection={setEditingInspection} />}
            {tab === 'history' && <PastInspections setTab={setTab} setEditingInspection={setEditingInspection} userRole={userRole} />}
            {tab === 'analytics' && <Analytics />}
            {tab === 'resources' && <Resources userRole={userRole} />}
            {tab === 'sites' && <SitesList userRole={userRole} />}
          </main>
          <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-noaa-blue/95 border-t border-slate-800 px-2 py-2 z-50">
            <div className="flex justify-around">
              {navItems.map(n => (
                <button key={n.id} onClick={() => setTab(n.id)} className={`flex flex-col items-center gap-1 px-3 py-2 ${tab === n.id ? 'text-white' : 'text-white/50'}`}>
                  <Icon name={n.icon} className="w-5 h-5" />
                  <span className="text-[10px]">{n.label}</span>
                </button>
              ))}
            </div>
          </nav>
        </div>
      );
    }

    // Render App with ErrorBoundary
    ReactDOM.createRoot(document.getElementById('root')).render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
